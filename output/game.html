    const cbPct = comboTimer / maxWindow;
    ctx.fillStyle = 'rgba(0,204,255,0.15)';
    roundRect(ctx, CFG.W / 2 - cbW / 2, 88, cbW, 3, 1);
    ctx.fill();
    ctx.fillStyle = combo > 10 ? DS.red : combo > 5 ? DS.gold : DS.cyan;
    roundRect(ctx, CFG.W / 2 - cbW / 2, 88, cbW * cbPct, 3, 1);
    ctx.fill();
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // ========== ZONE EVENT FLASH ==========
  if (zoneEventMsgTimer > 0) {
    const flashAlpha = Math.min(1, zoneEventMsgTimer / 30);
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    drawSkewPanel(CFG.W / 2 - 150, CFG.H / 2 - 22, 300, 44, { skew: 8, fill: 'rgba(8,16,38,0.9)', stroke: DS.borderGold });
    ctx.fillStyle = DS.gold;
    ctx.font = 'bold 15px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(zoneEventMsg, CFG.W / 2, CFG.H / 2 + 5);
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // === Tutorial hint popup ===
  if (tutorialHint && tutorialHint.timer > 0) {
    tutorialHint.timer--;
    const th = tutorialHint;
    const fadeIn = Math.min(1, (th.maxTimer - th.timer) / 20);
    const fadeOut = Math.min(1, th.timer / 30);
    const thAlpha = Math.min(fadeIn, fadeOut);
    const slideY = Math.min(1, (th.maxTimer - th.timer) / 15);
    const ty = CFG.H - 82 + (1 - slideY) * 30;
    ctx.save();
    ctx.globalAlpha = thAlpha;
    drawSkewPanel(CFG.W/2 - 165, ty - 18, 330, 50, { skew: 6, fill: 'rgba(8,16,38,0.92)', stroke: DS.borderCyan, lineWidth: 1.5 });
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.fillText(th.icon, CFG.W/2 - 130, ty + 10);
    ctx.fillStyle = DS.gold;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(th.text, CFG.W/2 + 10, ty + 4);
    ctx.fillStyle = DS.textS;
    ctx.font = '11px sans-serif';
    ctx.fillText(th.sub, CFG.W/2 + 10, ty + 20);
    const pct = th.timer / th.maxTimer;
    ctx.fillStyle = DS.cyanDim;
    roundRect(ctx, CFG.W/2 - 145, ty + 26, 290, 2, 1);
    ctx.fill();
    ctx.fillStyle = DS.cyan;
    roundRect(ctx, CFG.W/2 - 145, ty + 26, 290 * pct, 2, 1);
    ctx.fill();
    ctx.textAlign = 'left';
    ctx.restore();
    if (tutorialHint.timer <= 0) tutorialHint = null;
  }

  // === Hiding feedback text ===
  if (player.hiding) {
    const ps = worldToScreen(player.x, player.y);
    ctx.save();
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1) * 0.15;
    ctx.fillStyle = '#B0B8FF';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('hiding'), ps.x, ps.y - 30);
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // Zone transition cinematic
  if (player._zoneTransTimer > 0) {
    const ztAlpha = Math.min(1, player._zoneTransTimer / 40) * Math.min(1, (120 - player._zoneTransTimer) / 20);
    ctx.fillStyle = `rgba(0,0,0,${ztAlpha * 0.6})`;
    ctx.fillRect(0, 0, CFG.W, 50 * ztAlpha);
    ctx.fillRect(0, CFG.H - 50 * ztAlpha, CFG.W, 50 * ztAlpha);
    ctx.globalAlpha = ztAlpha;
    // Angular zone name banner
    drawSkewPanel(CFG.W / 2 - 200, CFG.H / 2 - 28, 400, 56, { skew: 12, fill: 'rgba(8,16,38,0.85)', stroke: DS.borderCyan });
    ctx.fillStyle = DS.cyan;
    ctx.fillRect(CFG.W / 2 - 188, CFG.H / 2 - 28, 376, 2);
    ctx.fillStyle = DS.gold;
    ctx.font = 'bold 34px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(player._zoneTitle || '', CFG.W / 2, CFG.H / 2 + 2);
    ctx.fillStyle = DS.textS;
    ctx.font = '14px sans-serif';
    ctx.fillText(player._zoneSub || '', CFG.W / 2, CFG.H / 2 + 20);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // Mini-map — angular clip corner (top-left, enlarged 200%)
  const mmW = 120, mmH = 200;
  const mmX = 10, mmY = 260;
  drawClipPanel(mmX, mmY, mmW, mmH, { cut: 15, fill: 'rgba(8,16,38,0.7)', stroke: DS.borderCyan, lineWidth: 1 });
  // Zone color bands
  const z1H = mmH * (20/80);
  const z2H = mmH * (30/80);
  const z3H = mmH * (20/80);
  ctx.fillStyle = 'rgba(0,204,255,0.04)';
  ctx.fillRect(mmX + 2, mmY + 2, mmW - 4, z1H);
  ctx.fillStyle = 'rgba(0,204,255,0.03)';
  ctx.fillRect(mmX + 2, mmY + z1H, mmW - 4, z2H);
  ctx.fillStyle = 'rgba(0,204,255,0.02)';
  ctx.fillRect(mmX + 2, mmY + z1H + z2H, mmW - 4, z3H + mmH * 10/80);

  const scaleX = mmW / (CFG.MAP_W * CFG.TILE);
  const scaleY = mmH / (CFG.MAP_H * CFG.TILE);

  // Gate lines
  ctx.strokeStyle = '#FF634488';
  ctx.lineWidth = 1;
  for (const gate of gates) {
    const gy = mmY + gate.row * CFG.TILE * scaleY;
    ctx.strokeStyle = gate.open ? '#90EE9088' : '#FF634488';
    ctx.beginPath();
    ctx.moveTo(mmX, gy);
    ctx.lineTo(mmX + mmW, gy);
    ctx.stroke();
  }

  // Player on minimap (with glow pulse)
  const mmPlayerX = mmX + player.x * scaleX;
  const mmPlayerY = mmY + player.y * scaleY;
  ctx.fillStyle = 'rgba(255,215,0,0.25)';
  ctx.beginPath();
  ctx.arc(mmPlayerX, mmPlayerY, 8 + Math.sin(frame * 0.1) * 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(mmPlayerX, mmPlayerY, 5, 0, Math.PI * 2);
  ctx.fill();

  // Enemies on minimap (with tiny vision cone hints)
  for (const e of enemies) {
    const emx = mmX + e.x * scaleX;
    const emy = mmY + e.y * scaleY;
    // Tiny vision cone
    if (e.catnipTimer <= 0) {
      ctx.fillStyle = e.state === 'chase' ? 'rgba(255,0,0,0.2)' : 'rgba(255,200,100,0.1)';
      ctx.beginPath();
      ctx.moveTo(emx, emy);
      ctx.arc(emx, emy, 14, e.dir - 0.4, e.dir + 0.4);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = e.state === 'chase' ? '#FF0000' : e.type === 'dog' ? '#8B4513' : e.type === 'bigdog' ? '#D4A030' : '#FF8060';
    ctx.beginPath();
    ctx.arc(emx, emy, e.type === 'bigdog' ? 6 : 3, 0, Math.PI * 2);
    ctx.fill();
    // Can opener grandma highlight on minimap
    if (e.hasCanOpener && !e._canOpenerStolen) {
      ctx.fillStyle = `rgba(255,215,0,${0.4 + Math.sin(frame * 0.1) * 0.2})`;
      ctx.beginPath();
      ctx.arc(emx, emy, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🔑', emx, emy - 5);
      ctx.textAlign = 'left';
    }
  }

  // Food on minimap
  for (const f of foods) {
    if (f.eaten) continue;
    ctx.fillStyle = '#90EE9088';
    ctx.fillRect(mmX + f.x * scaleX - 2, mmY + f.y * scaleY - 2, 4, 4);
  }

  // Grand fish on minimap
  if (grandFish && !grandFish.eaten) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(mmX + grandFish.x * scaleX, mmY + grandFish.y * scaleY, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // === OBJECTIVE TRACKER HUD ===
  if (objectiveFlashTimer > 0) objectiveFlashTimer--;
  const objFlash = objectiveFlashTimer > 0 ? Math.sin(objectiveFlashTimer * 0.2) * 0.3 : 0;
  let trackerText = '';
  let trackerSub = '';
  let objProgress = 0; // 0-1
  const currentZoneUI = player.y < ZONE2_START * CFG.TILE ? 3 : player.y < ZONE1_START * CFG.TILE ? 2 : 1;
  if (gameState === 'finalchase') {
    trackerText = t('objFishRun');
    const safeY = (ZONE1_END - 3) * CFG.TILE;
    const startY = ZONE3_START * CFG.TILE;
    objProgress = Math.max(0, Math.min(1, (player.y - startY) / (safeY - startY)));
    trackerSub = `${t('objEscProg')} ${Math.floor(objProgress * 100)}%`;
  } else if (hasFish) {
    trackerText = t('objRunBack');
    trackerSub = t('objRunSouth');
    objProgress = 1;
  } else if (currentZoneUI === 3 && grandFish && !grandFish.eaten) {
    trackerText = t('objFindFish');
    const fishDist = dist(player.x, player.y, grandFish.x, grandFish.y);
    trackerSub = fishDist < 200 ? t('objNearby') : t('objAtCenter');
    objProgress = catEnergy >= CFG.ENERGY_MAX * 0.5 ? 1 : catEnergy / (CFG.ENERGY_MAX * 0.5);
  } else if (currentZoneUI === 2 && !gates[1].open) {
    if (!hasCanOpener) {
      trackerText = t('objStealKey');
      trackerSub = t('objStealHint');
      objProgress = 0.5;
    } else {
      trackerText = t('objGotoVIP');
      objProgress = Math.min(1, catEnergy / gates[1].energyNeeded);
      trackerSub = `${t('objEnergy')} ${Math.floor(catEnergy)}/${gates[1].energyNeeded}`;
    }
  } else if (currentZoneUI === 1 && !gates[0].open) {
    trackerText = t('objEatFood');
    objProgress = Math.min(1, catEnergy / gates[0].energyNeeded);
    trackerSub = `${t('objEnergy')} ${Math.floor(catEnergy)}/${gates[0].energyNeeded}`;
  } else if (currentZoneUI === 1 && gates[0].open) {
    trackerText = t('objEnterBanquet');
    trackerSub = t('objGateOpen');
    objProgress = 1;
  } else if (currentZoneUI === 2 && gates[1].open) {
    trackerText = t('objEnterStage');
    trackerSub = t('objVIPOpen');
    objProgress = 1;
  }
  if (trackerText) {
    const objBoxW = 360;
    const objBoxH = gameState === 'finalchase' ? 82 : 68;
    const objX = 10;
    const objY = mmY + mmH + 10;
    const objAlpha = 0.7 + objFlash;
    ctx.save();
    ctx.globalAlpha = Math.min(1, objAlpha);
    drawSkewPanel(objX, objY, objBoxW, objBoxH, { skew: 8, fill: 'rgba(8,16,38,0.88)', stroke: `rgba(0,204,255,${0.2 + objFlash * 0.5})`, lineWidth: 1.5 });
    ctx.fillStyle = objectiveFlashTimer > 60 ? `rgba(255,200,0,${0.8 + objFlash})` : DS.gold;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(trackerText, objX + 15, objY + 28);
    ctx.fillStyle = DS.textS;
    ctx.font = '16px sans-serif';
    ctx.fillText(trackerSub, objX + 15, objY + 50);
    // Progress bar (for gates, energy requirements, escape)
    if (gameState === 'finalchase' || objProgress < 1) {
      const pbW = objBoxW - 30;
      const pbH = 5;
      const pbX = objX + 15;
      const pbY = objY + objBoxH - 12;
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      roundRect(ctx, pbX, pbY, pbW, pbH, 3);
      ctx.fill();
      const pbColor = gameState === 'finalchase' ? DS.red : objProgress >= 1 ? DS.green : DS.gold;
      ctx.fillStyle = pbColor;
      roundRect(ctx, pbX, pbY, pbW * objProgress, pbH, 3);
      ctx.fill();
      // Glow on progress bar
      if (objProgress > 0.8 || gameState === 'finalchase') {
        ctx.shadowColor = pbColor;
        ctx.shadowBlur = 6;
        roundRect(ctx, pbX, pbY, pbW * objProgress, pbH, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // === SAFE ZONE BEACON during Final Chase ===
  if (gameState === 'finalchase') {
    const safeWorldY = (ZONE1_END - 3) * CFG.TILE;
    const safeWorldX = 25 * CFG.TILE;
    const beaconS = worldToScreen(safeWorldX, safeWorldY);
    // Green column of light
    const beaconAlpha = 0.15 + Math.sin(frame * 0.08) * 0.08;
    if (isMobileDevice) {
      ctx.fillStyle = `rgba(100,255,100,${beaconAlpha * 0.5})`;
      ctx.fillRect(beaconS.x - 40, beaconS.y - 200, 80, 220);
    } else {
      const beaconGrad = ctx.createLinearGradient(beaconS.x, beaconS.y - 200, beaconS.x, beaconS.y + 20);
      beaconGrad.addColorStop(0, 'rgba(100,255,100,0)');
      beaconGrad.addColorStop(0.5, `rgba(100,255,100,${beaconAlpha})`);
      beaconGrad.addColorStop(1, `rgba(100,255,100,${beaconAlpha * 0.5})`);
      ctx.fillStyle = beaconGrad;
      ctx.fillRect(beaconS.x - 40, beaconS.y - 200, 80, 220);
    }
    // Ground ring pulse
    const ringR = 30 + Math.sin(frame * 0.06) * 10;
    ctx.strokeStyle = `rgba(100,255,100,${0.3 + Math.sin(frame * 0.1) * 0.15})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(beaconS.x, beaconS.y, ringR, ringR * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
    // "安全区" label
    ctx.fillStyle = `rgba(100,255,100,${0.6 + Math.sin(frame * 0.1) * 0.2})`;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('safeZone'), beaconS.x, beaconS.y - 15);
    ctx.textAlign = 'left';
    // Direction arrow at screen edge if safe zone off-screen
    if (beaconS.y > CFG.H || beaconS.y < 0 || beaconS.x < 0 || beaconS.x > CFG.W) {
      const safeAngle = Math.atan2(safeWorldY - player.y, safeWorldX - player.x);
      const edgePadding = 50;
      const arrowX2 = Math.max(edgePadding, Math.min(CFG.W - edgePadding, CFG.W / 2 + Math.cos(safeAngle) * (CFG.W * 0.4)));
      const arrowY2 = Math.max(edgePadding, Math.min(CFG.H - edgePadding, CFG.H / 2 + Math.sin(safeAngle) * (CFG.H * 0.4)));
      const greenPulse2 = 0.5 + Math.sin(frame * 0.12) * 0.3;
      ctx.save();
      ctx.translate(arrowX2, arrowY2);
      ctx.rotate(safeAngle);
      ctx.globalAlpha = greenPulse2;
      // Arrow shape
      ctx.fillStyle = '#40FF60';
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(-8, -9);
      ctx.lineTo(-4, 0);
      ctx.lineTo(-8, 9);
      ctx.closePath();
      ctx.fill();
      ctx.shadowColor = '#40FF60';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
      // Distance text near arrow
      const safeDist = dist(player.x, player.y, safeWorldX, safeWorldY);
      ctx.fillStyle = `rgba(100,255,100,${greenPulse2})`;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${Math.floor(safeDist / CFG.TILE)}${t('tilesUnit')}`, arrowX2, arrowY2 + 18);
      ctx.textAlign = 'left';
    }
    // Also show safe zone on minimap as pulsing green circle
    const mmSafeY2 = mmY + safeWorldY * scaleY;
    const mmSafeX2 = mmX + safeWorldX * scaleX;
    ctx.fillStyle = `rgba(100,255,100,${0.3 + Math.sin(frame * 0.1) * 0.15})`;
    ctx.beginPath();
    ctx.arc(mmSafeX2, mmSafeY2, 8 + Math.sin(frame * 0.08) * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // === GRAND FISH BEACON (pulsing when in Zone 3 and fish not yet grabbed) ===
  if (grandFish && !grandFish.eaten && !hasFish && currentZoneUI === 3) {
    const gfS = worldToScreen(grandFish.x, grandFish.y);
    // If off-screen, show directional indicator
    if (gfS.x < 0 || gfS.x > CFG.W || gfS.y < 0 || gfS.y > CFG.H) {
      const gfAngle = Math.atan2(grandFish.y - player.y, grandFish.x - player.x);
      const edgePad = 50;
      const gfArrowX = Math.max(edgePad, Math.min(CFG.W - edgePad, CFG.W / 2 + Math.cos(gfAngle) * (CFG.W * 0.38)));
      const gfArrowY = Math.max(edgePad, Math.min(CFG.H - edgePad, CFG.H / 2 + Math.sin(gfAngle) * (CFG.H * 0.38)));
      const goldPulse = 0.5 + Math.sin(frame * 0.1) * 0.3;
      ctx.save();
      ctx.translate(gfArrowX, gfArrowY);
      ctx.rotate(gfAngle);
      ctx.globalAlpha = goldPulse;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(12, 0);
      ctx.lineTo(-6, -7);
      ctx.lineTo(-2, 0);
      ctx.lineTo(-6, 7);
      ctx.closePath();
      ctx.fill();
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
      ctx.fillStyle = `rgba(255,215,0,${goldPulse})`;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐟', gfArrowX, gfArrowY - 12);
      ctx.textAlign = 'left';
    }
  }

  // === GATE APPROACH FEEDBACK ===
  for (let gi = 0; gi < gates.length; gi++) {
    const gate = gates[gi];
    if (gate.open) continue;
    const gateWorldY = gate.row * CFG.TILE;
    const gateDist = Math.abs(player.y - gateWorldY);
    if (gateDist < 150) {
      const needsCanOpener = gi === 1 && !hasCanOpener;
      const hasEnough = needsCanOpener ? false : catEnergy >= gate.energyNeeded;
      const gateS = worldToScreen(25 * CFG.TILE, gateWorldY);
      // Floating requirement box near gate
      const reqBoxW = 180;
      const reqBoxH = needsCanOpener ? 40 : 50;
      const reqX = gateS.x - reqBoxW / 2;
      const reqY = gateS.y - 80;
      if (reqY > 0 && reqY < CFG.H) {
        drawSkewPanel(reqX, reqY, reqBoxW, reqBoxH, { skew: 5, fill: hasEnough ? 'rgba(10,40,20,0.88)' : 'rgba(40,10,10,0.88)', stroke: hasEnough ? 'rgba(51,255,136,0.4)' : 'rgba(255,51,102,0.4)', lineWidth: 1 });
        ctx.textAlign = 'center';
        if (needsCanOpener) {
          ctx.fillStyle = '#FF8080';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(t('needKeyTitle'), gateS.x, reqY + 16);
          ctx.fillStyle = '#BBA070';
          ctx.font = '11px sans-serif';
          ctx.fillText(t('stealFrom'), gateS.x, reqY + 30);
        } else {
          ctx.fillStyle = hasEnough ? DS.green : DS.red;
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(hasEnough ? t('canPass') : t('needMore'), gateS.x, reqY + 16);
          // Energy progress bar
          const epbW = reqBoxW - 20;
          const epbX = reqX + 10;
          const epbY = reqY + 24;
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          roundRect(ctx, epbX, epbY, epbW, 6, 3);
          ctx.fill();
          const ePct = Math.min(1, catEnergy / gate.energyNeeded);
          ctx.fillStyle = hasEnough ? DS.green : DS.gold;
          roundRect(ctx, epbX, epbY, epbW * ePct, 6, 3);
          ctx.fill();
          ctx.fillStyle = '#CCC';
          ctx.font = '11px sans-serif';
          ctx.fillText(`${Math.floor(catEnergy)} / ${gate.energyNeeded}`, gateS.x, reqY + 43);
        }
        ctx.textAlign = 'left';
      }
    }
  }

  // === CAN OPENER GRANDMA PROXIMITY HINT ===
  if (!hasCanOpener && canOpenerGrandma && !canOpenerGrandma._canOpenerStolen) {
    const cogDist = dist(player.x, player.y, canOpenerGrandma.x, canOpenerGrandma.y);
    if (cogDist < 150) {
      const gs = worldToScreen(canOpenerGrandma.x, canOpenerGrandma.y);
      const hintAlpha = Math.min(1, (150 - cogDist) / 80);
      const isBehind = Math.abs(angleDiff(canOpenerGrandma.dir, Math.atan2(player.y - canOpenerGrandma.y, player.x - canOpenerGrandma.x))) > Math.PI * 0.6;
      const isDistracted = canOpenerGrandma.catnipTimer > 0 || canOpenerGrandma.state !== 'chase';
      const canSteal = (isDistracted || isBehind) && cogDist < 40;
      // Hint bubble above grandma
      const hintY = gs.y - 65;
      ctx.globalAlpha = hintAlpha * (0.7 + Math.sin(frame * 0.08) * 0.15);
      if (canSteal) {
        drawSkewPanel(gs.x - 58, hintY - 12, 116, 24, { skew: 4, fill: 'rgba(10,40,20,0.88)', stroke: 'rgba(51,255,136,0.4)', lineWidth: 1 });
        ctx.fillStyle = DS.green;
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t('stealNow'), gs.x, hintY + 4);
      } else if (cogDist < 80) {
        // Close but can't steal yet
        let hintText = t('goToBehind');
        if (canOpenerGrandma.state === 'chase') hintText = t('sheChasing');
        else if (!isBehind) hintText = t('behindOrCatnip');
        ctx.fillStyle = 'rgba(80,60,20,0.85)';
        roundRect(ctx, gs.x - 70, hintY - 12, 140, 24, 8);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,200,100,0.4)';
        ctx.lineWidth = 1;
        roundRect(ctx, gs.x - 70, hintY - 12, 140, 24, 8);
        ctx.stroke();
        ctx.fillStyle = DS.gold;
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(hintText, gs.x, hintY + 4);
      }
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }
  }

  // Danger proximity vignette
  if (player.closestEnemyDist < 200) {
    const dangerIntensity = Math.max(0, 1 - player.closestEnemyDist / 200);
    const dangerPulse = dangerIntensity * (0.5 + Math.sin(frame * 0.15) * 0.3);
    if (isMobileDevice) {
      ctx.fillStyle = `rgba(180,0,0,${dangerPulse * 0.1})`;
    } else {
      const dangerVig = ctx.createRadialGradient(CFG.W/2, CFG.H/2, CFG.W * 0.25, CFG.W/2, CFG.H/2, CFG.W * 0.55);
      dangerVig.addColorStop(0, 'rgba(0,0,0,0)');
      dangerVig.addColorStop(1, `rgba(180,0,0,${dangerPulse * 0.25})`);
      ctx.fillStyle = dangerVig;
    }
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }
  // Directional danger arrow when enemy chasing
  if (player.anyChasing && player.closestEnemyDist < 300) {
    const arrowAngle = player.closestEnemyAngle;
    const edgeX = CFG.W / 2 + Math.cos(arrowAngle) * (CFG.W * 0.42);
    const edgeY = CFG.H / 2 + Math.sin(arrowAngle) * (CFG.H * 0.42);
    const clampedX = Math.max(30, Math.min(CFG.W - 30, edgeX));
    const clampedY = Math.max(30, Math.min(CFG.H - 30, edgeY));
    const arrowPulse = 0.5 + Math.sin(frame * 0.2) * 0.3;
    ctx.save();
    ctx.translate(clampedX, clampedY);
    ctx.rotate(arrowAngle);
    ctx.globalAlpha = arrowPulse;
    ctx.fillStyle = '#FF2020';
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(-6, -7);
    ctx.lineTo(-6, 7);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Escape route arrows pointing to nearest hide spots when being chased
  if (player.anyChasing) {
    let closestBox = null, closestBoxDist = Infinity;
    for (const h of hideSpots) {
      if (h === player.hidingBox) continue;
      const d = dist(player.x, player.y, h.x, h.y);
      if (d < closestBoxDist && d < 300 && d > 30) {
        closestBoxDist = d;
        closestBox = h;
      }
    }
    if (closestBox) {
      const boxAngle = Math.atan2(closestBox.y - player.y, closestBox.x - player.x);
      const arrowDist = Math.min(50, closestBoxDist * 0.3);
      const ps = worldToScreen(player.x, player.y);
      const ax = ps.x + Math.cos(boxAngle) * arrowDist;
      const ay = ps.y + Math.sin(boxAngle) * arrowDist;
      const greenPulse = 0.4 + Math.sin(frame * 0.15) * 0.2;
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(boxAngle);
      ctx.globalAlpha = greenPulse;
      ctx.fillStyle = '#40FF40';
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.lineTo(-4, -5);
      ctx.lineTo(-4, 5);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // Also highlight nearby bushes as escape option
    const ps2 = worldToScreen(player.x, player.y);
    const ptx = Math.floor(player.x / CFG.TILE);
    const pty = Math.floor(player.y / CFG.TILE);
    for (let bdy = -4; bdy <= 4; bdy++) {
      for (let bdx = -4; bdx <= 4; bdx++) {
        const btx = ptx + bdx, bty = pty + bdy;
        if (btx >= 0 && btx < CFG.MAP_W && bty >= 0 && bty < CFG.MAP_H && map[bty] && map[bty][btx] === 5) {
          const bs = worldToScreen(btx * CFG.TILE + 20, bty * CFG.TILE + 20);
          const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
          if (bdist > 1 && bdist < 5) {
            ctx.fillStyle = `rgba(80,200,80,${0.06 + Math.sin(frame * 0.1) * 0.02})`;
            ctx.beginPath();
            ctx.arc(bs.x, bs.y, 15, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
  }

  // Final chase warning — dramatic night alarm
  if (gameState === 'finalchase') {
    finalChaseTimer++;
    // Red/blue police light flashing on edges
    const flashPhase = Math.sin(finalChaseTimer * 0.15);
    if (isMobileDevice) {
      // Flat flash on mobile
      ctx.fillStyle = `rgba(255,20,0,${Math.max(0, flashPhase) * 0.12})`;
      ctx.fillRect(0, 0, 40, CFG.H);
      ctx.fillStyle = `rgba(0,60,255,${Math.max(0, -flashPhase) * 0.12})`;
      ctx.fillRect(CFG.W - 40, 0, 40, CFG.H);
    } else {
      // Red flash on left
      const redGrad = ctx.createLinearGradient(0, 0, 80, 0);
      redGrad.addColorStop(0, `rgba(255,20,0,${Math.max(0, flashPhase) * 0.2})`);
      redGrad.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = redGrad;
      ctx.fillRect(0, 0, 80, CFG.H);
      // Blue flash on right
      const blueGrad = ctx.createLinearGradient(CFG.W, 0, CFG.W - 80, 0);
      blueGrad.addColorStop(0, `rgba(0,60,255,${Math.max(0, -flashPhase) * 0.2})`);
      blueGrad.addColorStop(1, 'rgba(0,60,255,0)');
      ctx.fillStyle = blueGrad;
      ctx.fillRect(CFG.W - 80, 0, 80, CFG.H);
    }
    // Top/bottom red pulse
    const pulseA = Math.abs(Math.sin(finalChaseTimer * 0.08)) * 0.08;
    ctx.fillStyle = `rgba(255,0,0,${pulseA})`;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    // Warning banner — angular
    const bannerW = 420;
    const bannerH = 55;
    drawSkewPanel(CFG.W / 2 - bannerW / 2, CFG.H - 68, bannerW, bannerH, { skew: 10, fill: 'rgba(80,0,20,0.88)', stroke: 'rgba(255,51,102,0.5)' });
    ctx.fillStyle = DS.red;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = DS.red;
    ctx.shadowBlur = 10;
    ctx.fillText(t('chaseAlert'), CFG.W / 2, CFG.H - 47);
    ctx.shadowBlur = 0;
    // Escape progress bar in banner
    const safeY2 = (ZONE1_END - 3) * CFG.TILE;
    const startY2 = ZONE3_START * CFG.TILE;
    const escPct = Math.max(0, Math.min(1, (player.y - startY2) / (safeY2 - startY2)));
    const epW = bannerW - 40;
    const epX2 = CFG.W / 2 - epW / 2;
    const epY2 = CFG.H - 28;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, epX2, epY2, epW, 8, 4);
    ctx.fill();
    // Gradient bar: red → yellow → green
    const escGrad = ctx.createLinearGradient(epX2, 0, epX2 + epW, 0);
    escGrad.addColorStop(0, DS.red);
    escGrad.addColorStop(0.5, DS.gold);
    escGrad.addColorStop(1, DS.green);
    ctx.fillStyle = escGrad;
    roundRect(ctx, epX2, epY2, epW * escPct, 8, 4);
    ctx.fill();
    // Paw icon at progress position
    const pawX = epX2 + epW * escPct;
    ctx.fillStyle = '#FFF';
    ctx.font = '10px sans-serif';
    ctx.fillText('🐾', pawX - 6, epY2 - 3);
    // "安全" label at end
    ctx.fillStyle = '#90EE90';
    ctx.font = '9px sans-serif';
    ctx.fillText('🏠', epX2 + epW + 8, epY2 + 7);
    ctx.textAlign = 'left';
  }

  // Controls hint removed — tutorial system handles onboarding

  // === MOBILE TOUCH CONTROLS: Joystick + Ergonomic Button Layout ===
  if (isTouchDevice && (gameState === 'playing' || gameState === 'finalchase')) {
    ctx.save();

    // --- JOYSTICK (left thumb) ---
    if (joystick.active) {
      // Outer ring
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(joystick.cx, joystick.cy, joystick.radius, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(joystick.cx, joystick.cy, joystick.radius, 0, Math.PI * 2); ctx.stroke();
      // Direction indicator arc
      if (joystick.mag > 0.1) {
        const angle = Math.atan2(joystick.dy, joystick.dx);
        ctx.globalAlpha = 0.3 * joystick.mag;
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(joystick.cx, joystick.cy, joystick.radius, angle - 0.4, angle + 0.4); ctx.stroke();
      }
      // Inner knob
      ctx.globalAlpha = 0.7;
      if (isMobileDevice) {
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
      } else {
        const knobGrad = ctx.createRadialGradient(joystick.x, joystick.y, 0, joystick.x, joystick.y, joystick.knobRadius);
        knobGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
        knobGrad.addColorStop(1, 'rgba(255,255,255,0.15)');
        ctx.fillStyle = knobGrad;
      }
      ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.knobRadius, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.knobRadius, 0, Math.PI * 2); ctx.stroke();
    } else {
      // Idle hint: show faded joystick placeholder in left zone
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(180, CFG.H - 130, joystick.radius, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(180, CFG.H - 130, joystick.knobRadius, 0, Math.PI * 2); ctx.fill();
    }

    ctx.textAlign = 'center';

    // --- SKILL CLUSTER (right thumb, bottom-right) ---
    // Dash — primary, large
    const dashX = TB.dashX(), dashY = TB.dashY();
    const dashReady = player.dashCooldown <= 0;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(dashX, dashY, TB.dashR, 0, Math.PI * 2); ctx.fill();
    // Cooldown arc fill
    if (!dashReady) {
      const cdMax = gameState === 'finalchase' ? 40 : CFG.DASH_COOLDOWN;
      const cdPct = 1 - player.dashCooldown / cdMax;
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#00AADD';
      ctx.beginPath();
      ctx.moveTo(dashX, dashY);
      ctx.arc(dashX, dashY, TB.dashR, -Math.PI / 2, -Math.PI / 2 + cdPct * Math.PI * 2);
      ctx.closePath(); ctx.fill();
    }
    // Border ring
    ctx.globalAlpha = vBtn.dash ? 0.9 : 0.55;
    ctx.strokeStyle = DS.cyan;
    ctx.lineWidth = dashReady ? 3 : 2;
    ctx.beginPath(); ctx.arc(dashX, dashY, TB.dashR, 0, Math.PI * 2); ctx.stroke();
    // Ready glow pulse
    if (dashReady) {
      ctx.globalAlpha = 0.12 + Math.sin(frame * 0.1) * 0.06;
      ctx.fillStyle = DS.cyan;
      ctx.beginPath(); ctx.arc(dashX, dashY, TB.dashR + 4, 0, Math.PI * 2); ctx.fill();
    }
    // Icon
    ctx.globalAlpha = dashReady ? 0.9 : 0.4;
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText('⚡', dashX, dashY + 10);

    // Sneak — secondary, smaller, above-left of dash
    const snkX = TB.sneakX(), snkY = TB.sneakY();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(snkX, snkY, TB.sneakR, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = vBtn.sneak ? 0.75 : 0.45;
    if (vBtn.sneak) {
      ctx.fillStyle = 'rgba(150,80,220,0.35)';
      ctx.beginPath(); ctx.arc(snkX, snkY, TB.sneakR, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = vBtn.sneak ? '#BB77FF' : '#666';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(snkX, snkY, TB.sneakR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = vBtn.sneak ? 0.9 : 0.5;
    ctx.fillStyle = '#FFF';
    ctx.font = '22px sans-serif';
    ctx.fillText('🐾', snkX, snkY + 7);

    // --- ITEM SLOT (right side, above skill cluster, separated) ---
    const catX = TB.catnipX(), catY = TB.catnipY();
    // Separator line between item and skills
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(catX - 35, catY + TB.catnipR + 12);
    ctx.lineTo(catX + 35, catY + TB.catnipR + 12);
    ctx.stroke();
    // Item circle
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(catX, catY, TB.catnipR, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = vBtn.catnip ? 0.85 : 0.5;
    ctx.strokeStyle = catnipCount > 0 ? '#44DD66' : '#555';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(catX, catY, TB.catnipR, 0, Math.PI * 2); ctx.stroke();
    // Icon
    ctx.globalAlpha = catnipCount > 0 ? 0.85 : 0.25;
    ctx.fillStyle = '#FFF';
    ctx.font = '24px sans-serif';
    ctx.fillText('🌿', catX, catY + 8);
    // Count badge
    if (catnipCount > 0) {
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#44DD66';
      ctx.beginPath(); ctx.arc(catX + 26, catY - 24, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText(String(catnipCount), catX + 26, catY - 20);
    }

    // --- MENU (top-right, small, unobtrusive) ---
    const mX = TB.menuX(), mY = TB.menuY();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(mX, mY, TB.menuR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(mX, mY, TB.menuR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#CCC';
    ctx.font = '18px sans-serif';
    ctx.fillText('☰', mX, mY + 6);

    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // === PAUSE BUTTON — angular DS style (enlarged for visibility) ===
  if (gameState === 'playing' || gameState === 'finalchase') {
    const pbX = CFG.W - 40, pbY = isTouchDevice ? 40 : 30;
    const pbR = isTouchDevice ? 30 : 24;
    ctx.save();
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = 'rgba(8,16,38,0.8)';
    ctx.beginPath(); ctx.arc(pbX, pbY, pbR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = DS.borderCyan;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(pbX, pbY, pbR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = DS.cyan;
    roundRect(ctx, pbX - 8, pbY - 10, 6, 20, 2); ctx.fill();
    roundRect(ctx, pbX + 3, pbY - 10, 6, 20, 2); ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// === DESIGN SYSTEM ===
const DS = {
  bgDark: '#080c18', bgPanel: 'rgba(8,16,38,0.92)', bgPanelLight: 'rgba(12,22,50,0.85)',
  cyan: '#00ccff', cyanDim: 'rgba(0,204,255,0.25)', cyanGlow: 'rgba(0,204,255,0.5)',
  gold: '#ffc800', goldDim: 'rgba(255,200,0,0.25)', goldBright: '#ffe040',
  red: '#ff3366', green: '#33ff88',
  textP: '#ffffff', textS: '#8899bb', textM: '#556688',
  borderCyan: 'rgba(0,204,255,0.35)', borderGold: 'rgba(255,200,0,0.35)',
};

function drawSkewPath(x, y, w, h, sk) {
  ctx.beginPath();
  ctx.moveTo(x + sk, y); ctx.lineTo(x + w, y);
  ctx.lineTo(x + w - sk, y + h); ctx.lineTo(x, y + h);
  ctx.closePath();
}

function drawSkewPanel(x, y, w, h, opts) {
  opts = opts || {};
  const sk = opts.skew != null ? opts.skew : 12;
  drawSkewPath(x, y, w, h, sk);
  ctx.fillStyle = opts.fill || DS.bgPanel;
  ctx.fill();
  if (opts.stroke !== false) {
    ctx.strokeStyle = opts.stroke || DS.borderCyan;
    ctx.lineWidth = opts.lineWidth || 1.5;
    ctx.stroke();
  }
  // Accent top bar
  if (opts.accent) {
    ctx.fillStyle = opts.accent;
    ctx.beginPath();
    ctx.moveTo(x + sk, y); ctx.lineTo(x + w, y);
    ctx.lineTo(x + w - 1, y + 3); ctx.lineTo(x + sk - 1, y + 3);
    ctx.closePath(); ctx.fill();
  }
}

function drawClipPanel(x, y, w, h, opts) {
  opts = opts || {};
  const cut = opts.cut || 20;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x + w - cut, y);
  ctx.lineTo(x + w, y + cut); ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h); ctx.closePath();
  ctx.fillStyle = opts.fill || DS.bgPanel;
  ctx.fill();
  if (opts.stroke !== false) {
    ctx.strokeStyle = opts.stroke || DS.borderCyan;
    ctx.lineWidth = opts.lineWidth || 1.5;
    ctx.stroke();
  }
}

function drawAngularBtn(text, cx, cy, w, h) {
  const isHover = mouse.x > cx - w/2 && mouse.x < cx + w/2 && mouse.y > cy - h/2 && mouse.y < cy + h/2;
  const sk = 7, x = cx - w/2, y = cy - h/2;
  // Shadow
  ctx.globalAlpha = 0.4;
  drawSkewPath(x + 3, y + 3, w, h, sk);
  ctx.fillStyle = '#000'; ctx.fill();
  ctx.globalAlpha = 1;
  // Body
  const grad = ctx.createLinearGradient(0, y, 0, y + h);
  if (isHover) { grad.addColorStop(0, '#ffe860'); grad.addColorStop(1, '#ddaa00'); }
  else { grad.addColorStop(0, DS.gold); grad.addColorStop(1, '#b89200'); }
  drawSkewPath(x, y, w, h, sk);
  ctx.fillStyle = grad; ctx.fill();
  if (isHover) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
  // Text
  ctx.fillStyle = '#1a1000';
  ctx.font = `bold ${h > 36 ? 18 : 15}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(text, cx, cy + (h > 36 ? 7 : 6));
  return isHover;
}

function drawDiagStripes(x, y, w, h, color, spacing) {
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.strokeStyle = color || 'rgba(0,204,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = -h; i < w + h; i += (spacing || 30)) {
    ctx.beginPath(); ctx.moveTo(x + i, y + h); ctx.lineTo(x + i + h, y); ctx.stroke();
  }
  ctx.restore();
}

// SECTION: Title / Game Over / Victory Screens
function drawTitle() {
  // Dark navy background
  if (IMG.titleBg && IMG.titleBg.complete && IMG.titleBg.naturalWidth > 0) {
    ctx.drawImage(IMG.titleBg, 0, 0, CFG.W, CFG.H);
    ctx.fillStyle = 'rgba(8,12,24,0.7)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  } else {
    const skyGrad = ctx.createLinearGradient(0, 0, CFG.W, CFG.H);
    skyGrad.addColorStop(0, '#060a14');
    skyGrad.addColorStop(0.5, '#0c1428');
    skyGrad.addColorStop(1, '#081020');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }
  // Diagonal decorative stripes
  drawDiagStripes(0, 0, CFG.W, CFG.H, 'rgba(0,204,255,0.03)', 40);
  // Subtle star particles
  for (let i = 0; i < 25; i++) {
    const fx = (i * 53 + 17) % CFG.W;
    const fy = (i * 37 + 11) % CFG.H;
    const gp = Math.sin(frame * 0.04 + i * 2.1) * 0.3 + 0.3;
    ctx.globalAlpha = gp;
    ctx.fillStyle = i % 3 === 0 ? DS.cyan : '#8899bb';
    ctx.beginPath(); ctx.arc(fx, fy, i % 5 === 0 ? 1.5 : 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Cyan glow accents in corners
  const cg1 = ctx.createRadialGradient(0, 0, 0, 0, 0, 300);
  cg1.addColorStop(0, 'rgba(0,204,255,0.05)'); cg1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg1; ctx.fillRect(0, 0, 300, 300);
  const cg2 = ctx.createRadialGradient(CFG.W, CFG.H, 0, CFG.W, CFG.H, 300);
  cg2.addColorStop(0, 'rgba(0,204,255,0.04)'); cg2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg2; ctx.fillRect(CFG.W - 300, CFG.H - 300, 300, 300);
  if (titlePage === 0) { drawTitleMain(); } else if (titlePage === 2) { drawTitleBreedSelect(); } else { drawTitleTutorial(); }
}

function drawTitleBreedSelect() {
  const cx = CFG.W / 2;
  // Main panel — clip corner
  drawClipPanel(40, 35, CFG.W - 80, CFG.H - 70, { cut: 30, fill: DS.bgPanel, stroke: DS.borderCyan });
  drawDiagStripes(40, 35, CFG.W - 80, CFG.H - 70, 'rgba(0,204,255,0.03)', 35);
  ctx.fillStyle = DS.cyan;
  ctx.fillRect(40, 35, CFG.W - 110, 3);
  // Title banner
  drawSkewPanel(cx - 180, 48, 360, 38, { skew: 10, fill: 'rgba(0,204,255,0.12)', stroke: DS.borderCyan });
  ctx.textAlign = 'center';
  ctx.fillStyle = DS.gold;
  ctx.font = 'bold 26px sans-serif';
  ctx.fillText(t('selectCat'), cx, 75);
  // Breed cards
  const cardW = 240, cardH = 360, gap = 28;
  const totalW = CAT_BREEDS.length * cardW + (CAT_BREEDS.length - 1) * gap;
  const startX = cx - totalW / 2;
  for (let i = 0; i < CAT_BREEDS.length; i++) {
    const b = CAT_BREEDS[i];
    const bx = startX + i * (cardW + gap);
    const by = 105;
    const locked = !isBreedUnlocked(b);
    const isSelected = !locked && selectedBreed && selectedBreed.id === b.id;
    const cardFill = locked ? 'rgba(40,40,50,0.6)' : isSelected ? 'rgba(0,204,255,0.12)' : 'rgba(255,255,255,0.04)';
    const cardStroke = locked ? 'rgba(100,100,100,0.3)' : isSelected ? DS.cyan : 'rgba(255,255,255,0.1)';
    drawClipPanel(bx, by, cardW, cardH, { cut: 18, fill: cardFill, stroke: cardStroke, lineWidth: isSelected ? 2 : 1 });
    if (isSelected) { ctx.fillStyle = DS.cyan; ctx.fillRect(bx, by, cardW - 18, 2); }
    // Mini procedural cat preview — enlarged as main visual element
    ctx.save();
    ctx.translate(bx + cardW / 2, by + 70);
    ctx.scale(1.8, 1.8);
    const mp = getBreedPalette(b.id);
    ctx.fillStyle = 'rgba(0,0,20,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 18, 14, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = mp.tail; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(10, 2);
    ctx.quadraticCurveTo(20, -8 + Math.sin(frame * 0.06) * 6, 24, -2 + Math.sin(frame * 0.08) * 5);
    ctx.stroke();
    ctx.fillStyle = mp.body;
    ctx.beginPath(); ctx.ellipse(0, 2, 12, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = mp.belly;
    ctx.beginPath(); ctx.ellipse(0, 4, 7, 9, 0, 0, Math.PI * 2); ctx.fill();
    if (mp.hasStripes) {
      ctx.strokeStyle = mp.stripe; ctx.lineWidth = 1.2;
      for (let si2 = -1; si2 <= 1; si2++) {
        ctx.beginPath(); ctx.moveTo(si2 * 4 - 1, -8); ctx.lineTo(si2 * 4 + 1, -3); ctx.stroke();
      }
    }
    ctx.fillStyle = mp.head;
    ctx.beginPath(); ctx.arc(0, -10, 9, 0, Math.PI * 2); ctx.fill();
    if (mp.hasFaceMask) {
      ctx.fillStyle = mp.faceMask;
      ctx.beginPath(); ctx.ellipse(0, -8, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = mp.ear;
    ctx.beginPath(); ctx.moveTo(-8, -14); ctx.lineTo(-5, -22); ctx.lineTo(-2, -14); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2, -14); ctx.lineTo(5, -22); ctx.lineTo(8, -14); ctx.fill();
    ctx.fillStyle = mp.innerEar;
    ctx.beginPath(); ctx.moveTo(-6, -14); ctx.lineTo(-5, -19); ctx.lineTo(-3, -14); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3, -14); ctx.lineTo(5, -19); ctx.lineTo(7, -14); ctx.fill();
    const mBlink = Math.sin(frame * 0.08 + b.id.length) > 0.95;
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(-3.5, -12, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3.5, -12, 3, 0, Math.PI * 2); ctx.fill();
    if (!mBlink) {
      ctx.fillStyle = mp.eyeIris;
      ctx.beginPath(); ctx.arc(-3.5, -12, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3.5, -12, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-3.5, -12, 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3.5, -12, 0.8, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.moveTo(-5.5, -12); ctx.lineTo(-1.5, -12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(1.5, -12); ctx.lineTo(5.5, -12); ctx.stroke();
    }
    ctx.fillStyle = mp.nose;
    ctx.beginPath(); ctx.moveTo(0, -9); ctx.lineTo(-1.5, -7.5); ctx.lineTo(1.5, -7.5); ctx.fill();
    ctx.strokeStyle = '#888'; ctx.lineWidth = 0.6;
    for (const ws of [-1, 1]) {
      ctx.beginPath(); ctx.moveTo(ws * 5, -9); ctx.lineTo(ws * 13, -11); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ws * 5, -8); ctx.lineTo(ws * 13, -8); ctx.stroke();
    }
    if (mp.hasPointColor) {
      ctx.fillStyle = mp.pointColor;
      ctx.beginPath(); ctx.ellipse(-6, 12, 3, 2.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(6, 12, 3, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(currentLang === 'en' ? b.nameEn : b.name, bx + cardW / 2, by + 120);
    ctx.fillStyle = DS.textS;
    ctx.font = '12px sans-serif';
    ctx.fillText(currentLang === 'en' ? b.descEn : b.desc, bx + cardW / 2, by + 143);
    // Stats bars
    const stats = [
      { label: t('breedSpeed'), val: b.speedMod, color: DS.cyan },
      { label: t('breedStealth'), val: b.sneakMod, color: '#aa88ff' },
      { label: t('breedEnergy'), val: b.energyMod, color: DS.green },
      { label: t('breedDash'), val: 2 - b.dashCooldownMod, color: DS.gold },
      { label: t('breedScore'), val: b.scoreMod, color: DS.red },
    ];
    for (let si = 0; si < stats.length; si++) {
      const sy = by + 165 + si * 30;
      ctx.fillStyle = DS.textS;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(stats[si].label, bx + 15, sy + 10);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, bx + 70, sy, cardW - 85, 12, 3);
      ctx.fill();
      const pct = Math.min(1, stats[si].val / 1.5);
      ctx.fillStyle = stats[si].color;
      if (pct > 0) { roundRect(ctx, bx + 70, sy, (cardW - 85) * pct, 12, 3); ctx.fill(); }
      ctx.textAlign = 'center';
    }
    if (b.bonusLives > 0) {
      ctx.fillStyle = DS.red;
      ctx.font = '11px sans-serif';
      ctx.fillText('+' + b.bonusLives + ' ❤️', bx + cardW / 2, by + 305);
    }
    // Select button — angular
    const btnY = by + cardH - 40;
    const isHover = !locked && mouse.x > bx + 30 && mouse.x < bx + cardW - 30 && mouse.y > btnY - 15 && mouse.y < btnY + 15;
    if (locked) {
      drawSkewPanel(bx + 30, btnY - 15, cardW - 60, 30, { skew: 5, fill: 'rgba(60,60,70,0.5)', stroke: 'rgba(100,100,100,0.3)', lineWidth: 1 });
      ctx.fillStyle = '#888';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      const lockLabels = { 0: '', 1: currentLang === 'en' ? '🔒 Reach Zone 2' : '🔒 到达宴会厅解锁', 2: currentLang === 'en' ? '🔒 Reach Zone 3' : '🔒 到达VIP区解锁', 3: currentLang === 'en' ? '🔒 Win the game' : '🔒 通关解锁' };
      ctx.fillText(lockLabels[b.unlockZone] || '🔒', bx + cardW / 2, btnY + 4);
      // Darken the whole card
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      drawClipPanel(bx, by, cardW, cardH, { cut: 18, fill: 'rgba(0,0,0,0.35)', stroke: false });
    } else if (isSelected) {
      drawSkewPanel(bx + 30, btnY - 15, cardW - 60, 30, { skew: 5, fill: DS.cyan, stroke: false });
      ctx.fillStyle = '#000';
    } else {
      drawSkewPanel(bx + 30, btnY - 15, cardW - 60, 30, { skew: 5, fill: isHover ? 'rgba(0,204,255,0.2)' : 'rgba(255,255,255,0.06)', stroke: DS.borderCyan, lineWidth: 1 });
      ctx.fillStyle = '#FFF';
    }
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isSelected ? '✓' : t('breedSelect'), bx + cardW / 2, btnY + 4);
  }
  drawAngularBtn(t('breedBack'), cx, CFG.H - 50, 180, 36);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  gameOverTimer++;
  const gt = gameOverTimer;
  // Dark navy overlay with red tint
  const overlayAlpha = Math.min(0.88, gt / 30);
  const goGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
  goGrad.addColorStop(0, `rgba(8,6,20,${overlayAlpha})`);
  goGrad.addColorStop(1, `rgba(40,8,8,${overlayAlpha})`);
  ctx.fillStyle = goGrad;
  ctx.fillRect(0, 0, CFG.W, CFG.H);
  // Red flash
  if (gt < 15) {
    ctx.fillStyle = `rgba(255,0,0,${(15 - gt) / 30})`;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }
  // Diagonal stripes bg
  if (gt > 5) drawDiagStripes(0, 0, CFG.W, CFG.H, `rgba(255,50,50,${Math.min(0.03, gt / 500)})`, 40);
  // Red spotlight
  const spotR = Math.min(180, gt * 6);
  if (spotR > 10) {
    const spotGrad = ctx.createRadialGradient(CFG.W / 2, CFG.H / 2 - 40, 0, CFG.W / 2, CFG.H / 2 - 40, spotR);
    spotGrad.addColorStop(0, 'rgba(255,80,80,0.08)');
    spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = spotGrad;
    ctx.beginPath(); ctx.arc(CFG.W / 2, CFG.H / 2 - 40, spotR, 0, Math.PI * 2); ctx.fill();
  }
  // Card — angular with clip corner
  const cardSlide = Math.min(0, -60 + gt * 4);
  const cardAlpha = Math.min(1, gt / 20);
  const cardY = CFG.H / 2 - 150 + cardSlide;
  const cx = CFG.W / 2;
  ctx.globalAlpha = cardAlpha;
  drawClipPanel(cx - 250, cardY, 500, 300, { cut: 28, fill: 'rgba(15,8,25,0.9)', stroke: 'rgba(255,50,80,0.4)' });
  // Red accent bar
  ctx.fillStyle = DS.red;
  ctx.fillRect(cx - 250, cardY, 472, 3);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  // Phase 1: Cat
  if (gt > 10) {
    const catAlpha = Math.min(1, (gt - 10) / 20);
    const catShake = gt < 25 ? Math.sin((gt - 10) * 0.8) * 3 : 0;
    ctx.globalAlpha = catAlpha;
    const catCY = cardY + 80;
    if (IMG.gameoverCat && IMG.gameoverCat.complete && IMG.gameoverCat.naturalWidth > 0) {
      const imgS = 180;
      ctx.save();
      ctx.shadowColor = 'rgba(255,50,80,0.4)';
      ctx.shadowBlur = 25;
      ctx.drawImage(IMG.gameoverCat, cx - imgS / 2 + catShake, catCY - imgS / 2, imgS, imgS);
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.fillStyle = '#F5A623';
      ctx.beginPath(); ctx.arc(cx + catShake, catCY, 40, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // Phase 2: Title — angular banner
  if (gt > 30) {
    const tAlpha = Math.min(1, (gt - 30) / 15);
    const tScale = gt < 45 ? 0.7 + (gt - 30) / 50 : 1;
    ctx.save();
    ctx.globalAlpha = tAlpha;
    drawSkewPanel(cx - 160, cardY + 140, 320, 38, { skew: 8, fill: 'rgba(255,50,80,0.2)', stroke: 'rgba(255,50,80,0.4)' });
    ctx.translate(cx, cardY + 164);
    ctx.scale(tScale, tScale);
    ctx.font = 'bold 42px sans-serif';
    ctx.strokeStyle = '#330011'; ctx.lineWidth = 5;
    ctx.strokeText(t('caught'), 0, 0);
    ctx.fillStyle = DS.red;
    ctx.fillText(t('caught'), 0, 0);
    ctx.restore();
  }
  // Phase 3: Flavor text
  if (gt > 50) {
    const ftAlpha = Math.min(1, (gt - 50) / 20);
    const loseTexts = [t('lose1'), t('lose2'), t('lose3'), t('lose4')];
    ctx.globalAlpha = ftAlpha;
    const bubbleY = cardY + 188;
    const bubbleText = loseTexts[Math.floor(frame / 90) % 4];
    ctx.font = '15px sans-serif';
    const bw = Math.min(380, ctx.measureText(bubbleText).width + 30);
    drawSkewPanel(cx - bw / 2, bubbleY - 14, bw, 28, { skew: 4, fill: 'rgba(255,50,80,0.08)', stroke: false });
    ctx.fillStyle = DS.textS;
    ctx.fillText(bubbleText, cx, bubbleY + 4);
    ctx.globalAlpha = 1;
  }
  // Phase 4: Stats
  if (gt > 70) {
    const sAlpha = Math.min(1, (gt - 70) / 15);
    const sSlide = Math.max(0, 15 - (gt - 70) * 2);
    ctx.globalAlpha = sAlpha;
    const statsY = cardY + 232 + sSlide;
    const statItems = [
      { icon: '\u2605', value: `${score}`, label: t('score'), color: DS.gold },
      { icon: '\uD83C\uDF56', value: `${totalEaten}`, label: t('food'), color: '#FFB060' },
      { icon: '\uD83D\uDD25', value: `${maxCombo}x`, label: t('maxCombo'), color: '#FFF' },
    ];
    const colWidth = 110, startX2 = cx - (statItems.length * colWidth) / 2;
    for (let i = 0; i < statItems.length; i++) {
      const sx = startX2 + i * colWidth + colWidth / 2;
      ctx.font = '22px sans-serif'; ctx.fillStyle = statItems[i].color;
      ctx.fillText(statItems[i].icon, sx, statsY);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(statItems[i].value, sx, statsY + 22);
      ctx.font = '10px sans-serif'; ctx.fillStyle = DS.textM;
      ctx.fillText(statItems[i].label, sx, statsY + 36);
    }
    ctx.globalAlpha = 1;
  }
  // Phase 5: Restart
  if (gt > 100) {
    if (Math.sin(frame * 0.06) > 0) {
      ctx.fillStyle = DS.gold;
      ctx.font = 'bold 17px sans-serif';
      ctx.fillText(t('clickRestart'), cx, cardY + 284);
    }
  }
  ctx.textAlign = 'left';
}

function drawVictory() {
  victoryRevealTimer++;
  const vt = victoryRevealTimer;
  // Dark navy overlay
  const vicGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
  vicGrad.addColorStop(0, `rgba(6,8,20,${Math.min(0.88, vt / 25)})`);
  vicGrad.addColorStop(0.5, `rgba(8,15,30,${Math.min(0.85, vt / 25)})`);
  vicGrad.addColorStop(1, `rgba(6,20,12,${Math.min(0.85, vt / 25)})`);
  ctx.fillStyle = vicGrad;
  ctx.fillRect(0, 0, CFG.W, CFG.H);
  // Diagonal stripes
  if (vt > 5) drawDiagStripes(0, 0, CFG.W, CFG.H, `rgba(0,204,255,${Math.min(0.03, vt / 500)})`, 40);
  // Stars
  for (let i = 0; i < 40; i++) {
    const sx = (i * 53 + 17) % CFG.W;
    const sy = (i * 37 + 11) % (CFG.H * 0.4);
    const starAlpha = Math.sin(frame * 0.03 + i * 2.1) * 0.3 + 0.4;
    if (vt > 10) {
      ctx.fillStyle = i % 4 === 0 ? `rgba(0,204,255,${starAlpha * Math.min(1, (vt - 10) / 30)})` : `rgba(255,240,200,${starAlpha * Math.min(1, (vt - 10) / 30)})`;
      ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
    }
  }
  // Particles
  const particleCount = Math.min(50, Math.floor(vt / 2));
  for (let i = 0; i < particleCount; i++) {
    const px = (i * 43 + vt * 1.5) % CFG.W;
    const py = (i * 67 + vt * 0.8) % CFG.H;
    const confGlow = Math.sin(frame * 0.06 + i * 1.3) * 0.3 + 0.6;
    ctx.globalAlpha = confGlow * Math.min(1, (vt - i * 2) / 20);
    const colors = [DS.gold, DS.cyan, DS.green, '#FFB060', DS.red, '#60DDFF', '#FF60FF'];
    ctx.fillStyle = colors[i % 7];
    ctx.beginPath();
    if (i % 3 === 0) ctx.arc(px, py, 3 + Math.sin(frame * 0.08 + i), 0, Math.PI * 2);
    else if (i % 3 === 1) { ctx.save(); ctx.translate(px, py); ctx.rotate(frame * 0.02 + i); ctx.rect(-2, -2, 4, 4); ctx.restore(); }
    else ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill(); ctx.globalAlpha = 1;
  }
  // Cyan spotlight
  const spotR = Math.min(220, vt * 4);
  if (spotR > 0) {
    const vSpot = ctx.createRadialGradient(CFG.W / 2, CFG.H / 2 - 40, 0, CFG.W / 2, CFG.H / 2 - 40, spotR);
    vSpot.addColorStop(0, `rgba(0,204,255,${Math.min(0.1, vt / 500)})`);
    vSpot.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = vSpot;
    ctx.beginPath(); ctx.arc(CFG.W / 2, CFG.H / 2 - 40, spotR, 0, Math.PI * 2); ctx.fill();
  }
  // Card — angular
  const cardSlide = Math.min(0, -80 + vt * 4);
  const cardY = CFG.H / 2 - 160 + cardSlide;
  const cardAlpha = Math.min(1, vt / 20);
  const cx = CFG.W / 2;
  ctx.globalAlpha = cardAlpha;
  drawClipPanel(cx - 300, cardY, 600, 320, { cut: 30, fill: DS.bgPanel, stroke: DS.borderGold });
  ctx.fillStyle = DS.gold;
  ctx.fillRect(cx - 300, cardY, 570, 3);
  ctx.globalAlpha = 1;

  // Phase 1: Cat
  if (vt > 15) {
    const catAlpha = Math.min(1, (vt - 15) / 20);
    const catBounce = vt < 35 ? Math.sin((vt - 15) * 0.2) * 8 : 0;
    ctx.globalAlpha = catAlpha;
    const catCY = cardY + 80 + catBounce;
    if (IMG.victoryCat && IMG.victoryCat.complete && IMG.victoryCat.naturalWidth > 0) {
      const imgS = 160;
      ctx.save();
      ctx.shadowColor = DS.cyanGlow;
      ctx.shadowBlur = 20;
      ctx.drawImage(IMG.victoryCat, cx - imgS / 2, catCY - imgS / 2, imgS, imgS);
      ctx.shadowBlur = 0; ctx.restore();
    } else {
      ctx.fillStyle = '#F5A623';
      ctx.beginPath(); ctx.arc(cx, catCY, 40, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'center';
  // Phase 2: Title — angular banner
  if (vt > 35) {
    const titleAlpha = Math.min(1, (vt - 35) / 20);
    const titleScale = vt < 50 ? 0.8 + (vt - 35) / 75 : 1;
    ctx.save();
    ctx.globalAlpha = titleAlpha;
    drawSkewPanel(cx - 190, cardY + 135, 380, 40, { skew: 10, fill: 'rgba(0,204,255,0.12)', stroke: DS.borderCyan });
    ctx.translate(cx, cardY + 160);
    ctx.scale(titleScale, titleScale);
    ctx.font = 'bold 44px sans-serif';
    ctx.strokeStyle = '#003355'; ctx.lineWidth = 5;
    ctx.strokeText(t('missionComplete'), 0, 0);
    const vicTitleGrad = ctx.createLinearGradient(-80, -20, 80, 20);
    vicTitleGrad.addColorStop(0, DS.gold);
    vicTitleGrad.addColorStop(0.5, DS.goldBright);
    vicTitleGrad.addColorStop(1, DS.gold);
    ctx.fillStyle = vicTitleGrad;
    ctx.fillText(t('missionComplete'), 0, 0);
    ctx.restore();
  }
  // Phase 3: Rating
  if (vt > 60) {
    let rating = t('rank0');
    let ratingColor = '#CCC';
    let ratingGlow = '';
    if (score > 1500) { rating = t('rank1'); ratingColor = DS.green; }
    if (score > 3000) { rating = t('rank2'); ratingColor = DS.gold; }
    if (score > 5000) { rating = t('rank3'); ratingColor = '#FF8C00'; ratingGlow = '#FF8C00'; }
    if (score > 7000) { rating = t('rank4'); ratingColor = DS.red; ratingGlow = DS.red; }
    if (score > 10000) { rating = t('rank5'); ratingColor = DS.cyan; ratingGlow = DS.cyan; }
    const rAlpha = Math.min(1, (vt - 60) / 20);
    const rBounce = vt < 75 ? Math.abs(Math.sin((vt - 60) * 0.15)) * 5 : 0;
    ctx.globalAlpha = rAlpha;
    ctx.font = 'bold 32px sans-serif';
    ctx.fillStyle = ratingColor;
    if (ratingGlow) { ctx.shadowColor = ratingGlow; ctx.shadowBlur = 18; }
    const ratingText = '\uD83C\uDFC6 ' + rating;
    ctx.fillText(ratingText, cx, cardY + 200 - rBounce);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = ratingColor; ctx.lineWidth = 2;
    ctx.globalAlpha = rAlpha * 0.5;
    const ulW = ctx.measureText(ratingText).width * 0.7;
    ctx.beginPath(); ctx.moveTo(cx - ulW / 2, cardY + 208 - rBounce); ctx.lineTo(cx + ulW / 2, cardY + 208 - rBounce); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Phase 4: Stats
  if (vt > 85) {
    const sAlpha = Math.min(1, (vt - 85) / 15);
    const sSlide = Math.max(0, 15 - (vt - 85) * 2);
    ctx.globalAlpha = sAlpha;
    const statsY = cardY + 235 + sSlide;
    const statItems = [
      { icon: '\u2605', value: `${score}`, label: t('score'), color: DS.gold },
      { icon: '\uD83C\uDF56', value: `${totalEaten}`, label: t('food'), color: '#FFB060' },
      { icon: '\uD83D\uDD25', value: `${maxCombo}x`, label: t('maxCombo'), color: maxCombo > 10 ? DS.red : '#FFF' },
    ];
    const colWidth = 110, startX = cx - (statItems.length * colWidth) / 2;
    for (let i = 0; i < statItems.length; i++) {
      const sx = startX + i * colWidth + colWidth / 2;
      ctx.font = '22px sans-serif'; ctx.fillStyle = statItems[i].color;
      ctx.fillText(statItems[i].icon, sx, statsY);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(statItems[i].value, sx, statsY + 22);
      ctx.font = '10px sans-serif'; ctx.fillStyle = DS.textM;
      ctx.fillText(statItems[i].label, sx, statsY + 36);
    }
    ctx.globalAlpha = 1;
  }
  // Phase 5: Restart
  if (vt > 120) {
    if (Math.sin(frame * 0.06) > 0) {
      ctx.fillStyle = DS.gold;
      ctx.font = 'bold 17px sans-serif';
      ctx.fillText(t('clickRestart'), cx, cardY + 300);
    }
  }
  ctx.textAlign = 'left';
}
