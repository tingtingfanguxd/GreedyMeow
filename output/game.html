function drawDecorEntities() {
  for (const d of decorEntities) {
    const s = worldToScreen(d.x, d.y);
    if (s.x < -60 || s.x > CFG.W + 60 || s.y < -60 || s.y > CFG.H + 60) continue;

    ctx.save();
    ctx.translate(s.x, s.y);

    if (d.type === 'fountain') {
      // Stone basin
      ctx.fillStyle = '#999FA8';
      ctx.beginPath();
      ctx.ellipse(0, 4, 18, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Basin rim
      ctx.strokeStyle = '#77808A';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 4, 18, 6, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Water fill (animated shimmer)
      const shimmer = 0.55 + Math.sin(frame * 0.07) * 0.1;
      ctx.fillStyle = `rgba(60,140,220,${shimmer})`;
      ctx.beginPath();
      ctx.ellipse(0, 4, 15, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Water ripple rings
      const rippleT = (frame * 0.025) % 1;
      ctx.strokeStyle = `rgba(200,230,255,${0.5 - rippleT * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, 4, 4 + rippleT * 11, 1.5 + rippleT * 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      const rippleT2 = ((frame * 0.025) + 0.5) % 1;
      ctx.strokeStyle = `rgba(200,230,255,${0.4 - rippleT2 * 0.4})`;
      ctx.beginPath();
      ctx.ellipse(0, 4, 4 + rippleT2 * 11, 1.5 + rippleT2 * 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Center pillar
      ctx.fillStyle = '#888F98';
      ctx.fillRect(-2.5, -12, 5, 16);
      // Top cup
      ctx.fillStyle = '#9AA0AA';
      ctx.beginPath();
      ctx.ellipse(0, -12, 7, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#77808A'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, -12, 7, 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Water spray particles (rising)
      for (let sp = 0; sp < 5; sp++) {
        const spT = ((frame * 0.04 + sp * 0.2) % 1);
        const spX = Math.sin(sp * 1.9 + frame * 0.06) * 4;
        const spY = -12 - spT * 16;
        ctx.fillStyle = `rgba(180,220,255,${(1 - spT) * 0.85})`;
        ctx.beginPath();
        ctx.arc(spX, spY, 1 + spT * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

    } else if (d.type === 'leaves') {
      // Leaf pile — varied colors and angles
      const leafColors = ['#B8922A', '#9A7020', '#C8A030', '#A88828', '#907020', '#D0A828'];
      for (let li = 0; li < 6; li++) {
        ctx.save();
        const lx = Math.sin(li * 1.7) * 7;
        const ly = Math.cos(li * 2.3) * 4;
        const lAngle = li * 0.95 + Math.sin(frame * 0.008 + li) * 0.06;
        ctx.translate(lx, ly);
        ctx.rotate(lAngle);
        ctx.fillStyle = leafColors[li];
        ctx.beginPath();
        ctx.ellipse(0, 0, 5.5, 2.8, 0, 0, Math.PI * 2);
        ctx.fill();
        // Vein
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(4, 0); ctx.stroke();
        ctx.restore();
      }
      // Occasional floating leaf drifting upward
      const floatT = ((frame * 0.008 + d.x * 0.1) % 3);
      if (floatT < 1) {
        const fy = -floatT * 18;
        const fx = Math.sin(floatT * Math.PI * 2) * 7;
        ctx.fillStyle = `rgba(168,130,40,${1 - floatT})`;
        ctx.save();
        ctx.translate(fx, fy);
        ctx.rotate(floatT * 2.5);
        ctx.beginPath();
        ctx.ellipse(0, 0, 4, 2.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

    } else if (d.type === 'flagpole') {
      // Base plate
      ctx.fillStyle = '#777';
      ctx.fillRect(-5, -2, 10, 4);
      // Vertical pole
      ctx.strokeStyle = '#585858';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(0, 2);
      ctx.lineTo(0, -32);
      ctx.stroke();
      // Gold finial at top
      ctx.fillStyle = '#FFD020';
      ctx.beginPath();
      ctx.arc(0, -32, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#C09010'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(0, -32, 3, 0, Math.PI * 2); ctx.stroke();
      // Waving flag
      const wave1 = Math.sin(frame * 0.09) * 2.5;
      const wave2 = Math.sin(frame * 0.09 + 0.9) * 2;
      ctx.fillStyle = '#CC2828';
      ctx.beginPath();
      ctx.moveTo(1, -30);
      ctx.quadraticCurveTo(8, -27 + wave1, 15, -24 + wave2);
      ctx.lineTo(14, -20 + wave2);
      ctx.quadraticCurveTo(7, -22 + wave1, 1, -24);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#991818'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(1, -30);
      ctx.quadraticCurveTo(8, -27 + wave1, 15, -24 + wave2);
      ctx.lineTo(14, -20 + wave2);
      ctx.quadraticCurveTo(7, -22 + wave1, 1, -24);
      ctx.closePath();
      ctx.stroke();
      // Rope line from pole to flag tip
      ctx.strokeStyle = 'rgba(200,180,100,0.5)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(1, -30); ctx.lineTo(1, -2); ctx.stroke();
    }

    ctx.restore();
  }
}

function drawBananas() {
  for (const b of bananas) {
    const s = worldToScreen(b.x, b.y);
    if (s.x < -30 || s.x > CFG.W + 30 || s.y < -30 || s.y > CFG.H + 30) continue;

    ctx.save();
    ctx.translate(s.x, s.y);

    if (b.used) {
      // Flattened, grayed out peel
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 2.5, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(0, 8, 10, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Banana peel — four curved strips spread out from center
      // Left strip (curved left-up)
      ctx.fillStyle = '#FFE020';
      ctx.beginPath();
      ctx.moveTo(-1, 1);
      ctx.quadraticCurveTo(-9, -5, -11, 2);
      ctx.quadraticCurveTo(-8, 5, -2, 3);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#C8A800'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(-1, 1);
      ctx.quadraticCurveTo(-9, -5, -11, 2);
      ctx.quadraticCurveTo(-8, 5, -2, 3);
      ctx.closePath(); ctx.stroke();

      // Right strip
      ctx.fillStyle = '#FFE020';
      ctx.beginPath();
      ctx.moveTo(1, 1);
      ctx.quadraticCurveTo(9, -5, 11, 2);
      ctx.quadraticCurveTo(8, 5, 2, 3);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#C8A800'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(1, 1);
      ctx.quadraticCurveTo(9, -5, 11, 2);
      ctx.quadraticCurveTo(8, 5, 2, 3);
      ctx.closePath(); ctx.stroke();

      // Top-back strip (darker yellow)
      ctx.fillStyle = '#D8B800';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(0, -10, -4, -7);
      ctx.quadraticCurveTo(-2, -4, 0, 0);
      ctx.fill();

      // Center nub
      ctx.fillStyle = '#FFE840';
      ctx.beginPath();
      ctx.arc(0, 2, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Warning ring when player is close
      if (dist(player.x, player.y, b.x, b.y) < 50) {
        ctx.strokeStyle = 'rgba(255,230,30,0.55)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.arc(0, 0, 14, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        // Exclamation mark
        ctx.fillStyle = 'rgba(255,230,30,0.8)';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('!', 0, -16);
        ctx.textAlign = 'left';
      }
    }

    ctx.restore();
  }
}

function drawFishboneItems() {
  for (const fb of fishboneItems) {
    if (fb.collected) continue;
    const s = worldToScreen(fb.x, fb.y);
    if (s.x < -30 || s.x > CFG.W + 30 || s.y < -30 || s.y > CFG.H + 30) continue;

    const bob = Math.sin(frame * 0.06 + fb.x * 0.2) * 2;
    ctx.save();
    ctx.translate(s.x, s.y + bob);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 10, 8, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Subtle collectible glow
    const glowA = 0.08 + Math.sin(frame * 0.07) * 0.04;
    ctx.fillStyle = `rgba(220,230,255,${glowA})`;
    ctx.beginPath();
    ctx.arc(0, 0, 13, 0, Math.PI * 2);
    ctx.fill();

    // Fish head (small circle)
    ctx.fillStyle = '#E8E8F0';
    ctx.beginPath();
    ctx.arc(-10, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#AAAACC'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(-10, 0, 3, 0, Math.PI * 2); ctx.stroke();

    // Central spine
    ctx.strokeStyle = '#E0E0EE';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(9, 0);
    ctx.stroke();

    // Ribs (pairs, angled)
    ctx.strokeStyle = '#C8C8DC';
    ctx.lineWidth = 1;
    for (let ri = 0; ri < 5; ri++) {
      const rx = -5 + ri * 3;
      ctx.beginPath();
      ctx.moveTo(rx, 0); ctx.lineTo(rx - 1, -4.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(rx, 0); ctx.lineTo(rx - 1, 4.5);
      ctx.stroke();
    }

    // Tail fork
    ctx.strokeStyle = '#E0E0EE'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(9, 0); ctx.lineTo(13, -3.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(9, 0); ctx.lineTo(13, 3.5);
    ctx.stroke();

    // Shimmer dot on head
    const sh = 0.4 + Math.sin(frame * 0.1) * 0.4;
    ctx.fillStyle = `rgba(220,240,255,${sh})`;
    ctx.beginPath(); ctx.arc(-10, -1.2, 1.2, 0, Math.PI * 2); ctx.fill();

    // Pickup hint when very close
    if (dist(player.x, player.y, fb.x, fb.y) < 40) {
      ctx.fillStyle = 'rgba(200,220,255,0.8)';
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Auto Collect', 0, -15);
      ctx.textAlign = 'left';
    }

    ctx.restore();
  }
}

function drawSprings() {
  for (const sp of springs) {
    const s = worldToScreen(sp.x, sp.y);
    if (s.x < -30 || s.x > CFG.W + 30 || s.y < -30 || s.y > CFG.H + 30) continue;

    ctx.save();
    ctx.translate(s.x, s.y);

    const onCooldown = sp.cooldown > 0;
    // Slight compress/bounce animation when ready
    const bouncePhase = onCooldown ? 0 : Math.sin(frame * 0.1) * 0.12;
    const compress = onCooldown ? 0.55 : (1 + bouncePhase);

    const springColor = onCooldown ? '#777' : '#EE2222';
    const padColor1   = onCooldown ? '#888' : '#EE2222';
    const padColor2   = onCooldown ? '#AAA' : '#FFFFFF';

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, 12, 10, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Base plate
    ctx.fillStyle = onCooldown ? '#555' : '#AA1111';
    ctx.fillRect(-9, 8, 18, 4);
    ctx.strokeStyle = onCooldown ? '#444' : '#880000';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(-9, 8, 18, 4);

    // Coiled spring (zigzag, vertically compressed when cooldown)
    ctx.save();
    ctx.scale(1, compress);
    ctx.strokeStyle = springColor;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(-6, 8);
    for (let zi = 0; zi < 6; zi++) {
      const zy = 8 - (zi + 1) * 2.2;
      const zx = (zi % 2 === 0) ? 6 : -6;
      ctx.lineTo(zx, zy);
    }
    ctx.stroke();
    ctx.restore();

    // Pad top (red+white striped)
    const padY = -6 * compress;
    for (let pi = 0; pi < 4; pi++) {
      ctx.fillStyle = pi % 2 === 0 ? padColor1 : padColor2;
      ctx.fillRect(-8 + pi * 4, padY - 3, 4, 6);
    }
    ctx.strokeStyle = onCooldown ? '#555' : '#BB0000';
    ctx.lineWidth = 1;
    ctx.strokeRect(-8, padY - 3, 16, 6);

    // Upward bounce arrow when ready
    if (!onCooldown) {
      const arrBob = Math.sin(frame * 0.14) * 3;
      const arrAlpha = 0.55 + Math.sin(frame * 0.14) * 0.25;
      ctx.fillStyle = `rgba(255,80,80,${arrAlpha})`;
      ctx.beginPath();
      ctx.moveTo(0, padY - 11 + arrBob);
      ctx.lineTo(-5, padY - 5 + arrBob);
      ctx.lineTo(5, padY - 5 + arrBob);
      ctx.closePath();
      ctx.fill();
    }

    // Cooldown dim overlay
    if (onCooldown) {
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(0, 0, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }
}

function drawRevdoors() {
  for (const rd of revdoors) {
    const s = worldToScreen(rd.x, rd.y);
    if (s.x < -30 || s.x > CFG.W + 30 || s.y < -30 || s.y > CFG.H + 30) continue;

    ctx.save();
    ctx.translate(s.x, s.y);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, 16, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Outer frame ring (stone/metal)
    ctx.strokeStyle = '#3A3A44';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI * 2);
    ctx.stroke();
    // Inner frame ring
    ctx.strokeStyle = '#555560';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 13, 0, Math.PI * 2);
    ctx.stroke();

    // Floor fill (marble-ish)
    ctx.fillStyle = 'rgba(90,90,110,0.4)';
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();

    // Cross-shaped glass door panels (rotate with spin)
    const spinAngle = rd.spinning ? (frame * 0.22) : (rd.angle || 0);
    ctx.save();
    ctx.rotate(spinAngle);

    for (let pi = 0; pi < 4; pi++) {
      ctx.save();
      ctx.rotate(pi * Math.PI / 2);
      // Glass panel body
      ctx.fillStyle = 'rgba(120,200,255,0.28)';
      ctx.beginPath();
      ctx.moveTo(-1.5, 1);
      ctx.lineTo(1.5, 1);
      ctx.lineTo(1.5, 12);
      ctx.lineTo(-1.5, 12);
      ctx.closePath();
      ctx.fill();
      // Panel frame
      ctx.strokeStyle = 'rgba(100,160,220,0.7)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-1.5, 1);
      ctx.lineTo(1.5, 1);
      ctx.lineTo(1.5, 12);
      ctx.lineTo(-1.5, 12);
      ctx.closePath();
      ctx.stroke();
      // Glass shimmer highlight
      ctx.fillStyle = 'rgba(200,235,255,0.2)';
      ctx.fillRect(-0.8, 2, 0.8, 8);
      ctx.restore();
    }

    ctx.restore();

    // Center hub
    ctx.fillStyle = '#60606A';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#888890';
    ctx.beginPath();
    ctx.arc(0, 0, 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Spinning indicator ring when active
    if (rd.spinning) {
      const spinA = 0.25 + Math.sin(frame * 0.15) * 0.1;
      ctx.strokeStyle = `rgba(160,220,255,${spinA})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.arc(0, 0, 17, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }
}

function update() {
  const inGame = gameState === 'playing' || gameState === 'finalchase';
  if (!inGame) return;

  updatePlayer();
  checkGrandmaSpawn();
  updateRollingFood();
  for (const e of enemies) updateEnemy(e);
  updateRipples();
  updateParticles();
  updateSoulGhosts();
  updateZoneObjectives();

  // Update spring cooldowns
  for (const sp of springs) {
    if (sp.cooldown > 0) sp.cooldown--;
  }
  // Update revolving door spin timers
  for (const rd of revdoors) {
    if (rd.spinTimer > 0) {
      rd.spinTimer--;
      if (rd.spinTimer <= 0) rd.spinning = false;
    }
  }
  // Update fishbone lures
  if (window._fishboneLures) {
    for (let li = window._fishboneLures.length - 1; li >= 0; li--) {
      window._fishboneLures[li].timer--;
      if (window._fishboneLures[li].timer <= 0) {
        window._fishboneLures.splice(li, 1);
      }
    }
  }
  // Update buffs
  if (activeBuffs.invis > 0) activeBuffs.invis -= TICK_MULT;
  if (activeBuffs.speed > 0) activeBuffs.speed -= TICK_MULT;
  // Respawn buff pickups
  for (const bp of buffPickups) {
    if (bp.collected) {
      bp.respawnTimer -= TICK_MULT;
      if (bp.respawnTimer <= 0) { bp.collected = false; }
    }
  }
  // Enemy collision stun (throttled: check every 4th frame to reduce O(n²) cost)
  if (frame % 4 === 0) {
    for (let i = 0; i < enemies.length; i++) {
      for (let j = i + 1; j < enemies.length; j++) {
        const ei = enemies[i], ej = enemies[j];
        if (ei.stunTimer > 0 || ej.stunTimer > 0 || ei._stunCooldown > 0 || ej._stunCooldown > 0) continue;
        if ((ei.state === 'chase' || ei.state === 'alert') && (ej.state === 'chase' || ej.state === 'alert')) {
          const cdx = ei.x - ej.x, cdy = ei.y - ej.y;
          if (cdx * cdx + cdy * cdy < 1600) {
            ei.stunTimer = 100;
            ej.stunTimer = 100;
            ei._stunCooldown = 600;
            ej._stunCooldown = 600;
            ei.state = 'patrol';
            ej.state = 'patrol';
            addParticleBurst((ei.x + ej.x) / 2, (ei.y + ej.y) / 2, '#FFFF00', 20);
            addTextParticle((ei.x + ej.x) / 2, (ei.y + ej.y) / 2 - 20, -1, 60, '#FFD700', '\u{1F4AB}\u649E\u6655!');
            playTone(200, 0.2, 0.3, 'square');
            screenShake = 8;
            score += 100;
          }
        }
      }
    }
  }

  updateCamera(player.x, player.y);

  // Speed lines
  for (let i = speedLines.length - 1; i >= 0; i--) {
    speedLines[i].x += speedLines[i].dx;
    speedLines[i].y += speedLines[i].dy;
    speedLines[i].life -= TICK_MULT;
    if (speedLines[i].life <= 0) speedLines.splice(i, 1);
  }

  // Dash ready flash tracker
  if (!player._prevDashCooldown) player._prevDashCooldown = 0;
  if (player._prevDashCooldown > 0 && player.dashCooldown <= 0) {
    player._dashReadyFlash = 10;
  }
  if (player._dashReadyFlash > 0) player._dashReadyFlash--;
  player._prevDashCooldown = player.dashCooldown;

  // Final chase: activate superChase on all enemies after head start stun
  if (gameState === 'finalchase') {
    for (const e of enemies) {
      if (e._headStartStun > 0) {
        e._headStartStun--;
      } else {
        e.superChase = true;
        if (e.state !== 'chase') {
          e.state = 'chase';
          e.chaseLoseTimer = 99999;
        }
      }
    }
  }

  // Tutorial triggers (throttled to every 15th frame to reduce distance checks)
  if (frame === 30) {
    tutorialShown.move = true;
  }
  if (frame === 180) {
    showTutorial('dash', t('tutDashHint'), t('tutDashSub'), '\u26A1');
  }
  if (frame % 15 === 0) {
    if (!tutorialShown.food) {
      for (const f of foods) {
        if (!f.eaten) {
          const fdx = player.x - f.x, fdy = player.y - f.y;
          if (fdx * fdx + fdy * fdy < 10000) {
            showTutorial('food', t('tutFoodHint'), t('tutFoodSub'), '\u{1F36A}');
            break;
          }
        }
      }
    }
    if (!tutorialShown.enemy) {
      for (const e of enemies) {
        const edx = player.x - e.x, edy = player.y - e.y;
        if (edx * edx + edy * edy < 40000 && e.state !== 'chase') {
          showTutorial('enemy', t('tutEnemyHint'), t('tutEnemySub'), '\u26A0\u{FE0F}');
          break;
        }
      }
    }
    if (!tutorialShown.hide) {
      for (const h of hideSpots) {
        const hdx = player.x - h.x, hdy = player.y - h.y;
        if (hdx * hdx + hdy * hdy < 6400) {
          showTutorial('hide', t('tutHideHint'), t('tutHideSub'), '\u{1F4E6}');
          break;
        }
      }
    }
    if (!tutorialShown.steal && !hasCanOpener && canOpenerGrandma && !canOpenerGrandma._canOpenerStolen) {
      const sdx = player.x - canOpenerGrandma.x, sdy = player.y - canOpenerGrandma.y;
      if (sdx * sdx + sdy * sdy < 40000) {
        showTutorial('steal', t('tutStealHint'), t('tutStealSub'), '\u{1F511}');
      }
    }
  }
  if (gameState === 'finalchase' && !tutorialShown.chase) {
    showTutorial('chase', t('tutChaseHint'), t('tutChaseSub'), '\u{1F3C3}');
  }
}

function draw() {
  ctx.clearRect(0, 0, CFG.W, CFG.H);

  // Portrait orientation hint
  if (isTouchDevice && window.innerWidth < window.innerHeight && gameState !== 'title') {
    ctx.fillStyle = 'rgba(13,8,24,0.95)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 36px sans-serif';
    ctx.fillText('\uD83D\uDCF1\u21BB', CFG.W/2, CFG.H/2 - 30);
    ctx.fillStyle = '#FFF';
    ctx.font = '18px sans-serif';
    ctx.fillText(t('rotateDevice'), CFG.W/2, CFG.H/2 + 20);
    ctx.textAlign = 'left';
    return; // Don't draw game in portrait
  }

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  // Game world
  drawMap();
  drawHideSpots();
  drawDecorEntities();
  drawSprings();
  drawRevdoors();
  drawBananas();
  drawFishboneItems();
  drawCatnipPickups();
  drawBuffPickups();
  drawLifePickups();
  drawFood();
  drawRipples();

  // Sort and draw enemies
  const sortedEnemies = [...enemies].sort((a, b) => a.y - b.y);
  for (const e of sortedEnemies) {
    // Draw enemy before or after player based on Y
    if (e.y < player.y) drawEnemy(e);
  }

  // Player warm glow (cat is a warm body in the dark evening)
  if (!player.hiding) {
    const ps = worldToScreen(player.x, player.y);
    const glowR = 50 + Math.sin(frame * 0.04) * 5;
    if (isMobileDevice) {
      ctx.fillStyle = 'rgba(255,200,100,0.04)';
      ctx.beginPath();
      ctx.arc(ps.x, ps.y, glowR * 0.7, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const playerGlow = ctx.createRadialGradient(ps.x, ps.y, 0, ps.x, ps.y, glowR);
      playerGlow.addColorStop(0, 'rgba(255,200,100,0.08)');
      playerGlow.addColorStop(0.5, 'rgba(255,180,80,0.03)');
      playerGlow.addColorStop(1, 'rgba(255,160,60,0)');
      ctx.fillStyle = playerGlow;
      ctx.beginPath();
      ctx.arc(ps.x, ps.y, glowR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawPlayer();

  for (const e of sortedEnemies) {
    if (e.y >= player.y) drawEnemy(e);
  }

  drawParticles();
  drawSoulGhosts();

  // Draw mouse cursor target indicator in world (desktop only)
  if (!isTouchDevice && (gameState === 'playing' || gameState === 'finalchase')) {
    const cs = worldToScreen(mouse.worldX, mouse.worldY);
    ctx.save();
    ctx.globalAlpha = mouse.down ? 0.6 : 0.25;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    const cr = 10 + Math.sin(frame * 0.1) * 2;
    ctx.beginPath(); ctx.arc(cs.x, cs.y, cr, 0, Math.PI * 2); ctx.stroke();
    // Crosshair lines
    ctx.beginPath();
    ctx.moveTo(cs.x - cr - 4, cs.y); ctx.lineTo(cs.x - cr + 4, cs.y);
    ctx.moveTo(cs.x + cr - 4, cs.y); ctx.lineTo(cs.x + cr + 4, cs.y);
    ctx.moveTo(cs.x, cs.y - cr - 4); ctx.lineTo(cs.x, cs.y - cr + 4);
    ctx.moveTo(cs.x, cs.y + cr - 4); ctx.lineTo(cs.x, cs.y + cr + 4);
    ctx.stroke();
    // Dash ready indicator
    if (player.dashCooldown <= 0) {
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.15) * 0.2;
      ctx.strokeStyle = '#00FF88';
      ctx.beginPath(); ctx.arc(cs.x, cs.y, cr + 5, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }

  drawUI();

  // === PAUSE OVERLAY ===
  if (gamePausedByUser && (gameState === 'playing' || gameState === 'finalchase')) {
    canvas.style.cursor = 'default';
    ctx.fillStyle = 'rgba(10,5,20,0.75)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    ctx.textAlign = 'center';
    // Pause icon
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, CFG.W / 2 - 28, CFG.H / 2 - 100, 20, 55, 5); ctx.fill();
    roundRect(ctx, CFG.W / 2 + 8, CFG.H / 2 - 100, 20, 55, 5); ctx.fill();
    // Title
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 32px sans-serif';
    ctx.fillText(t('paused'), CFG.W / 2, CFG.H / 2 - 15);
    // Resume button
    drawTitleButton(t('pauseResume'), CFG.W / 2, CFG.H / 2 + 35, 200, 38);
    // Quit button
    drawTitleButton(t('pauseQuit'), CFG.W / 2, CFG.H / 2 + 85, 200, 38);
    // ESC hint (desktop)
    if (!isTouchDevice) {
      ctx.fillStyle = '#777';
      ctx.font = '11px sans-serif';
      ctx.fillText('ESC', CFG.W / 2, CFG.H / 2 + 120);
    }
    ctx.textAlign = 'left';
  }

  if (gameState === 'gameover') drawGameOver();
  if (gameState === 'victory') drawVictory();
}

// Pause game when tab is hidden (battery/performance)
let gamePaused = false;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    gamePaused = true;
    if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  } else {
    gamePaused = false;
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

// Performance: FPS cap for mobile
const TARGET_FPS = isMobileDevice ? 30 : 60;
const FRAME_INTERVAL = 1000 / TARGET_FPS;
const TICK_MULT = 60 / TARGET_FPS; // 1.0 at 60fps, 2.0 at 30fps
let lastFrameTime = 0;

function gameLoop(timestamp) {
  const elapsed = timestamp - lastFrameTime;
  if (elapsed >= FRAME_INTERVAL) {
    lastFrameTime = timestamp - (elapsed % FRAME_INTERVAL);
    if (!gamePaused && !gamePausedByUser) {
      frame++;
      const inGame = gameState === 'playing' || gameState === 'finalchase';
      canvas.style.cursor = inGame ? 'none' : 'default';
      update();
    }
    draw();
  }
  requestAnimationFrame(gameLoop);
}

// Initialize — always use procedural generation
generateMap();
spawnFood();
spawnEnemies();

// Register Service Worker for offline/PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Start
requestAnimationFrame(gameLoop);

// ===== CROSS-FRAME COMMUNICATION (for launcher preview) =====
window.addEventListener('message', function(evt) {
  if (evt.data && evt.data.type === 'LOAD_LEVEL_COMPACT') {
    try {
      LEVEL_JSON = JSON.parse(evt.data.json);
      // Reset game to title with new level
      gameState = 'title';
      frame = 0;
      // Reload level data
      loadLevelFromJSON();
      generateMap(); // re-run procedural fill for empty areas
      console.log('[GreedyMeow] Live level loaded from editor');
    } catch(e) {
      console.error('[GreedyMeow] Failed to load level:', e);
    }
  }
});

</script>
