    } else {
      // GRANDMA: Short, round, purple clothes, glasses, friendly but alert
      // Body - purple floral dress
      ctx.fillStyle = '#7B5EA7';
      ctx.beginPath();
      ctx.ellipse(0, 3, 12, 14, 0, 0, Math.PI * 2);
      ctx.fill();
      // Floral pattern on dress
      for (let fi = 0; fi < 4; fi++) {
        const fx = Math.sin(fi * 1.8) * 7;
        const fy = fi * 5 - 4;
        ctx.fillStyle = 'rgba(200,150,220,0.4)';
        ctx.beginPath();
        ctx.arc(fx, fy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Arms
      ctx.strokeStyle = '#FFDAB9';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      const armWave = e.state === 'chase' ? Math.sin(e.animFrame * 6) * 0.4 : 0;
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(-16, 6 + armWave * 8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(10, 0);
      ctx.lineTo(16, 6 - armWave * 8);
      ctx.stroke();
      // Head
      ctx.fillStyle = '#FFDAB9';
      ctx.beginPath();
      ctx.arc(hx, hy - 8, 9, 0, Math.PI * 2);
      ctx.fill();
      // Gray curly hair
      ctx.fillStyle = '#B8B8B8';
      for (let hi = 0; hi < 7; hi++) {
        const ha = (hi / 7) * Math.PI + Math.PI;
        ctx.beginPath();
        ctx.arc(hx + Math.cos(ha) * 8, hy - 10 + Math.sin(ha) * 5, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      // Glasses (round)
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(hx - 4, hy - 8, 3.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(hx + 4, hy - 8, 3.5, 0, Math.PI * 2);
      ctx.stroke();
      // Bridge
      ctx.beginPath();
      ctx.moveTo(hx - 1, hy - 8);
      ctx.lineTo(hx + 1, hy - 8);
      ctx.stroke();
      // Eyes behind glasses
      ctx.fillStyle = '#444';
      ctx.beginPath(); ctx.arc(hx - 4, hy - 8, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx + 4, hy - 8, 1.2, 0, Math.PI * 2); ctx.fill();
      // Mouth
      if (e.state === 'chase') {
        ctx.strokeStyle = '#A00';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(hx, hy - 3, 3, 0, Math.PI);
        ctx.stroke();
      } else {
        // Gentle smile
        ctx.strokeStyle = '#A07070';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(hx, hy - 5, 2, 0.3, Math.PI - 0.3);
        ctx.stroke();
      }
      // Holding broom when chasing
      if (e.state === 'chase' || e.state === 'alert') {
        const broomAngle = e.dir + 0.6;
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(broomAngle) * 6, Math.sin(broomAngle) * 6);
        ctx.lineTo(Math.cos(broomAngle) * 22, Math.sin(broomAngle) * 22);
        ctx.stroke();
        // Broom head
        ctx.fillStyle = '#CC9944';
        ctx.beginPath();
        ctx.arc(Math.cos(broomAngle) * 24, Math.sin(broomAngle) * 24, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // State icon with speech bubble personality
  if (e._speechTimer > 0 && e._speechText) {
    const bubbleAlpha = Math.min(1, e._speechTimer / 20);
    ctx.globalAlpha = bubbleAlpha;
    // Speech bubble background
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '10px sans-serif';
    const tw = ctx.measureText(e._speechText).width + 12;
    roundRect(ctx, -tw/2, -45, tw, 18, 6);
    ctx.fill();
    // Bubble pointer
    ctx.beginPath();
    ctx.moveTo(-3, -27); ctx.lineTo(3, -27); ctx.lineTo(0, -22);
    ctx.closePath();
    ctx.fill();
    // Text
    ctx.fillStyle = e.state === 'chase' ? '#CC0000' : e.state === 'alert' ? '#CC8800' : '#555';
    ctx.textAlign = 'center';
    ctx.fillText(e._speechText, 0, -32);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
  // State indicator icons (below speech if active)
  if (e.state === 'alert') {
    ctx.fillStyle = 'rgba(255,215,0,0.4)';
    ctx.beginPath(); ctx.arc(-1, -52, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('?', -5, -48);
  } else if (e.state === 'chase') {
    ctx.fillStyle = 'rgba(255,0,0,0.4)';
    ctx.beginPath(); ctx.arc(-1, -52, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF0000';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('!', -4, -48);
  }
  // Golden can opener indicator on carrying grandma
  if (e.hasCanOpener && !e._canOpenerStolen) {
    const keyBob = Math.sin(frame * 0.08) * 3;
    // Golden glow
    ctx.fillStyle = 'rgba(255,215,0,0.2)';
    ctx.beginPath();
    ctx.arc(12, -8 + keyBob, 10, 0, Math.PI * 2);
    ctx.fill();
    // Can opener icon (simplified key shape)
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(12, -10 + keyBob, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFA000';
    ctx.fillRect(10, -10 + keyBob, 4, 8);
    // Teeth
    ctx.fillRect(11, -4 + keyBob, 4, 2);
    ctx.fillRect(11, 0 + keyBob, 4, 2);
    // Sparkle
    if (frame % 30 < 15) {
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(14, -13 + keyBob, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Type label (subtle, always visible)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(e.label, 0, 22);
  ctx.textAlign = 'left';

  // Catnip effect
  if (e.catnipTimer > 0) {
    ctx.fillStyle = '#90EE90';
    ctx.font = '12px sans-serif';
    ctx.fillText('💫', -8, -20);
    // Spin visual
    ctx.strokeStyle = '#90EE9066';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 18, frame * 0.1, frame * 0.1 + Math.PI);
    ctx.stroke();
  }

  ctx.restore();
}

function drawFood() {
  for (const food of foods) {
    if (food.eaten) continue;
    const s = worldToScreen(food.x, food.y);
    if (s.x < -20 || s.x > CFG.W + 20 || s.y < -20 || s.y > CFG.H + 20) continue;

    ctx.save();
    ctx.translate(s.x, s.y);
    const bob = Math.sin(frame * 0.05 + food.x) * 2;

    if (food.type === 'biscuit') {
      // Fish-shaped biscuit (cat treat)
      ctx.fillStyle = '#D2A06A';
      ctx.beginPath();
      ctx.ellipse(0, bob, 5, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tiny tail
      ctx.beginPath();
      ctx.moveTo(4, bob);
      ctx.lineTo(7, bob - 3);
      ctx.lineTo(7, bob + 3);
      ctx.fill();
      // Speckle
      ctx.fillStyle = '#C4906A';
      ctx.beginPath();
      ctx.arc(-1, bob, 1, 0, Math.PI * 2);
      ctx.fill();
    } else if (food.type === 'can') {
      // Detailed cat food can
      ctx.fillStyle = '#A0A0A0';
      roundRect(ctx, -7, -6 + bob, 14, 12, 2);
      ctx.fill();
      // Label band
      ctx.fillStyle = '#E04040';
      ctx.fillRect(-6, -3 + bob, 12, 6);
      // Label detail
      ctx.fillStyle = '#FFE0A0';
      ctx.font = 'bold 5px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('CAT', 0, 2 + bob);
      ctx.textAlign = 'left';
      // Lid ring
      ctx.strokeStyle = '#C0C0C0';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.ellipse(0, -6 + bob, 6, 1.5, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Pull tab
      ctx.fillStyle = '#D0D0D0';
      ctx.fillRect(1, -8 + bob, 3, 2);
    } else if (food.type === 'fish') {
      // Premium sashimi-style fish
      ctx.fillStyle = '#FF8C42';
      ctx.beginPath();
      ctx.ellipse(0, bob, 9, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Belly shimmer
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.ellipse(0, bob + 1, 6, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail fin
      ctx.fillStyle = '#FF7030';
      ctx.beginPath();
      ctx.moveTo(7, bob);
      ctx.lineTo(13, bob - 5);
      ctx.lineTo(13, bob + 5);
      ctx.fill();
      // Dorsal fin
      ctx.fillStyle = '#FF6020';
      ctx.beginPath();
      ctx.moveTo(-2, bob - 4);
      ctx.lineTo(2, bob - 8);
      ctx.lineTo(5, bob - 4);
      ctx.fill();
      // Eye
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(-4, bob - 1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-4, bob - 1, 1, 0, Math.PI * 2);
      ctx.fill();
      // Scales pattern
      ctx.strokeStyle = 'rgba(255,120,50,0.3)';
      ctx.lineWidth = 0.5;
      for (let sc = 0; sc < 3; sc++) {
        ctx.beginPath();
        ctx.arc(-2 + sc * 3, bob, 2, -0.5, 0.5);
        ctx.stroke();
      }
    }

    // Glow indicator when player is close (enhanced for night)
    if (dist(player.x, player.y, food.x, food.y) < 60) {
      ctx.strokeStyle = '#FFD700AA';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, bob, 12, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Subtle night glow for all food items
    ctx.fillStyle = 'rgba(255,220,120,0.06)';
    ctx.beginPath();
    ctx.arc(0, bob, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Grand fish
  if (grandFish && !grandFish.eaten) {
    const s = worldToScreen(grandFish.x, grandFish.y);
    ctx.save();
    ctx.translate(s.x, s.y);
    const bob = Math.sin(frame * 0.04) * 3;
    // Glow (brighter at night)
    const gfGlow = ctx.createRadialGradient(0, bob, 0, 0, bob, 40);
    gfGlow.addColorStop(0, `rgba(255,215,0,${0.25 + Math.sin(frame * 0.06) * 0.1})`);
    gfGlow.addColorStop(0.5, `rgba(255,180,0,${0.1 + Math.sin(frame * 0.06) * 0.05})`);
    gfGlow.addColorStop(1, 'rgba(255,160,0,0)');
    ctx.fillStyle = gfGlow;
    ctx.beginPath();
    ctx.arc(0, bob, 40, 0, Math.PI * 2);
    ctx.fill();
    // Big golden fish
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(0, bob, 20, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFA000';
    ctx.beginPath();
    ctx.moveTo(16, bob);
    ctx.lineTo(26, bob - 10);
    ctx.lineTo(26, bob + 10);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-8, bob - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#FF8F00';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-8, bob - 14);
    ctx.lineTo(-4, bob - 22);
    ctx.lineTo(0, bob - 16);
    ctx.lineTo(4, bob - 22);
    ctx.lineTo(8, bob - 14);
    ctx.fill();
    ctx.stroke();
    // Label
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('grandFishLabel'), 0, bob + 24);
    ctx.textAlign = 'left';
    ctx.restore();
  }
}

function drawHideSpots() {
  for (const h of hideSpots) {
    if (h === player.hidingBox) continue;
    const s = worldToScreen(h.x, h.y);
    if (s.x < -40 || s.x > CFG.W + 40 || s.y < -40 || s.y > CFG.H + 40) continue;

    const playerDist = dist(player.x, player.y, h.x, h.y);
    const isNear = playerDist < 60 && !player.hiding;

    // When chased: pulsing green "safety" beacon on nearby boxes
    if (player.anyChasing && playerDist < 200) {
      const safeGlow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 30);
      const safePulse = 0.15 + Math.sin(frame * 0.12) * 0.08;
      safeGlow.addColorStop(0, `rgba(80,255,80,${safePulse})`);
      safeGlow.addColorStop(1, 'rgba(80,255,80,0)');
      ctx.fillStyle = safeGlow;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 30, 0, Math.PI * 2);
      ctx.fill();
    }

    // Long shadow
    ctx.fillStyle = 'rgba(5,10,25,0.1)';
    ctx.beginPath();
    ctx.moveTo(s.x + 14, s.y - 4);
    ctx.lineTo(s.x + 30, s.y + 8);
    ctx.lineTo(s.x + 24, s.y + 14);
    ctx.lineTo(s.x + 8, s.y + 14);
    ctx.closePath();
    ctx.fill();
    // Box body
    ctx.fillStyle = isNear ? '#9A7A5A' : '#8A6B55';
    ctx.fillRect(s.x - 14, s.y - 14, 28, 28);
    ctx.strokeStyle = isNear ? '#705030' : '#604030';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(s.x - 14, s.y - 14, 28, 28);
    ctx.fillStyle = '#7A5F48';
    ctx.fillRect(s.x - 14, s.y - 18, 14, 5);
    ctx.fillRect(s.x, s.y - 18, 14, 5);
    // Indicator when near
    if (isNear) {
      ctx.fillStyle = '#FFE0A0';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(t('autoHide'), s.x, s.y - 24);
      ctx.textAlign = 'left';
    }
  }
}

function drawCatnipPickups() {
  for (const c of catnipPickups) {
    if (c.collected) continue;
    const s = worldToScreen(c.x, c.y);
    const bob = Math.sin(frame * 0.06 + c.x) * 3;
    // Night glow aura
    const cpGlow = ctx.createRadialGradient(s.x, s.y + bob, 0, s.x, s.y + bob, 18);
    cpGlow.addColorStop(0, 'rgba(100,255,100,0.12)');
    cpGlow.addColorStop(1, 'rgba(100,255,100,0)');
    ctx.fillStyle = cpGlow;
    ctx.beginPath();
    ctx.arc(s.x, s.y + bob, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#70CC70';
    ctx.beginPath();
    // Leaf shape
    ctx.ellipse(s.x, s.y + bob, 6, 10, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#228B22';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y + bob - 8);
    ctx.lineTo(s.x, s.y + bob + 8);
    ctx.stroke();
    // Sparkle
    ctx.fillStyle = '#FFFFFFAA';
    ctx.beginPath();
    ctx.arc(s.x + 3, s.y + bob - 3, 1.5 + Math.sin(frame * 0.1) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawRipples() {
  for (const r of ripples) {
    const s = worldToScreen(r.x, r.y);
    ctx.strokeStyle = r.color || `rgba(255,165,0,${r.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = r.alpha;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Catnip areas
  for (const c of catnipEffects) {
    const s = worldToScreen(c.x, c.y);
    ctx.fillStyle = `rgba(144,238,144,${0.08 + Math.sin(frame * 0.1) * 0.03})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, c.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    const s = worldToScreen(p.x, p.y);
    ctx.globalAlpha = p.life / p.maxLife;
    if (p.isText) {
      ctx.fillStyle = p.color;
      ctx.font = `bold ${10 + (1 - p.life/p.maxLife) * 4}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text, s.x, s.y);
      ctx.textAlign = 'left';
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // Speed lines
  for (const sl of speedLines) {
    const s = worldToScreen(sl.x, sl.y);
    ctx.globalAlpha = sl.life / sl.maxLife;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + sl.dx * 8, s.y + sl.dy * 8);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// SECTION: UI Drawing
function drawUI() {
  // Cat Energy bar (belly shaped) — dark purple panel
  ctx.save();
  ctx.fillStyle = 'rgba(20,12,45,0.75)';
  roundRect(ctx, 15, 15, 200, 50, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,180,60,0.2)';
  ctx.lineWidth = 2;
  roundRect(ctx, 15, 15, 200, 50, 12);
  ctx.stroke();

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText(t('catEnergy'), 25, 34);

  // Energy bar
  const barW = 140;
  const barH = 14;
  const barX = 50;
  const barY = 38;
  ctx.fillStyle = '#333';
  roundRect(ctx, barX, barY, barW, barH, 7);
  ctx.fill();
  const pct = catEnergy / CFG.ENERGY_MAX;
  const barColor = pct < 0.3 ? '#FF6B6B' : pct < 0.7 ? '#FFD93D' : '#6BCB77';
  ctx.fillStyle = barColor;
  roundRect(ctx, barX, barY, barW * pct, barH, 7);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = '11px sans-serif';
  ctx.fillText(`${Math.floor(pct * 100)}%`, barX + barW / 2 - 10, barY + 11);

  // Score
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, CFG.W - 170, 15, 155, 35, 12);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`★ ${score}`, CFG.W - 25, 40);
  ctx.textAlign = 'left';

  // Catnip count
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, 15, 75, 110, 30, 10);
  ctx.fill();
  ctx.fillStyle = '#90EE90';
  ctx.font = '13px sans-serif';
  ctx.fillText(`🌿 ${t('catnip')} x${catnipCount}`, 25, 96);

  // Can opener indicator
  if (hasCanOpener) {
    ctx.fillStyle = 'rgba(10,5,20,0.6)';
    roundRect(ctx, 15, 110, 110, 25, 10);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.font = '12px sans-serif';
    ctx.fillText(t('canOpener'), 25, 128);
  }

  // === Tutorial hint popup ===
  if (tutorialHint && tutorialHint.timer > 0) {
    tutorialHint.timer--;
    const th = tutorialHint;
    const fadeIn = Math.min(1, (th.maxTimer - th.timer) / 20);
    const fadeOut = Math.min(1, th.timer / 30);
    const thAlpha = Math.min(fadeIn, fadeOut);
    const slideY = Math.min(1, (th.maxTimer - th.timer) / 15);
    const ty = CFG.H - 82 + (1 - slideY) * 30;
    ctx.save();
    ctx.globalAlpha = thAlpha;
    ctx.fillStyle = 'rgba(30,15,60,0.9)';
    roundRect(ctx, CFG.W/2 - 160, ty - 18, 320, 50, 14);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,80,0.6)';
    ctx.lineWidth = 2;
    roundRect(ctx, CFG.W/2 - 160, ty - 18, 320, 50, 14);
    ctx.stroke();
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.fillText(th.icon, CFG.W/2 - 130, ty + 10);
    ctx.fillStyle = '#FFE8A0';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(th.text, CFG.W/2 + 10, ty + 4);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '11px sans-serif';
    ctx.fillText(th.sub, CFG.W/2 + 10, ty + 20);
    const pct = th.timer / th.maxTimer;
    ctx.fillStyle = 'rgba(255,200,80,0.3)';
    roundRect(ctx, CFG.W/2 - 140, ty + 26, 280, 3, 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,200,80,0.8)';
    roundRect(ctx, CFG.W/2 - 140, ty + 26, 280 * pct, 3, 2);
    ctx.fill();
    ctx.textAlign = 'left';
    ctx.restore();
    if (tutorialHint.timer <= 0) tutorialHint = null;
  }

  // === Hiding feedback text ===
  if (player.hiding) {
    const ps = worldToScreen(player.x, player.y);
    ctx.save();
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1) * 0.15;
    ctx.fillStyle = '#B0B8FF';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('hiding'), ps.x, ps.y - 30);
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // Dash cooldown indicator — bottom-center pill bar (desktop only, mobile has virtual button)
  if (!isTouchDevice) {
    const dashReady = player.dashCooldown <= 0;
    const dashCd = gameState === 'finalchase' ? 30 : CFG.DASH_COOLDOWN;
    const cdPct = player.dashCooldown / dashCd;
    const dBarW = 160, dBarH = 28;
    const dBarX = CFG.W / 2 - dBarW / 2, dBarY = CFG.H - 38;
    // Background pill
    ctx.fillStyle = 'rgba(10,5,20,0.7)';
    roundRect(ctx, dBarX, dBarY, dBarW, dBarH, dBarH / 2);
    ctx.fill();
    ctx.strokeStyle = dashReady ? 'rgba(0,255,255,0.5)' : 'rgba(100,100,120,0.3)';
    ctx.lineWidth = 2;
    roundRect(ctx, dBarX, dBarY, dBarW, dBarH, dBarH / 2);
    ctx.stroke();
    if (!dashReady) {
      // Cooldown fill progress
      ctx.fillStyle = 'rgba(0,200,230,0.25)';
      roundRect(ctx, dBarX + 2, dBarY + 2, (dBarW - 4) * (1 - cdPct), dBarH - 4, (dBarH - 4) / 2);
      ctx.fill();
    }
    // Ready glow pulse
    if (dashReady) {
      const pulse = 0.3 + Math.sin(frame * 0.12) * 0.15;
      ctx.shadowColor = '#00FFFF';
      ctx.shadowBlur = 12 + Math.sin(frame * 0.12) * 4;
      ctx.strokeStyle = `rgba(0,255,255,${pulse})`;
      ctx.lineWidth = 2;
      roundRect(ctx, dBarX, dBarY, dBarW, dBarH, dBarH / 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    // Dash ready flash (first 10 frames after cooldown ends)
    if (dashReady && player._dashReadyFlash > 0) {
      ctx.fillStyle = `rgba(0,255,255,${player._dashReadyFlash / 10 * 0.3})`;
      roundRect(ctx, dBarX, dBarY, dBarW, dBarH, dBarH / 2);
      ctx.fill();
    }
    // SPACE key icon + text
    ctx.textAlign = 'center';
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = dashReady ? '#00FFEE' : '#888';
    ctx.fillText('SPACE', dBarX + 34, dBarY + 18);
    ctx.fillStyle = dashReady ? '#B0FFFF' : '#666';
    ctx.font = '11px sans-serif';
    ctx.fillText(dashReady ? t('dashReady') : t('dashCool'), dBarX + dBarW / 2 + 18, dBarY + 18);
    ctx.textAlign = 'left';
  }

  // Combo display (big, center-ish, visible when active) — positioned below objective tracker
  if (combo > 1 && comboTimer > 0) {
    const comboAlpha = Math.min(1, comboTimer / 30);
    const comboScale = 1 + Math.sin(frame * 0.15) * 0.05;
    ctx.save();
    ctx.globalAlpha = comboAlpha;
    ctx.fillStyle = combo > 10 ? '#FF4444' : combo > 5 ? '#FFD700' : '#FFF';
    ctx.font = `bold ${24 + Math.min(combo, 15) * 2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`${combo}x COMBO!`, CFG.W / 2, 130);
    // Combo bar (time remaining)
    const cbW = 120;
    const cbPct = comboTimer / CFG.COMBO_WINDOW;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ctx, CFG.W / 2 - cbW / 2, 138, cbW, 6, 3);
    ctx.fill();
    ctx.fillStyle = combo > 10 ? '#FF4444' : combo > 5 ? '#FFD700' : '#FFF';
    roundRect(ctx, CFG.W / 2 - cbW / 2, 138, cbW * cbPct, 6, 3);
    ctx.fill();
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // Zone transition cinematic
  if (player._zoneTransTimer > 0) {
    const ztAlpha = Math.min(1, player._zoneTransTimer / 40) * Math.min(1, (120 - player._zoneTransTimer) / 20);
    // Cinematic bars
    ctx.fillStyle = `rgba(0,0,0,${ztAlpha * 0.6})`;
    ctx.fillRect(0, 0, CFG.W, 50 * ztAlpha);
    ctx.fillRect(0, CFG.H - 50 * ztAlpha, CFG.W, 50 * ztAlpha);
    // Zone name
    ctx.globalAlpha = ztAlpha;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(player._zoneTitle || '', CFG.W / 2, CFG.H / 2 - 10);
    ctx.fillStyle = '#FFE0A0';
    ctx.font = '16px sans-serif';
    ctx.fillText(player._zoneSub || '', CFG.W / 2, CFG.H / 2 + 20);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // Zone indicator
  let zone = t('zone1');
  if (player.y < ZONE2_END * CFG.TILE) zone = t('zone3');
  else if (player.y < ZONE1_START * CFG.TILE) zone = t('zone2');
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(ctx, CFG.W / 2 - 60, 15, 120, 28, 10);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(zone, CFG.W / 2, 35);
  ctx.textAlign = 'left';

  // Mini-map — top-right on mobile (avoid button overlap), bottom-right on desktop
  const mmW = 100, mmH = 160;
  const mmX = CFG.W - mmW - 15, mmY = isTouchDevice ? 15 : CFG.H - mmH - 15;
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  roundRect(ctx, mmX, mmY, mmW, mmH, 8);
  ctx.fill();
  // Zone color bands on minimap
  const z1H = mmH * (20/80); // zone 3 top
  const z2H = mmH * (30/80); // zone 2 middle
  const z3H = mmH * (20/80); // zone 1 bottom
  ctx.fillStyle = 'rgba(80,50,20,0.15)';
  ctx.fillRect(mmX + 2, mmY + 2, mmW - 4, z1H);
  ctx.fillStyle = 'rgba(60,40,10,0.12)';
  ctx.fillRect(mmX + 2, mmY + z1H, mmW - 4, z2H);
  ctx.fillStyle = 'rgba(30,50,20,0.1)';
  ctx.fillRect(mmX + 2, mmY + z1H + z2H, mmW - 4, z3H + mmH * 10/80);
  ctx.strokeStyle = 'rgba(255,200,100,0.2)';
  ctx.lineWidth = 1;
  roundRect(ctx, mmX, mmY, mmW, mmH, 8);
  ctx.stroke();

  const scaleX = mmW / (CFG.MAP_W * CFG.TILE);
  const scaleY = mmH / (CFG.MAP_H * CFG.TILE);

  // Gate lines
  ctx.strokeStyle = '#FF634488';
  ctx.lineWidth = 1;
  for (const gate of gates) {
    const gy = mmY + gate.row * CFG.TILE * scaleY;
    ctx.strokeStyle = gate.open ? '#90EE9088' : '#FF634488';
    ctx.beginPath();
    ctx.moveTo(mmX, gy);
    ctx.lineTo(mmX + mmW, gy);
    ctx.stroke();
  }

  // Player on minimap (with glow pulse)
  const mmPlayerX = mmX + player.x * scaleX;
  const mmPlayerY = mmY + player.y * scaleY;
  ctx.fillStyle = 'rgba(255,215,0,0.25)';
  ctx.beginPath();
  ctx.arc(mmPlayerX, mmPlayerY, 5 + Math.sin(frame * 0.1) * 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(mmPlayerX, mmPlayerY, 3, 0, Math.PI * 2);
  ctx.fill();

  // Enemies on minimap (with tiny vision cone hints)
  for (const e of enemies) {
    const emx = mmX + e.x * scaleX;
    const emy = mmY + e.y * scaleY;
    // Tiny vision cone
    if (e.catnipTimer <= 0) {
      ctx.fillStyle = e.state === 'chase' ? 'rgba(255,0,0,0.2)' : 'rgba(255,200,100,0.1)';
      ctx.beginPath();
      ctx.moveTo(emx, emy);
      ctx.arc(emx, emy, 8, e.dir - 0.4, e.dir + 0.4);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = e.state === 'chase' ? '#FF0000' : e.type === 'dog' ? '#8B4513' : '#FF8060';
    ctx.beginPath();
    ctx.arc(emx, emy, 2, 0, Math.PI * 2);
    ctx.fill();
    // Can opener grandma highlight on minimap
    if (e.hasCanOpener && !e._canOpenerStolen) {
      ctx.fillStyle = `rgba(255,215,0,${0.4 + Math.sin(frame * 0.1) * 0.2})`;
      ctx.beginPath();
      ctx.arc(emx, emy, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFD700';
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🔑', emx, emy - 5);
      ctx.textAlign = 'left';
    }
  }

  // Food on minimap
  for (const f of foods) {
    if (f.eaten) continue;
    ctx.fillStyle = '#90EE9088';
    ctx.fillRect(mmX + f.x * scaleX - 1, mmY + f.y * scaleY - 1, 2, 2);
  }

  // Grand fish on minimap
  if (grandFish && !grandFish.eaten) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(mmX + grandFish.x * scaleX, mmY + grandFish.y * scaleY, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // === OBJECTIVE TRACKER HUD ===
  if (objectiveFlashTimer > 0) objectiveFlashTimer--;
  const objFlash = objectiveFlashTimer > 0 ? Math.sin(objectiveFlashTimer * 0.2) * 0.3 : 0;
  let objText = '';
  let objSub = '';
  let objProgress = 0; // 0-1
  const currentZoneUI = player.y < ZONE2_START * CFG.TILE ? 3 : player.y < ZONE1_START * CFG.TILE ? 2 : 1;
  if (gameState === 'finalchase') {
    objText = t('objFishRun');
    const safeY = (ZONE1_END - 3) * CFG.TILE;
    const startY = ZONE3_START * CFG.TILE;
    objProgress = Math.max(0, Math.min(1, (player.y - startY) / (safeY - startY)));
    objSub = `${t('objEscProg')} ${Math.floor(objProgress * 100)}%`;
  } else if (hasFish) {
    objText = t('objRunBack');
    objSub = t('objRunSouth');
    objProgress = 1;
  } else if (currentZoneUI === 3 && grandFish && !grandFish.eaten) {
    objText = t('objFindFish');
    const fishDist = dist(player.x, player.y, grandFish.x, grandFish.y);
    objSub = fishDist < 200 ? t('objNearby') : t('objAtCenter');
    objProgress = catEnergy >= CFG.ENERGY_MAX * 0.5 ? 1 : catEnergy / (CFG.ENERGY_MAX * 0.5);
  } else if (currentZoneUI === 2 && !gates[1].open) {
    if (!hasCanOpener) {
      objText = t('objStealKey');
      objSub = t('objStealHint');
      objProgress = 0.5;
    } else {
      objText = t('objGotoVIP');
      objProgress = Math.min(1, catEnergy / gates[1].energyNeeded);
      objSub = `${t('objEnergy')} ${Math.floor(catEnergy)}/${gates[1].energyNeeded}`;
    }
  } else if (currentZoneUI === 1 && !gates[0].open) {
    objText = t('objEatFood');
    objProgress = Math.min(1, catEnergy / gates[0].energyNeeded);
    objSub = `${t('objEnergy')} ${Math.floor(catEnergy)}/${gates[0].energyNeeded}`;
  } else if (currentZoneUI === 1 && gates[0].open) {
    objText = t('objEnterBanquet');
    objSub = t('objGateOpen');
    objProgress = 1;
  } else if (currentZoneUI === 2 && gates[1].open) {
    objText = t('objEnterStage');
    objSub = t('objVIPOpen');
    objProgress = 1;
  }
  if (objText) {
    const objBoxW = 240;
    const objBoxH = gameState === 'finalchase' ? 55 : 45;
    const objX = CFG.W / 2 - objBoxW / 2;
    const objY = 50;
    const objAlpha = 0.7 + objFlash;
    ctx.fillStyle = `rgba(10,5,20,${Math.min(0.85, objAlpha)})`;
    roundRect(ctx, objX, objY, objBoxW, objBoxH, 10);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,215,0,${0.2 + objFlash * 0.5})`;
    ctx.lineWidth = 1;
    roundRect(ctx, objX, objY, objBoxW, objBoxH, 10);
    ctx.stroke();
    // Objective text
    ctx.fillStyle = objectiveFlashTimer > 60 ? `rgba(255,255,150,${0.8 + objFlash})` : '#FFE8B0';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(objText, CFG.W / 2, objY + 18);
    // Sub text
    ctx.fillStyle = '#BBA070';
    ctx.font = '11px sans-serif';
    ctx.fillText(objSub, CFG.W / 2, objY + 32);
    // Progress bar (for gates, energy requirements, escape)
    if (gameState === 'finalchase' || objProgress < 1) {
      const pbW = objBoxW - 30;
      const pbH = 5;
      const pbX = objX + 15;
      const pbY = objY + objBoxH - 12;
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      roundRect(ctx, pbX, pbY, pbW, pbH, 3);
      ctx.fill();
      const pbColor = gameState === 'finalchase' ? '#FF6040' : objProgress >= 1 ? '#6BCB77' : '#FFD93D';
      ctx.fillStyle = pbColor;
      roundRect(ctx, pbX, pbY, pbW * objProgress, pbH, 3);
      ctx.fill();
      // Glow on progress bar
      if (objProgress > 0.8 || gameState === 'finalchase') {
        ctx.shadowColor = pbColor;
        ctx.shadowBlur = 6;
        roundRect(ctx, pbX, pbY, pbW * objProgress, pbH, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
    ctx.textAlign = 'left';
  }

  // === SAFE ZONE BEACON during Final Chase ===
  if (gameState === 'finalchase') {
    const safeWorldY = (ZONE1_END - 3) * CFG.TILE;
    const safeWorldX = 25 * CFG.TILE;
    const beaconS = worldToScreen(safeWorldX, safeWorldY);
    // Green column of light
    const beaconAlpha = 0.15 + Math.sin(frame * 0.08) * 0.08;
    const beaconGrad = ctx.createLinearGradient(beaconS.x, beaconS.y - 200, beaconS.x, beaconS.y + 20);
    beaconGrad.addColorStop(0, 'rgba(100,255,100,0)');
    beaconGrad.addColorStop(0.5, `rgba(100,255,100,${beaconAlpha})`);
    beaconGrad.addColorStop(1, `rgba(100,255,100,${beaconAlpha * 0.5})`);
    ctx.fillStyle = beaconGrad;
    ctx.fillRect(beaconS.x - 40, beaconS.y - 200, 80, 220);
    // Ground ring pulse
    const ringR = 30 + Math.sin(frame * 0.06) * 10;
    ctx.strokeStyle = `rgba(100,255,100,${0.3 + Math.sin(frame * 0.1) * 0.15})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(beaconS.x, beaconS.y, ringR, ringR * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
    // "安全区" label
    ctx.fillStyle = `rgba(100,255,100,${0.6 + Math.sin(frame * 0.1) * 0.2})`;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('safeZone'), beaconS.x, beaconS.y - 15);
    ctx.textAlign = 'left';
    // Direction arrow at screen edge if safe zone off-screen
    if (beaconS.y > CFG.H || beaconS.y < 0 || beaconS.x < 0 || beaconS.x > CFG.W) {
      const safeAngle = Math.atan2(safeWorldY - player.y, safeWorldX - player.x);
      const edgePadding = 50;
      const arrowX2 = Math.max(edgePadding, Math.min(CFG.W - edgePadding, CFG.W / 2 + Math.cos(safeAngle) * (CFG.W * 0.4)));
      const arrowY2 = Math.max(edgePadding, Math.min(CFG.H - edgePadding, CFG.H / 2 + Math.sin(safeAngle) * (CFG.H * 0.4)));
      const greenPulse2 = 0.5 + Math.sin(frame * 0.12) * 0.3;
      ctx.save();
      ctx.translate(arrowX2, arrowY2);
      ctx.rotate(safeAngle);
      ctx.globalAlpha = greenPulse2;
      // Arrow shape
      ctx.fillStyle = '#40FF60';
      ctx.beginPath();
      ctx.moveTo(14, 0);
      ctx.lineTo(-8, -9);
      ctx.lineTo(-4, 0);
      ctx.lineTo(-8, 9);
      ctx.closePath();
      ctx.fill();
      ctx.shadowColor = '#40FF60';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
      // Distance text near arrow
      const safeDist = dist(player.x, player.y, safeWorldX, safeWorldY);
      ctx.fillStyle = `rgba(100,255,100,${greenPulse2})`;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${Math.floor(safeDist / CFG.TILE)}${t('tilesUnit')}`, arrowX2, arrowY2 + 18);
      ctx.textAlign = 'left';
    }
    // Also show safe zone on minimap as pulsing green circle
    const mmSafeY2 = mmY + safeWorldY * scaleY;
    const mmSafeX2 = mmX + safeWorldX * scaleX;
    ctx.fillStyle = `rgba(100,255,100,${0.3 + Math.sin(frame * 0.1) * 0.15})`;
    ctx.beginPath();
    ctx.arc(mmSafeX2, mmSafeY2, 5 + Math.sin(frame * 0.08) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // === GRAND FISH BEACON (pulsing when in Zone 3 and fish not yet grabbed) ===
  if (grandFish && !grandFish.eaten && !hasFish && currentZoneUI === 3) {
    const gfS = worldToScreen(grandFish.x, grandFish.y);
    // If off-screen, show directional indicator
    if (gfS.x < 0 || gfS.x > CFG.W || gfS.y < 0 || gfS.y > CFG.H) {
      const gfAngle = Math.atan2(grandFish.y - player.y, grandFish.x - player.x);
      const edgePad = 50;
      const gfArrowX = Math.max(edgePad, Math.min(CFG.W - edgePad, CFG.W / 2 + Math.cos(gfAngle) * (CFG.W * 0.38)));
      const gfArrowY = Math.max(edgePad, Math.min(CFG.H - edgePad, CFG.H / 2 + Math.sin(gfAngle) * (CFG.H * 0.38)));
      const goldPulse = 0.5 + Math.sin(frame * 0.1) * 0.3;
      ctx.save();
      ctx.translate(gfArrowX, gfArrowY);
      ctx.rotate(gfAngle);
      ctx.globalAlpha = goldPulse;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(12, 0);
      ctx.lineTo(-6, -7);
      ctx.lineTo(-2, 0);
      ctx.lineTo(-6, 7);
      ctx.closePath();
      ctx.fill();
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
      ctx.fillStyle = `rgba(255,215,0,${goldPulse})`;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐟', gfArrowX, gfArrowY - 12);
      ctx.textAlign = 'left';
    }
  }

  // === GATE APPROACH FEEDBACK ===
  for (let gi = 0; gi < gates.length; gi++) {
    const gate = gates[gi];
    if (gate.open) continue;
    const gateWorldY = gate.row * CFG.TILE;
    const gateDist = Math.abs(player.y - gateWorldY);
    if (gateDist < 150) {
      const needsCanOpener = gi === 1 && !hasCanOpener;
      const hasEnough = needsCanOpener ? false : catEnergy >= gate.energyNeeded;
      const gateS = worldToScreen(25 * CFG.TILE, gateWorldY);
      // Floating requirement box near gate
      const reqBoxW = 180;
      const reqBoxH = needsCanOpener ? 40 : 50;
      const reqX = gateS.x - reqBoxW / 2;
      const reqY = gateS.y - 80;
      if (reqY > 0 && reqY < CFG.H) {
        ctx.fillStyle = hasEnough ? 'rgba(20,60,20,0.8)' : 'rgba(60,20,20,0.8)';
        roundRect(ctx, reqX, reqY, reqBoxW, reqBoxH, 8);
        ctx.fill();
        ctx.strokeStyle = hasEnough ? 'rgba(100,255,100,0.4)' : 'rgba(255,100,100,0.4)';
        ctx.lineWidth = 1;
        roundRect(ctx, reqX, reqY, reqBoxW, reqBoxH, 8);
        ctx.stroke();
        ctx.textAlign = 'center';
        if (needsCanOpener) {
          ctx.fillStyle = '#FF8080';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(t('needKeyTitle'), gateS.x, reqY + 16);
          ctx.fillStyle = '#BBA070';
          ctx.font = '11px sans-serif';
          ctx.fillText(t('stealFrom'), gateS.x, reqY + 30);
        } else {
          ctx.fillStyle = hasEnough ? '#90EE90' : '#FF8080';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(hasEnough ? t('canPass') : t('needMore'), gateS.x, reqY + 16);
          // Energy progress bar
          const epbW = reqBoxW - 20;
          const epbX = reqX + 10;
          const epbY = reqY + 24;
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          roundRect(ctx, epbX, epbY, epbW, 6, 3);
          ctx.fill();
          const ePct = Math.min(1, catEnergy / gate.energyNeeded);
          ctx.fillStyle = hasEnough ? '#6BCB77' : '#FFD93D';
          roundRect(ctx, epbX, epbY, epbW * ePct, 6, 3);
          ctx.fill();
          ctx.fillStyle = '#CCC';
          ctx.font = '11px sans-serif';
          ctx.fillText(`${Math.floor(catEnergy)} / ${gate.energyNeeded}`, gateS.x, reqY + 43);
        }
        ctx.textAlign = 'left';
      }
    }
  }

  // === CAN OPENER GRANDMA PROXIMITY HINT ===
  if (!hasCanOpener && canOpenerGrandma && !canOpenerGrandma._canOpenerStolen) {
    const cogDist = dist(player.x, player.y, canOpenerGrandma.x, canOpenerGrandma.y);
    if (cogDist < 150) {
      const gs = worldToScreen(canOpenerGrandma.x, canOpenerGrandma.y);
      const hintAlpha = Math.min(1, (150 - cogDist) / 80);
      const isBehind = Math.abs(angleDiff(canOpenerGrandma.dir, Math.atan2(player.y - canOpenerGrandma.y, player.x - canOpenerGrandma.x))) > Math.PI * 0.6;
      const isDistracted = canOpenerGrandma.catnipTimer > 0 || canOpenerGrandma.state !== 'chase';
      const canSteal = (isDistracted || isBehind) && cogDist < 40;
      // Hint bubble above grandma
      const hintY = gs.y - 65;
      ctx.globalAlpha = hintAlpha * (0.7 + Math.sin(frame * 0.08) * 0.15);
      if (canSteal) {
        // Can steal now - green hint
        ctx.fillStyle = 'rgba(20,80,20,0.85)';
        roundRect(ctx, gs.x - 55, hintY - 12, 110, 24, 8);
        ctx.fill();
        ctx.strokeStyle = 'rgba(100,255,100,0.5)';
        ctx.lineWidth = 1;
        roundRect(ctx, gs.x - 55, hintY - 12, 110, 24, 8);
        ctx.stroke();
        ctx.fillStyle = '#80FF80';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t('stealNow'), gs.x, hintY + 4);
      } else if (cogDist < 80) {
        // Close but can't steal yet
        let hintText = t('goToBehind');
        if (canOpenerGrandma.state === 'chase') hintText = t('sheChasing');
        else if (!isBehind) hintText = t('behindOrCatnip');
        ctx.fillStyle = 'rgba(80,60,20,0.85)';
        roundRect(ctx, gs.x - 70, hintY - 12, 140, 24, 8);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,200,100,0.4)';
        ctx.lineWidth = 1;
        roundRect(ctx, gs.x - 70, hintY - 12, 140, 24, 8);
        ctx.stroke();
        ctx.fillStyle = '#FFD700';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(hintText, gs.x, hintY + 4);
      }
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }
  }

  // Danger proximity vignette
  if (player.closestEnemyDist < 200) {
    const dangerIntensity = Math.max(0, 1 - player.closestEnemyDist / 200);
    const dangerPulse = dangerIntensity * (0.5 + Math.sin(frame * 0.15) * 0.3);
    const dangerVig = ctx.createRadialGradient(CFG.W/2, CFG.H/2, CFG.W * 0.25, CFG.W/2, CFG.H/2, CFG.W * 0.55);
    dangerVig.addColorStop(0, 'rgba(0,0,0,0)');
    dangerVig.addColorStop(1, `rgba(180,0,0,${dangerPulse * 0.25})`);
    ctx.fillStyle = dangerVig;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }
  // Directional danger arrow when enemy chasing
  if (player.anyChasing && player.closestEnemyDist < 300) {
    const arrowAngle = player.closestEnemyAngle;
    const edgeX = CFG.W / 2 + Math.cos(arrowAngle) * (CFG.W * 0.42);
    const edgeY = CFG.H / 2 + Math.sin(arrowAngle) * (CFG.H * 0.42);
    const clampedX = Math.max(30, Math.min(CFG.W - 30, edgeX));
    const clampedY = Math.max(30, Math.min(CFG.H - 30, edgeY));
    const arrowPulse = 0.5 + Math.sin(frame * 0.2) * 0.3;
    ctx.save();
    ctx.translate(clampedX, clampedY);
    ctx.rotate(arrowAngle);
    ctx.globalAlpha = arrowPulse;
    ctx.fillStyle = '#FF2020';
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(-6, -7);
    ctx.lineTo(-6, 7);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Escape route arrows pointing to nearest hide spots when being chased
  if (player.anyChasing) {
    let closestBox = null, closestBoxDist = Infinity;
    for (const h of hideSpots) {
      if (h === player.hidingBox) continue;
      const d = dist(player.x, player.y, h.x, h.y);
      if (d < closestBoxDist && d < 300 && d > 30) {
        closestBoxDist = d;
        closestBox = h;
      }
    }
    if (closestBox) {
      const boxAngle = Math.atan2(closestBox.y - player.y, closestBox.x - player.x);
      const arrowDist = Math.min(50, closestBoxDist * 0.3);
      const ps = worldToScreen(player.x, player.y);
      const ax = ps.x + Math.cos(boxAngle) * arrowDist;
      const ay = ps.y + Math.sin(boxAngle) * arrowDist;
      const greenPulse = 0.4 + Math.sin(frame * 0.15) * 0.2;
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(boxAngle);
      ctx.globalAlpha = greenPulse;
      ctx.fillStyle = '#40FF40';
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.lineTo(-4, -5);
      ctx.lineTo(-4, 5);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    // Also highlight nearby bushes as escape option
    const ps2 = worldToScreen(player.x, player.y);
    const ptx = Math.floor(player.x / CFG.TILE);
    const pty = Math.floor(player.y / CFG.TILE);
    for (let bdy = -4; bdy <= 4; bdy++) {
      for (let bdx = -4; bdx <= 4; bdx++) {
        const btx = ptx + bdx, bty = pty + bdy;
        if (btx >= 0 && btx < CFG.MAP_W && bty >= 0 && bty < CFG.MAP_H && map[bty] && map[bty][btx] === 5) {
          const bs = worldToScreen(btx * CFG.TILE + 20, bty * CFG.TILE + 20);
          const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
          if (bdist > 1 && bdist < 5) {
            ctx.fillStyle = `rgba(80,200,80,${0.06 + Math.sin(frame * 0.1) * 0.02})`;
            ctx.beginPath();
            ctx.arc(bs.x, bs.y, 15, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
  }

  // Final chase warning — dramatic night alarm
  if (gameState === 'finalchase') {
    finalChaseTimer++;
    // Red/blue police light flashing on edges
    const flashPhase = Math.sin(finalChaseTimer * 0.15);
    // Red flash on left
    const redGrad = ctx.createLinearGradient(0, 0, 80, 0);
    redGrad.addColorStop(0, `rgba(255,20,0,${Math.max(0, flashPhase) * 0.2})`);
    redGrad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = redGrad;
    ctx.fillRect(0, 0, 80, CFG.H);
    // Blue flash on right
    const blueGrad = ctx.createLinearGradient(CFG.W, 0, CFG.W - 80, 0);
    blueGrad.addColorStop(0, `rgba(0,60,255,${Math.max(0, -flashPhase) * 0.2})`);
    blueGrad.addColorStop(1, 'rgba(0,60,255,0)');
    ctx.fillStyle = blueGrad;
    ctx.fillRect(CFG.W - 80, 0, 80, CFG.H);
    // Top/bottom red pulse
    const pulseA = Math.abs(Math.sin(finalChaseTimer * 0.08)) * 0.08;
    ctx.fillStyle = `rgba(255,0,0,${pulseA})`;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    // Warning banner with escape progress
    const bannerW = 420;
    const bannerH = 55;
    ctx.fillStyle = 'rgba(100,0,0,0.8)';
    roundRect(ctx, CFG.W / 2 - bannerW / 2, CFG.H - 68, bannerW, bannerH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,80,60,0.4)';
    ctx.lineWidth = 1;
    roundRect(ctx, CFG.W / 2 - bannerW / 2, CFG.H - 68, bannerW, bannerH, 10);
    ctx.stroke();
    ctx.fillStyle = '#FF2020';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 10;
    ctx.fillText(t('chaseAlert'), CFG.W / 2, CFG.H - 47);
    ctx.shadowBlur = 0;
    // Escape progress bar in banner
    const safeY2 = (ZONE1_END - 3) * CFG.TILE;
    const startY2 = ZONE3_START * CFG.TILE;
    const escPct = Math.max(0, Math.min(1, (player.y - startY2) / (safeY2 - startY2)));
    const epW = bannerW - 40;
    const epX2 = CFG.W / 2 - epW / 2;
    const epY2 = CFG.H - 28;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, epX2, epY2, epW, 8, 4);
    ctx.fill();
    // Gradient bar: red → yellow → green
    const escGrad = ctx.createLinearGradient(epX2, 0, epX2 + epW, 0);
    escGrad.addColorStop(0, '#FF4040');
    escGrad.addColorStop(0.5, '#FFD93D');
    escGrad.addColorStop(1, '#6BCB77');
    ctx.fillStyle = escGrad;
    roundRect(ctx, epX2, epY2, epW * escPct, 8, 4);
    ctx.fill();
    // Paw icon at progress position
    const pawX = epX2 + epW * escPct;
    ctx.fillStyle = '#FFF';
    ctx.font = '10px sans-serif';
    ctx.fillText('🐾', pawX - 6, epY2 - 3);
    // "安全" label at end
    ctx.fillStyle = '#90EE90';
    ctx.font = '9px sans-serif';
    ctx.fillText('🏠', epX2 + epW + 8, epY2 + 7);
    ctx.textAlign = 'left';
  }

  // Controls hint (first 5 seconds) — warm evening style
  if (frame < 300) {
    ctx.fillStyle = `rgba(10,5,20,${Math.max(0, 0.7 - frame / 500)})`;
    roundRect(ctx, CFG.W / 2 - 200, CFG.H - 95, 400, 65, 12);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,200,100,${Math.max(0, 0.2 - frame / 1500)})`;
    ctx.lineWidth = 1;
    roundRect(ctx, CFG.W / 2 - 200, CFG.H - 95, 400, 65, 12);
    ctx.stroke();
    ctx.fillStyle = `rgba(255,230,180,${Math.max(0, 1 - frame / 300)})`;
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('ctrlHint1'), CFG.W / 2, CFG.H - 60);
    ctx.fillText(t('ctrlHint2'), CFG.W / 2, CFG.H - 42);
    ctx.textAlign = 'left';
  }

  // === MOBILE TOUCH CONTROLS: Joystick + Ergonomic Button Layout ===
  if (isTouchDevice && (gameState === 'playing' || gameState === 'finalchase')) {
    ctx.save();

    // --- JOYSTICK (left thumb) ---
    if (joystick.active) {
      // Outer ring
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(joystick.cx, joystick.cy, joystick.radius, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(joystick.cx, joystick.cy, joystick.radius, 0, Math.PI * 2); ctx.stroke();
      // Direction indicator arc
      if (joystick.mag > 0.1) {
        const angle = Math.atan2(joystick.dy, joystick.dx);
        ctx.globalAlpha = 0.3 * joystick.mag;
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(joystick.cx, joystick.cy, joystick.radius, angle - 0.4, angle + 0.4); ctx.stroke();
      }
      // Inner knob
      ctx.globalAlpha = 0.7;
      const knobGrad = ctx.createRadialGradient(joystick.x, joystick.y, 0, joystick.x, joystick.y, joystick.knobRadius);
      knobGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
      knobGrad.addColorStop(1, 'rgba(255,255,255,0.15)');
      ctx.fillStyle = knobGrad;
      ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.knobRadius, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(joystick.x, joystick.y, joystick.knobRadius, 0, Math.PI * 2); ctx.stroke();
    } else {
      // Idle hint: show faded joystick placeholder in left zone
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(130, CFG.H - 130, joystick.radius, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(130, CFG.H - 130, joystick.knobRadius, 0, Math.PI * 2); ctx.fill();
    }

    ctx.textAlign = 'center';

    // --- SKILL CLUSTER (right thumb, bottom-right) ---
    // Dash — primary, large
    const dashX = TB.dashX(), dashY = TB.dashY();
    const dashReady = player.dashCooldown <= 0;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(dashX, dashY, TB.dashR, 0, Math.PI * 2); ctx.fill();
    // Cooldown arc fill
    if (!dashReady) {
      const cdMax = gameState === 'finalchase' ? 30 : CFG.DASH_COOLDOWN;
      const cdPct = 1 - player.dashCooldown / cdMax;
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#00AADD';
      ctx.beginPath();
      ctx.moveTo(dashX, dashY);
      ctx.arc(dashX, dashY, TB.dashR, -Math.PI / 2, -Math.PI / 2 + cdPct * Math.PI * 2);
      ctx.closePath(); ctx.fill();
    }
    // Border ring
    ctx.globalAlpha = vBtn.dash ? 0.9 : 0.55;
    ctx.strokeStyle = dashReady ? '#00DDFF' : '#555';
    ctx.lineWidth = dashReady ? 3 : 2;
    ctx.beginPath(); ctx.arc(dashX, dashY, TB.dashR, 0, Math.PI * 2); ctx.stroke();
    // Ready glow pulse
    if (dashReady) {
      ctx.globalAlpha = 0.12 + Math.sin(frame * 0.1) * 0.06;
      ctx.fillStyle = '#00DDFF';
      ctx.beginPath(); ctx.arc(dashX, dashY, TB.dashR + 4, 0, Math.PI * 2); ctx.fill();
    }
    // Icon
    ctx.globalAlpha = dashReady ? 0.9 : 0.4;
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('⚡', dashX, dashY + 8);

    // Sneak — secondary, smaller, above-left of dash
    const snkX = TB.sneakX(), snkY = TB.sneakY();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(snkX, snkY, TB.sneakR, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = vBtn.sneak ? 0.75 : 0.45;
    if (vBtn.sneak) {
      ctx.fillStyle = 'rgba(150,80,220,0.35)';
      ctx.beginPath(); ctx.arc(snkX, snkY, TB.sneakR, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = vBtn.sneak ? '#BB77FF' : '#666';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(snkX, snkY, TB.sneakR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = vBtn.sneak ? 0.9 : 0.5;
    ctx.fillStyle = '#FFF';
    ctx.font = '16px sans-serif';
    ctx.fillText('🐾', snkX, snkY + 6);

    // --- ITEM SLOT (right side, above skill cluster, separated) ---
    const catX = TB.catnipX(), catY = TB.catnipY();
    // Separator line between item and skills
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(catX - 35, catY + TB.catnipR + 12);
    ctx.lineTo(catX + 35, catY + TB.catnipR + 12);
    ctx.stroke();
    // Item circle
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(catX, catY, TB.catnipR, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = vBtn.catnip ? 0.85 : 0.5;
    ctx.strokeStyle = catnipCount > 0 ? '#44DD66' : '#555';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(catX, catY, TB.catnipR, 0, Math.PI * 2); ctx.stroke();
    // Icon
    ctx.globalAlpha = catnipCount > 0 ? 0.85 : 0.25;
    ctx.fillStyle = '#FFF';
    ctx.font = '18px sans-serif';
    ctx.fillText('🌿', catX, catY + 6);
    // Count badge
    if (catnipCount > 0) {
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#44DD66';
      ctx.beginPath(); ctx.arc(catX + 20, catY - 18, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText(String(catnipCount), catX + 20, catY - 14);
    }

    // --- MENU (top-right, small, unobtrusive) ---
    const mX = TB.menuX(), mY = TB.menuY();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(mX, mY, TB.menuR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(mX, mY, TB.menuR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#CCC';
    ctx.font = '14px sans-serif';
    ctx.fillText('☰', mX, mY + 5);

    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // === PAUSE BUTTON — visible on ALL platforms ===
  if (gameState === 'playing' || gameState === 'finalchase') {
    const pbX = CFG.W - 35, pbY = isTouchDevice ? 35 : 25;
    const pbR = isTouchDevice ? 20 : 16;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.arc(pbX, pbY, pbR, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(pbX, pbY, pbR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#DDD';
    roundRect(ctx, pbX - 6, pbY - 7, 4, 14, 1); ctx.fill();
    roundRect(ctx, pbX + 2, pbY - 7, 4, 14, 1); ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// SECTION: Title / Game Over / Victory Screens
function drawTitle() {
  // Background - photo bg with overlay
  if (IMG.titleBg && IMG.titleBg.complete && IMG.titleBg.naturalWidth > 0) {
    ctx.drawImage(IMG.titleBg, 0, 0, CFG.W, CFG.H);
    ctx.fillStyle = 'rgba(10,5,25,0.55)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  } else {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
    skyGrad.addColorStop(0, '#1A1040');
    skyGrad.addColorStop(0.3, '#2D1855');
    skyGrad.addColorStop(0.6, '#8B3A2A');
    skyGrad.addColorStop(0.85, '#D06030');
    skyGrad.addColorStop(1, '#2C4820');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }
  for (let i = 0; i < 15; i++) {
    const fx = CFG.W * 0.1 + Math.sin(frame * 0.008 + i * 1.7) * CFG.W * 0.4;
    const fy = CFG.H * 0.3 + Math.cos(frame * 0.011 + i * 2.3) * CFG.H * 0.3;
    const gp = Math.sin(frame * 0.07 + i * 1.1) * 0.3 + 0.4;
    ctx.globalAlpha = gp;
    const ffg = ctx.createRadialGradient(fx, fy, 0, fx, fy, 6);
    ffg.addColorStop(0, '#FFE080');
    ffg.addColorStop(1, 'rgba(255,224,100,0)');
    ctx.fillStyle = ffg;
    ctx.beginPath(); ctx.arc(fx, fy, 6, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (titlePage === 0) { drawTitleMain(); } else { drawTitleTutorial(); }
}

function drawTitleButton(text, cx, cy, w, h) {
  const isHover = mouse.x > cx - w/2 && mouse.x < cx + w/2 && mouse.y > cy - h/2 && mouse.y < cy + h/2;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, cx - w/2 + 3, cy - h/2 + 3, w, h, h/2);
  ctx.fill();
  const btnGrad = ctx.createLinearGradient(0, cy - h/2, 0, cy + h/2);
  if (isHover) { btnGrad.addColorStop(0, '#FFB040'); btnGrad.addColorStop(1, '#E08020'); }
  else { btnGrad.addColorStop(0, '#5A4080'); btnGrad.addColorStop(1, '#3A2560'); }
  ctx.fillStyle = btnGrad;
  roundRect(ctx, cx - w/2, cy - h/2, w, h, h/2);
  ctx.fill();
  ctx.strokeStyle = isHover ? '#FFD700' : 'rgba(255,255,255,0.25)';
  ctx.lineWidth = isHover ? 3 : 2;
  roundRect(ctx, cx - w/2, cy - h/2, w, h, h/2);
  ctx.stroke();
  ctx.strokeStyle = `rgba(255,255,255,${isHover ? 0.4 : 0.15})`;
  ctx.lineWidth = 1;
  roundRect(ctx, cx - w/2 + 3, cy - h/2 + 2, w - 6, h * 0.4, h/2);
  ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.font = `bold ${h > 35 ? 18 : 15}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(text, cx + 1, cy + 7);
  ctx.fillStyle = isHover ? '#FFF' : '#F0E0D0';
  ctx.fillText(text, cx, cy + 6);
}

}

function drawGameOver() {
  gameOverTimer++;
  const gt = gameOverTimer;

  // Evening tinted overlay — fades in
  const overlayAlpha = Math.min(0.85, gt / 30);
  const goGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
  goGrad.addColorStop(0, `rgba(20,8,40,${overlayAlpha})`);
  goGrad.addColorStop(1, `rgba(60,15,15,${overlayAlpha})`);
  ctx.fillStyle = goGrad;
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  // Red flash on catch
  if (gt < 15) {
    ctx.fillStyle = `rgba(255,0,0,${(15 - gt) / 30})`;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }

  // Spotlight on cat — grows in
  const spotR = Math.min(180, gt * 6);
  if (spotR > 10) {
    const spotGrad = ctx.createRadialGradient(CFG.W / 2, CFG.H / 2 - 40, 0, CFG.W / 2, CFG.H / 2 - 40, spotR);
    spotGrad.addColorStop(0, 'rgba(255,150,100,0.08)');
    spotGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = spotGrad;
    ctx.beginPath();
    ctx.arc(CFG.W / 2, CFG.H / 2 - 40, spotR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Card — tighter 480x300
  const cardSlide = Math.min(0, -60 + gt * 4);
  const cardAlpha = Math.min(1, gt / 20);
  const cardY = CFG.H / 2 - 150 + cardSlide;
  const cx = CFG.W / 2;
  ctx.globalAlpha = cardAlpha;
  ctx.fillStyle = 'rgba(40,15,50,0.85)';
  roundRect(ctx, cx - 240, cardY, 480, 300, 25);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,80,80,0.3)';
  ctx.lineWidth = 2;
  roundRect(ctx, cx - 240, cardY, 480, 300, 25);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  // === Phase 1: Sad cat — BIGGER (180px), dramatic ===
  if (gt > 10) {
    const catAlpha = Math.min(1, (gt - 10) / 20);
    const catShake = gt < 25 ? Math.sin((gt - 10) * 0.8) * 3 : 0;
    ctx.globalAlpha = catAlpha;
    const catCY = cardY + 80;
    if (IMG.gameoverCat && IMG.gameoverCat.complete && IMG.gameoverCat.naturalWidth > 0) {
      const imgS = 180;
      ctx.save();
      ctx.shadowColor = 'rgba(255,100,100,0.4)';
      ctx.shadowBlur = 25;
      ctx.drawImage(IMG.gameoverCat, cx - imgS / 2 + catShake, catCY - imgS / 2, imgS, imgS);
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.fillStyle = '#F5A623';
      ctx.beginPath();
      ctx.arc(cx + catShake, catCY, 40, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // === Phase 2: Title overlapping bottom of cat image ===
  if (gt > 30) {
    const tAlpha = Math.min(1, (gt - 30) / 15);
    const tScale = gt < 45 ? 0.7 + (gt - 30) / 50 : 1;
    ctx.save();
    ctx.globalAlpha = tAlpha;
    // Dark band behind title
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, cx - 150, cardY + 140, 300, 38, 8);
    ctx.fill();
    ctx.translate(cx, cardY + 164);
    ctx.scale(tScale, tScale);
    ctx.strokeStyle = '#660000';
    ctx.lineWidth = 5;
    ctx.font = 'bold 42px sans-serif';
    ctx.strokeText(t('caught'), 0, 0);
    ctx.fillStyle = '#FF6B6B';
    ctx.fillText(t('caught'), 0, 0);
    ctx.restore();
  }

  // === Phase 3: Lose flavor text as speech bubble ===
  if (gt > 50) {
    const ftAlpha = Math.min(1, (gt - 50) / 20);
    const loseTexts = [t('lose1'), t('lose2'), t('lose3'), t('lose4')];
    ctx.globalAlpha = ftAlpha;
    // Speech bubble
    const bubbleY = cardY + 188;
    ctx.fillStyle = 'rgba(255,200,210,0.15)';
    const bubbleText = loseTexts[Math.floor(frame / 90) % 4];
    ctx.font = '15px sans-serif';
    const bw = Math.min(380, ctx.measureText(bubbleText).width + 30);
    roundRect(ctx, cx - bw / 2, bubbleY - 14, bw, 28, 12);
    ctx.fill();
    // Small triangle pointer
    ctx.beginPath();
    ctx.moveTo(cx - 8, bubbleY - 14);
    ctx.lineTo(cx, bubbleY - 22);
    ctx.lineTo(cx + 8, bubbleY - 14);
    ctx.fill();
    ctx.fillStyle = '#FFB6C1';
    ctx.fillText(bubbleText, cx, bubbleY + 4);
    ctx.globalAlpha = 1;
  }

  // === Phase 4: Stats as horizontal icon row — all appear together ===
  if (gt > 70) {
    const sAlpha = Math.min(1, (gt - 70) / 15);
    const sSlide = Math.max(0, 15 - (gt - 70) * 2);
    ctx.globalAlpha = sAlpha;
    const statsY = cardY + 232 + sSlide;
    const statItems = [
      { icon: '★', value: `${score}`, label: t('score'), color: '#FFD700' },
      { icon: '🍖', value: `${totalEaten}`, label: t('food'), color: '#FFB060' },
      { icon: '🔥', value: `${maxCombo}x`, label: t('maxCombo'), color: '#FFF' },
    ];
    const colWidth = 100, startX = cx - (statItems.length * colWidth) / 2;
    for (let i = 0; i < statItems.length; i++) {
      const sx = startX + i * colWidth + colWidth / 2;
      // Icon
      ctx.font = '22px sans-serif';
      ctx.fillStyle = statItems[i].color;
      ctx.fillText(statItems[i].icon, sx, statsY);
      // Value
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(statItems[i].value, sx, statsY + 22);
      // Label
      ctx.font = '10px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText(statItems[i].label, sx, statsY + 36);
    }
    ctx.globalAlpha = 1;
  }

  // === Phase 5: Restart + ESC together, gold blinking ===
  if (gt > 100) {
    if (Math.sin(frame * 0.06) > 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '18px sans-serif';
      ctx.fillText(t('clickRestart'), cx, cardY + 282);
    }
  }
  ctx.textAlign = 'left';
}

function drawVictory() {
  victoryRevealTimer++;
  const vt = victoryRevealTimer;

  // Evening sky overlay with warm glow
  const vicGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
  vicGrad.addColorStop(0, 'rgba(15,8,35,0.85)');
  vicGrad.addColorStop(0.4, 'rgba(30,15,10,0.82)');
  vicGrad.addColorStop(1, 'rgba(10,30,10,0.85)');
  ctx.fillStyle = vicGrad;
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  // Stars twinkling in background
  for (let i = 0; i < 40; i++) {
    const sx = (i * 53 + 17) % CFG.W;
    const sy = (i * 37 + 11) % (CFG.H * 0.4);
    const starAlpha = Math.sin(frame * 0.03 + i * 2.1) * 0.3 + 0.4;
    if (vt > 10) {
      ctx.fillStyle = `rgba(255,240,200,${starAlpha * Math.min(1, (vt - 10) / 30)})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Celebration particles
  const particleCount = Math.min(50, Math.floor(vt / 2));
  for (let i = 0; i < particleCount; i++) {
    const px = (i * 43 + vt * 1.5) % CFG.W;
    const py = (i * 67 + vt * 0.8) % CFG.H;
    const confGlow = Math.sin(frame * 0.06 + i * 1.3) * 0.3 + 0.6;
    ctx.globalAlpha = confGlow * Math.min(1, (vt - i * 2) / 20);
    const colors = ['#FFD700', '#FF8040', '#80FF80', '#FFB060', '#FF6060', '#60DDFF', '#FF60FF'];
    ctx.fillStyle = colors[i % 7];
    ctx.beginPath();
    if (i % 3 === 0) {
      ctx.arc(px, py, 3 + Math.sin(frame * 0.08 + i) * 1, 0, Math.PI * 2);
    } else if (i % 3 === 1) {
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(frame * 0.02 + i);
      ctx.rect(-2, -2, 4, 4);
      ctx.restore();
    } else {
      ctx.arc(px, py, 2, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Golden spotlight — grows in
  const spotR = Math.min(220, vt * 4);
  if (spotR > 0) {
    const vSpot = ctx.createRadialGradient(CFG.W / 2, CFG.H / 2 - 40, 0, CFG.W / 2, CFG.H / 2 - 40, spotR);
    vSpot.addColorStop(0, `rgba(255,200,80,${Math.min(0.15, vt / 400)})`);
    vSpot.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = vSpot;
    ctx.beginPath();
    ctx.arc(CFG.W / 2, CFG.H / 2 - 40, spotR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Main card — 580x320, reduced height
  const cardSlide = Math.min(0, -80 + vt * 4);
  const cardY = CFG.H / 2 - 160 + cardSlide;
  const cardAlpha = Math.min(1, vt / 20);
  ctx.globalAlpha = cardAlpha;
  ctx.fillStyle = 'rgba(20,12,45,0.8)';
  roundRect(ctx, CFG.W / 2 - 290, cardY, 580, 320, 25);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.35)';
  ctx.lineWidth = 2;
  roundRect(ctx, CFG.W / 2 - 290, cardY, 580, 320, 25);
  ctx.stroke();
  ctx.globalAlpha = 1;

  const cx = CFG.W / 2;

  // === Phase 1: Victory cat (vt > 15) — 160px with bounce ===
  if (vt > 15) {
    const catAlpha = Math.min(1, (vt - 15) / 20);
    const catBounce = vt < 35 ? Math.sin((vt - 15) * 0.2) * 8 : 0;
    ctx.globalAlpha = catAlpha;
    const catCY = cardY + 80 + catBounce;
    if (IMG.victoryCat && IMG.victoryCat.complete && IMG.victoryCat.naturalWidth > 0) {
      const imgS = 160;
      ctx.save();
      ctx.shadowColor = 'rgba(255,215,0,0.4)';
      ctx.shadowBlur = 20;
      ctx.drawImage(IMG.victoryCat, cx - imgS / 2, catCY - imgS / 2, imgS, imgS);
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.fillStyle = '#F5A623';
      ctx.beginPath();
      ctx.arc(cx, catCY, 40, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  ctx.textAlign = 'center';

  // === Phase 2: Title overlapping bottom of cat (vt > 35) ===
  if (vt > 35) {
    const titleAlpha = Math.min(1, (vt - 35) / 20);
    const titleScale = vt < 50 ? 0.8 + (vt - 35) / 75 : 1;
    ctx.save();
    ctx.globalAlpha = titleAlpha;
    // Dark band behind title
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    roundRect(ctx, cx - 180, cardY + 135, 360, 40, 8);
    ctx.fill();
    ctx.translate(cx, cardY + 160);
    ctx.scale(titleScale, titleScale);
    ctx.strokeStyle = '#8B4500';
    ctx.lineWidth = 5;
    ctx.font = 'bold 46px sans-serif';
    ctx.strokeText(t('missionComplete'), 0, 0);
    const vicTitleGrad = ctx.createLinearGradient(-80, -20, 80, 20);
    vicTitleGrad.addColorStop(0, '#FFE040');
    vicTitleGrad.addColorStop(0.5, '#FFD700');
    vicTitleGrad.addColorStop(1, '#FFA020');
    ctx.fillStyle = vicTitleGrad;
    ctx.fillText(t('missionComplete'), 0, 0);
    ctx.restore();
  }

  // === Phase 3: Rating as CENTERPIECE (vt > 60) ===
  if (vt > 60) {
    let rating = t('rank0');
    let ratingColor = '#CCC';
    let ratingGlow = '';
    if (score > 1500) { rating = t('rank1'); ratingColor = '#90EE90'; }
    if (score > 3000) { rating = t('rank2'); ratingColor = '#FFD700'; }
    if (score > 5000) { rating = t('rank3'); ratingColor = '#FF8C00'; ratingGlow = '#FF8C00'; }
    if (score > 7000) { rating = t('rank4'); ratingColor = '#FF4500'; ratingGlow = '#FF4500'; }
    if (score > 10000) { rating = t('rank5'); ratingColor = '#FF00FF'; ratingGlow = '#FF00FF'; }
    const rAlpha = Math.min(1, (vt - 60) / 20);
    const rBounce = vt < 75 ? Math.abs(Math.sin((vt - 60) * 0.15)) * 5 : 0;
    ctx.globalAlpha = rAlpha;
    ctx.font = 'bold 32px sans-serif';
    ctx.fillStyle = ratingColor;
    if (ratingGlow) { ctx.shadowColor = ratingGlow; ctx.shadowBlur = 18; }
    const ratingText = '🏆 ' + rating;
    ctx.fillText(ratingText, cx, cardY + 200 - rBounce);
    ctx.shadowBlur = 0;
    // Colored underline decoration
    ctx.strokeStyle = ratingColor;
    ctx.lineWidth = 2;
    ctx.globalAlpha = rAlpha * 0.5;
    const ulW = ctx.measureText(ratingText).width * 0.7;
    ctx.beginPath();
    ctx.moveTo(cx - ulW / 2, cardY + 208 - rBounce);
    ctx.lineTo(cx + ulW / 2, cardY + 208 - rBounce);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === Phase 4: Stats as HORIZONTAL ROW (vt > 85) ===
  if (vt > 85) {
    const sAlpha = Math.min(1, (vt - 85) / 15);
    const sSlide = Math.max(0, 15 - (vt - 85) * 2);
    ctx.globalAlpha = sAlpha;
    const statsY = cardY + 235 + sSlide;
    const statItems = [
      { icon: '★', value: `${score}`, label: t('score'), color: '#FFD700' },
      { icon: '🍖', value: `${totalEaten}`, label: t('food'), color: '#FFB060' },
      { icon: '🔥', value: `${maxCombo}x`, label: t('maxCombo'), color: maxCombo > 10 ? '#FF4444' : '#FFF' },
    ];
    const colWidth = 110, startX = cx - (statItems.length * colWidth) / 2;
    for (let i = 0; i < statItems.length; i++) {
      const sx = startX + i * colWidth + colWidth / 2;
      ctx.font = '22px sans-serif';
      ctx.fillStyle = statItems[i].color;
      ctx.fillText(statItems[i].icon, sx, statsY);
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText(statItems[i].value, sx, statsY + 22);
      ctx.font = '10px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText(statItems[i].label, sx, statsY + 36);
    }
    ctx.globalAlpha = 1;
  }

  // === Phase 5: Restart prompt (vt > 120) — faster ===
  if (vt > 120) {
    if (Math.sin(frame * 0.06) > 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '18px sans-serif';
      ctx.fillText(t('clickRestart'), cx, cardY + 300);
    }
  }

  ctx.textAlign = 'left';
}

// SECTION: Game Loop
function resetGame() {
  gameState = 'playing';
  gamePausedByUser = false;
  score = 0;
  catEnergy = 0;
  catnipCount = 3;
  frame = 0;
  screenShake = 0;
  gate1Open = false;
  gate2Open = false;
  hasFish = false;
  hasCanOpener = false;
  canOpenerGrandma = null;
  finalChaseTimer = 0;
  victoryRevealTimer = 0;
  objectiveFlashTimer = 0;
  gameOverTimer = 0;
  combo = 0;
  comboTimer = 0;
  maxCombo = 0;
  totalEaten = 0;
  speedLines.length = 0;
  tutorialShown = { move: false, food: false, enemy: false, hide: false, dash: false, catnip: false, steal: false, chase: false };
  tutorialHint = null;
  joystick.active = false; joystick.touchId = -1; joystick.dx = 0; joystick.dy = 0; joystick.mag = 0;
  vBtn.dash = false; vBtn.catnip = false; vBtn.sneak = false;
  player.x = 25 * CFG.TILE;
  player.y = 75 * CFG.TILE;
  player.hiding = false;
  player.hidingBox = null;
  player.climbing = false;
  player.eating = false;
  player.carryingFish = false;
  player.speed = 0;
  player.dashing = false;
  player.dashTimer = 0;
  player.dashCooldown = 0;
  player.squash = 1;
  player.eatFlash = 0;
  player.invulnerable = 0;
  particles.length = 0;
  ripples.length = 0;
  catnipEffects.length = 0;
  gates[0].open = false;
  gates[1].open = false;
  generateMap();
  spawnFood();
  spawnEnemies();
}

function update() {
  if (gameState === 'playing' || gameState === 'finalchase') {
    updatePlayer();
    for (const e of enemies) updateEnemy(e);
    updateRipples();
    updateParticles();
    updateCamera(player.x, player.y);
    // Speed lines
    for (let i = speedLines.length - 1; i >= 0; i--) {
      speedLines[i].x += speedLines[i].dx;
      speedLines[i].y += speedLines[i].dy;
      speedLines[i].life--;
      if (speedLines[i].life <= 0) speedLines.splice(i, 1);
    }
    // Dash ready flash tracker
    if (!player._prevDashCooldown) player._prevDashCooldown = 0;
    if (player._prevDashCooldown > 0 && player.dashCooldown <= 0) {
      player._dashReadyFlash = 10;
    }
    if (player._dashReadyFlash > 0) player._dashReadyFlash--;
    player._prevDashCooldown = player.dashCooldown;

    // Tutorial triggers
    if (frame === 30) {
      showTutorial('move', t('tutMoveHint'), t('tutMoveSub'), '\u{1F5B1}\u{FE0F}');
    }
    if (frame === 180) {
      showTutorial('dash', t('tutDashHint'), t('tutDashSub'), '\u26A1');
    }
    // First food nearby
    if (!tutorialShown.food) {
      for (const f of foods) {
        if (!f.eaten && dist(player.x, player.y, f.x, f.y) < 100) {
          showTutorial('food', t('tutFoodHint'), t('tutFoodSub'), '\u{1F36A}');
          break;
        }
      }
    }
    // First enemy spotted nearby
    if (!tutorialShown.enemy) {
      for (const e of enemies) {
        if (dist(player.x, player.y, e.x, e.y) < 200 && e.state !== 'chase') {
          showTutorial('enemy', t('tutEnemyHint'), t('tutEnemySub'), '\u26A0\u{FE0F}');
          break;
        }
      }
    }
    // First box nearby
    if (!tutorialShown.hide) {
      for (const h of hideSpots) {
        if (dist(player.x, player.y, h.x, h.y) < 80) {
          showTutorial('hide', t('tutHideHint'), t('tutHideSub'), '\u{1F4E6}');
          break;
        }
      }
    }
    // Near grandma with can opener
    if (!tutorialShown.steal && !hasCanOpener && canOpenerGrandma && !canOpenerGrandma._canOpenerStolen) {
      if (dist(player.x, player.y, canOpenerGrandma.x, canOpenerGrandma.y) < 200) {
        showTutorial('steal', t('tutStealHint'), t('tutStealSub'), '\u{1F511}');
      }
    }
    // Final chase starts
    if (gameState === 'finalchase' && !tutorialShown.chase) {
      showTutorial('chase', t('tutChaseHint'), t('tutChaseSub'), '\u{1F3C3}');
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, CFG.W, CFG.H);

  // Portrait orientation hint
  if (isTouchDevice && window.innerWidth < window.innerHeight && gameState !== 'title') {
    ctx.fillStyle = 'rgba(13,8,24,0.95)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 36px sans-serif';
    ctx.fillText('\uD83D\uDCF1\u21BB', CFG.W/2, CFG.H/2 - 30);
    ctx.fillStyle = '#FFF';
    ctx.font = '18px sans-serif';
    ctx.fillText(t('rotateDevice'), CFG.W/2, CFG.H/2 + 20);
    ctx.textAlign = 'left';
    return; // Don't draw game in portrait
  }

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  // Game world
  drawMap();
  drawHideSpots();
  drawCatnipPickups();
  drawFood();
  drawRipples();

  // Sort and draw enemies
  const sortedEnemies = [...enemies].sort((a, b) => a.y - b.y);
  for (const e of sortedEnemies) {
    // Draw enemy before or after player based on Y
    if (e.y < player.y) drawEnemy(e);
  }

  // Player warm glow (cat is a warm body in the dark evening)
  if (!player.hiding) {
    const ps = worldToScreen(player.x, player.y);
    const glowR = 50 + Math.sin(frame * 0.04) * 5;
    const playerGlow = ctx.createRadialGradient(ps.x, ps.y, 0, ps.x, ps.y, glowR);
    playerGlow.addColorStop(0, 'rgba(255,200,100,0.08)');
    playerGlow.addColorStop(0.5, 'rgba(255,180,80,0.03)');
    playerGlow.addColorStop(1, 'rgba(255,160,60,0)');
    ctx.fillStyle = playerGlow;
    ctx.beginPath();
    ctx.arc(ps.x, ps.y, glowR, 0, Math.PI * 2);
    ctx.fill();
  }

  drawPlayer();

  for (const e of sortedEnemies) {
    if (e.y >= player.y) drawEnemy(e);
  }

  drawParticles();

  // Draw mouse cursor target indicator in world (desktop only)
  if (!isTouchDevice && (gameState === 'playing' || gameState === 'finalchase')) {
    const cs = worldToScreen(mouse.worldX, mouse.worldY);
    ctx.save();
    ctx.globalAlpha = mouse.down ? 0.6 : 0.25;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    const cr = 10 + Math.sin(frame * 0.1) * 2;
    ctx.beginPath(); ctx.arc(cs.x, cs.y, cr, 0, Math.PI * 2); ctx.stroke();
    // Crosshair lines
    ctx.beginPath();
    ctx.moveTo(cs.x - cr - 4, cs.y); ctx.lineTo(cs.x - cr + 4, cs.y);
    ctx.moveTo(cs.x + cr - 4, cs.y); ctx.lineTo(cs.x + cr + 4, cs.y);
    ctx.moveTo(cs.x, cs.y - cr - 4); ctx.lineTo(cs.x, cs.y - cr + 4);
    ctx.moveTo(cs.x, cs.y + cr - 4); ctx.lineTo(cs.x, cs.y + cr + 4);
    ctx.stroke();
    // Dash ready indicator
    if (player.dashCooldown <= 0) {
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.15) * 0.2;
      ctx.strokeStyle = '#00FF88';
      ctx.beginPath(); ctx.arc(cs.x, cs.y, cr + 5, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }

  drawUI();

  // === PAUSE OVERLAY ===
  if (gamePausedByUser && (gameState === 'playing' || gameState === 'finalchase')) {
    canvas.style.cursor = 'default';
    ctx.fillStyle = 'rgba(10,5,20,0.75)';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    ctx.textAlign = 'center';
    // Pause icon
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, CFG.W / 2 - 28, CFG.H / 2 - 100, 20, 55, 5); ctx.fill();
    roundRect(ctx, CFG.W / 2 + 8, CFG.H / 2 - 100, 20, 55, 5); ctx.fill();
    // Title
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 32px sans-serif';
    ctx.fillText(t('paused'), CFG.W / 2, CFG.H / 2 - 15);
    // Resume button
    drawTitleButton(t('pauseResume'), CFG.W / 2, CFG.H / 2 + 35, 200, 38);
    // Quit button
    drawTitleButton(t('pauseQuit'), CFG.W / 2, CFG.H / 2 + 85, 200, 38);
    // ESC hint (desktop)
    if (!isTouchDevice) {
      ctx.fillStyle = '#777';
      ctx.font = '11px sans-serif';
      ctx.fillText('ESC', CFG.W / 2, CFG.H / 2 + 120);
    }
    ctx.textAlign = 'left';
  }

  if (gameState === 'gameover') drawGameOver();
  if (gameState === 'victory') drawVictory();
}

// Pause game when tab is hidden (battery/performance)
let gamePaused = false;
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    gamePaused = true;
    if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
  } else {
    gamePaused = false;
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
});

function gameLoop() {
  if (!gamePaused && !gamePausedByUser) {
    frame++;
    const inGame = gameState === 'playing' || gameState === 'finalchase';
    canvas.style.cursor = inGame ? 'none' : 'default';
    update();
  }
  draw();
  requestAnimationFrame(gameLoop);
}

// Initialize
generateMap();
spawnFood();
spawnEnemies();

// Register Service Worker for offline/PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Start
gameLoop();


</script>
