function spawnEnemies() {
  enemies.length = 0;
  const allPositions = [];

  function spawnZoneEnemies(zoneStart, zoneEnd, defs) {
    for (const def of defs) {
      const pos = findValidEnemyPos(zoneStart, zoneEnd, allPositions);
      if (!pos) continue;
      allPositions.push(pos);
      const patrol = generatePatrolRect(pos.x, pos.y, zoneStart, zoneEnd);
      const e = createEnemy(pos.x, pos.y, def.type, patrol);
      if (def.canOpener) {
        e.hasCanOpener = true;
        e._canOpenerStolen = false;
        canOpenerGrandma = e;
      }
      enemies.push(e);
    }
  }

  // Zone 1: 3 grandma, 1 dog, 1 bigdog
  spawnZoneEnemies(ZONE1_START, ZONE1_END, [
    {type:'grandma'},{type:'grandma'},{type:'grandma'},
    {type:'dog'},{type:'bigdog'}
  ]);
  // Zone 2: 3 chef, 3 dog, 1 bigdog (grandma with canOpener spawns dynamically via checkGrandmaSpawn)
  spawnZoneEnemies(ZONE2_START, ZONE2_END, [
    {type:'chef'},{type:'chef'},{type:'chef'},
    {type:'dog'},{type:'dog'},{type:'dog'},
    {type:'bigdog'}
  ]);
  // Zone 3: 2 chef, 2 dog, 1 grandma, 1 bigdog
  spawnZoneEnemies(ZONE3_START, ZONE3_END, [
    {type:'chef'},{type:'chef'},
    {type:'dog'},{type:'dog'},
    {type:'grandma'},{type:'bigdog'}
  ]);
}

function checkGrandmaSpawn() {
  if (canOpenerGrandma !== null) return; // already spawned
  if (catEnergy < CFG.ENERGY_TO_UNLOCK_GATE2 * 0.8) return; // threshold not met
  // Find a valid position in Zone 2
  const pos = findValidEnemyPos(ZONE2_START, ZONE2_END, enemies.map(e => ({ x: Math.floor(e.x / CFG.TILE), y: Math.floor(e.y / CFG.TILE) })));
  if (!pos) return;
  const patrol = generatePatrolRect(pos.x, pos.y, ZONE2_START, ZONE2_END);
  const e = createEnemy(pos.x, pos.y, 'grandma', patrol);
  e.hasCanOpener = true;
  e._canOpenerStolen = false;
  canOpenerGrandma = e;
  enemies.push(e);
  // Dramatic announcement
  addTextParticle(pos.x * CFG.TILE, pos.y * CFG.TILE - 30, -1.2, 100, '#FF6688', '奶奶出现了! Grandma appears!');
  addParticleBurst(pos.x * CFG.TILE, pos.y * CFG.TILE, '#FF6688', 20);
  screenShake = 10;
}

function canSeePlayer(enemy) {
  if (player.hiding) return false;
  if (player.climbing) return false;
  if (activeBuffs.invis > 0) return false;

  const isDrone = (enemy.type === 'drone');
  const playerTile = getTile(player.x, player.y);
  const inVegetation = (playerTile === 4 || playerTile === 5 || playerTile === 7);

  // --- Vegetation cover: ground enemies lose sight of player in 4/5/7 ---
  // Bush (5) = full concealment for ALL ground enemies (densest cover)
  // Tree (4) / Flower (7) = concealment scaled by enemy vision range & speed
  //   - shorter vision → easier to lose (the enemy simply can't see far enough)
  //   - slower speed → easier to lose (can't reposition to find angle)
  // Drone is airborne: ignores ground vegetation entirely
  if (inVegetation && !isDrone) {
    if (playerTile === 5) return false; // Bush: absolute ground concealment
    // Tree/Flower: effective concealment with slight chance of detection
    // Closer + faster + wider-vision enemies have better chance to spot through gaps
    const d = dist(enemy.x, enemy.y, player.x, player.y);
    const baseRange = enemy.visionRange * getZoneNpcScale(getZoneFromY(enemy.y)).visionMul;
    // concealFactor: 0.0 = fully hidden, 1.0 = fully visible
    // Enemies must be very close AND have strong stats to see through tree/flower cover
    const proxFactor = Math.max(0, 1 - d / (baseRange * 0.3)); // only within 30% of range
    const speedFactor = Math.min(1, enemy.chaseSpeed / 4.0);    // faster = better spotting
    const concealFactor = proxFactor * speedFactor * 0.5;        // cap at 50% detection chance
    if (Math.random() > concealFactor) return false;
  }

  // --- Line-of-sight: raycast from enemy to player, vegetation tiles block vision ---
  // (drone exempt — sees from above)
  if (!isDrone) {
    const ex = enemy.x, ey = enemy.y;
    const px = player.x, py = player.y;
    const dx = px - ex, dy = py - ey;
    const steps = Math.max(Math.abs(dx), Math.abs(dy)) / (CFG.TILE * 0.5);
    const stepCount = Math.ceil(steps);
    if (stepCount > 0) {
      const sx = dx / stepCount, sy = dy / stepCount;
      for (let i = 1; i < stepCount; i++) {
        const sampleX = ex + sx * i, sampleY = ey + sy * i;
        const t = getTile(sampleX, sampleY);
        if (t === 4 || t === 5 || t === 7 || t === 9) return false; // vegetation/haystack blocks line of sight
      }
    }
  }

  const d = dist(enemy.x, enemy.y, player.x, player.y);
  let range = enemy.visionRange * getZoneNpcScale(getZoneFromY(enemy.y)).visionMul;
  if (player.sneaking) range *= 0.7 * (2 - (selectedBreed ? selectedBreed.sneakMod * ((getZoneBreedBonus()).sneakMod || 1.0) : 1.0));
  if (d > range) return false;
  const angleToPlayer = Math.atan2(player.y - enemy.y, player.x - enemy.x);
  if (Math.abs(angleDiff(angleToPlayer, enemy.dir)) > enemy.visionAngle / 2) return false;
  return true;
}

function heardRipple(enemy) {
  for (const r of ripples) {
    if (dist(enemy.x, enemy.y, r.x, r.y) < r.maxRadius * 0.8) return { x: r.x, y: r.y };
  }
  return null;
}

function heardRippleFar(enemy) {
  for (const r of ripples) {
    if (dist(enemy.x, enemy.y, r.x, r.y) < r.maxRadius * 1.5) return { x: r.x, y: r.y };
  }
  return null;
}

function updateEnemy(e) {
  // Apply zone-based NPC difficulty scaling
  const _zns = getZoneNpcScale(getZoneFromY(e.y));
  const _eSpd = e.speed * _zns.speedMul;
  const _eCSpd = e.chaseSpeed * _zns.speedMul;
  e.animFrame += 0.1;
  if (e._speechTimer > 0) e._speechTimer--;

  // Stun timer: skip all AI while stunned
  if (e._stunCooldown > 0) e._stunCooldown--;
  if (e.stunTimer > 0) {
    e.stunTimer--;
    return;
  }

  // Banana slip: enemy steps on banana peel
  for (const b of bananas) {
    if (!b.used && dist(e.x, e.y, b.x, b.y) < 20) {
      e.stunTimer = 180;
      b.used = true;
      addParticleBurst(b.x, b.y, '#FFE135', 12);
      addTextParticle(e.x, e.y - 20, -1.5, 60, '#FFE135', '\uD83C\uDF4C Slip!');
      screenShake = 4;
    }
  }

  // Revolving door bounce: chasing enemy hits spinning door
  for (const rd of revdoors) {
    if (rd.spinTimer > 0 && dist(e.x, e.y, rd.x, rd.y) < 25 && (e.state === 'chase' || e.state === 'alert')) {
      // Bounce enemy backward
      const bAngle = Math.atan2(e.y - rd.y, e.x - rd.x);
      e.x += Math.cos(bAngle) * 80;
      e.y += Math.sin(bAngle) * 80;
      e.stunTimer = 60;
      addParticleBurst(rd.x, rd.y, '#6688FF', 10);
      addTextParticle(e.x, e.y - 20, -1.5, 50, '#6688FF', 'Bonk!');
      screenShake = 3;
    }
  }

  // Fishbone lure attraction
  if (window._fishboneLures && window._fishboneLures.length > 0 && (e.state === 'patrol' || e.state === 'alert')) {
    for (const lure of window._fishboneLures) {
      if (lure.timer > 0 && dist(e.x, e.y, lure.x, lure.y) < 180) {
        // Attracted to lure
        const lureAngle = Math.atan2(lure.y - e.y, lure.x - e.x);
        e.dir = lureAngle;
      }
    }
  }

  // Head start stun: enemies are frozen during head start after fish grab
  if (e._headStartStun > 0) {
    e._headStartStun--;
    if (e._headStartStun <= 0) {
      e.state = 'chase';
      e.superChase = true;
      e.chaseLoseTimer = e.chasePersist;
      e._speechText = e.chaseQuote;
      e._speechTimer = 80;
      sfxChase();
    }
    return;
  }

  // Hiding during superChase: if player hides (box/vegetation) for 60+ frames, enemies lose track briefly
  const _scVegTile = getTile(player.x, player.y);
  const _scInCover = player.hiding || (_scVegTile === 4 || _scVegTile === 5 || _scVegTile === 7);
  if (e.superChase && _scInCover && e.type !== 'drone') {
    if (!e._hideTrackTimer) e._hideTrackTimer = 0;
    e._hideTrackTimer++;
    if (e._hideTrackTimer >= 60) {
      // Enemies lose track - slow down and search nearby
      e.state = 'alert';
      e.alertTimer = 90;
      e.superChase = false;
      e._lostTrackTimer = 180; // will resume superChase after 3 seconds
      e._speechText = e.loseQuote;
      e._speechTimer = 50;
      e._hideTrackTimer = 0;
    }
  } else {
    e._hideTrackTimer = 0;
  }
  // Resume superChase after losing track
  if (e._lostTrackTimer > 0) {
    e._lostTrackTimer--;
    if (e._lostTrackTimer <= 0 && gameState === 'finalchase') {
      e.superChase = true;
      e.state = 'chase';
      e.chaseLoseTimer = e.chasePersist;
    }
  }

  // Catnip effect (dogs and grandmas affected, chefs resist)
  if (e.catnipTimer > 0) {
    e.catnipTimer--;
    if (e.fearsCatnip) {
      e.dir += (e.type === 'dog' || e.type === 'bigdog') ? 0.15 : 0.08;
      return;
    } else {
      e.catnipTimer = Math.max(0, e.catnipTimer - 1); // Chef shakes it off 2x faster
    }
  }

  const sees = canSeePlayer(e);
  const heard = heardRipple(e);
  // Chef can smell (detect ripples from further)
  const smelled = e.canSmell ? heardRippleFar(e) : null;

  switch (e.state) {
    case 'patrol': {
      if (sees) {
        e.state = 'alert';
        e.alertTimer = e.alertTime;
        sfxAlert();
        screenShake = 4;
        e._speechText = e.alertQuote;
        e._speechTimer = 60;
        // Non-lethal alerter: notify nearby HUMAN enemies when spotting player
        if (!e.isLethal && e.alertRadius > 0) {
          for (const other of enemies) {
            if (other === e) continue;
            if (dist(other.x, other.y, e.x, e.y) < e.alertRadius && other.state === 'patrol') {
              if (other.isLethal) {
                // Summon lethal humans to chase
                other.state = 'chase';
                other.chaseLoseTimer = other.chasePersist;
                other._chaseTotal = 0;
                other.dir = Math.atan2(player.y - other.y, player.x - other.x);
              } else {
                // Other alerters go to alert state
                other.state = 'alert';
                other.alertTimer = other.alertTime + 60;
              }
              other._speechText = other.alertQuote;
              other._speechTimer = 60;
            }
          }
          if (e.type === 'bigdog') {
            addTextParticle(e.x, e.y - 30, -1.5, 80, '#FF4444', t('bigDogAlert'));
            screenShake = 8;
          } else if (e.type === 'drone') {
            addTextParticle(e.x, e.y - 30, -1.5, 60, '#00CCFF', '📡!');
          } else {
            addTextParticle(e.x, e.y - 30, -1.5, 60, '#FF8844', '!');
          }
        }
        break;
      }
      if (heard) {
        e.dir = Math.atan2(heard.y - e.y, heard.x - e.x);
      } else if (smelled) {
        // Chef/dog moves toward distant sound
        const smellAngle = Math.atan2(smelled.y - e.y, smelled.x - e.x);
        e.dir += angleDiff(smellAngle, e.dir) * 0.02;
      }
      // Guard sleeping logic: don't move if sleeping, wake on nearby ripple
      if (e.type === 'guard' && e.isSleeping) {
        for (const r of ripples) {
          if (dist(e.x, e.y, r.x, r.y) < 120) {
            e.isSleeping = false;
            e.sleepTimer = 0;
            e.state = 'alert';
            e.alertTimer = e.alertTime;
            sfxAlert();
            screenShake = 4;
            e._speechText = e.alertQuote;
            e._speechTimer = 60;
            break;
          }
        }
        break;
      }
      // Guard sleep timer: go back to sleep if no disturbance
      if (e.type === 'guard' && !e.isSleeping) {
        e.sleepTimer = (e.sleepTimer || 0) + 1;
        if (e.sleepTimer > 600 && e.state === 'patrol') {
          e.isSleeping = true;
          e.sleepTimer = 0;
        }
      }
      // Doglady: orbit dog and detect player near dog
      if (e.type === 'doglady') {
        e.dogAngle = (e.dogAngle || 0) + 0.02;
        e.dogX = e.x + Math.cos(e.dogAngle) * e.leashRadius;
        e.dogY = e.y + Math.sin(e.dogAngle) * e.leashRadius;
        const pTile = getTile(player.x, player.y);
        const playerInVeg = (pTile === 4 || pTile === 5 || pTile === 7);
        if (dist(player.x, player.y, e.dogX, e.dogY) < 100 && !player.hiding && !player.climbing && activeBuffs.invis <= 0 && !playerInVeg) {
          e.state = 'alert';
          e.alertTimer = e.alertTime;
          sfxAlert();
          screenShake = 4;
          e._speechText = e.alertQuote;
          e._speechTimer = 60;
          // Doglady's dog barks — alert nearby human enemies
          if (e.alertRadius > 0) {
            for (const other of enemies) {
              if (other === e) continue;
              if (other.isLethal && dist(other.x, other.y, e.x, e.y) < e.alertRadius && other.state === 'patrol') {
                other.state = 'alert';
                other.alertTimer = other.alertTime + 40;
                other.dir = Math.atan2(player.y - other.y, player.x - other.x);
                other._speechText = other.alertQuote;
                other._speechTimer = 60;
              }
            }
            addTextParticle(e.dogX, e.dogY - 20, -1, 50, '#CC6699', '🐕!');
          }
          break;
        }
      }
      // Move along patrol
      if (!e.patrol || e.patrol.length === 0) break;
      const target = e.patrol[e.patrolIdx % e.patrol.length];
      const tx = target.x * CFG.TILE;
      const ty = target.y * CFG.TILE;
      const d = dist(e.x, e.y, tx, ty);
      if (d < 10) {
        e.patrolIdx = (e.patrolIdx + 1) % e.patrol.length;
      } else {
        const angle = Math.atan2(ty - e.y, tx - e.x);
        e.dir = angle;
        const nx = e.x + Math.cos(angle) * _eSpd;
        const ny = e.y + Math.sin(angle) * _eSpd;
        if (!isBlocked(nx, ny)) { e.x = nx; e.y = ny; }
        else { e.patrolIdx = (e.patrolIdx + 1) % e.patrol.length; }
      }
      break;
    }
    case 'alert': {
      e.alertTimer--;
      // Grandma looks around slowly, chef snaps head fast, dog sniffs in circles
      if (e.type === 'grandma') {
        e.dir += Math.sin(e.animFrame * 2) * 0.03;
      } else if (e.type === 'chef') {
        e.dir += Math.sin(e.animFrame * 5) * 0.08;
      } else {
        // Dog: sniff animation, move toward last known position
        e.dir += Math.sin(e.animFrame * 4) * 0.06;
        if (heard) {
          const nx = e.x + Math.cos(e.dir) * _eSpd * 0.5;
          const ny = e.y + Math.sin(e.dir) * _eSpd * 0.5;
          if (!isBlocked(nx, ny)) { e.x = nx; e.y = ny; }
        }
      }
      if (sees) {
        e.state = 'chase';
        e.chaseLoseTimer = e.chasePersist;
        e._chaseTotal = 0;
        sfxChase();
        screenShake = 6;
        e._speechText = e.chaseQuote;
        e._speechTimer = 80;
      }
      if (e.alertTimer <= 0) {
        e.state = 'patrol';
        e._speechText = e.loseQuote;
        e._speechTimer = 50;
      }
      break;
    }
    case 'chase': {
      // Chase timeout: enemies give up after extended chase (not during finalchase)
      if (!e._chaseTotal) e._chaseTotal = 0;
      e._chaseTotal++;
      if (!e.superChase && e._chaseTotal > currentLevel.chaseTimeout) { // chase timeout from level config
        e.state = 'patrol';
        e._speechText = e.loseQuote;
        e._speechTimer = 50;
        e._chaseTotal = 0;
        break;
      }
      if (!sees && !e.superChase) {
        e.chaseLoseTimer--;
        if (e.chaseLoseTimer <= 0) {
          e.state = 'patrol';
          e._speechText = e.loseQuote;
          e._speechTimer = 50;
          break;
        }
      } else {
        e.chaseLoseTimer = e.chasePersist;
      }
      // Movement personality during chase
      const angle = Math.atan2(player.y - e.y, player.x - e.x);
      e.dir = angle;
      let cspd = _eCSpd;
      if (e.superChase) { cspd *= 1.05; cspd = Math.min(cspd, 4.2); }
      // Grandma waddles (slight zigzag)
      let moveAngle = angle;
      if (e.type === 'grandma') {
        moveAngle += Math.sin(e.animFrame * 4) * 0.15;
        cspd *= 0.95 + Math.sin(e.animFrame * 3) * 0.05; // Unsteady pace
      }
      // Dog: brief burst speed every few seconds
      if (e.type === 'dog' && Math.sin(e.animFrame * 0.8) > 0.8) {
        cspd *= 1.12; // Mild sprint bursts
      }
      // Big dog: no repeated barks during chase (only alerts on first spot)
      const nx = e.x + Math.cos(moveAngle) * cspd;
      const ny = e.y + Math.sin(moveAngle) * cspd;
      if (!isBlocked(nx, ny)) { e.x = nx; e.y = ny; }
      else {
        const nx2 = e.x + Math.cos(angle + 0.5) * cspd;
        const ny2 = e.y + Math.sin(angle + 0.5) * cspd;
        if (!isBlocked(nx2, ny2)) { e.x = nx2; e.y = ny2; }
      }
      // Near-miss feedback
      const catchDist = dist(e.x, e.y, player.x, player.y);
      if (catchDist < 50 && catchDist > 25 && (player.dashing || player.invulnerable > 0)) {
        if (!e._nearMissFrame || frame - e._nearMissFrame > 30) {
          e._nearMissFrame = frame;
          screenShake = 3;
          score += 50;
          addTextParticle(player.x, player.y - 20, -2, 50, '#00FFFF', t('nearMiss'));
          playTone(1200, 0.06, 0.1, 'sine');
          playTone(1500, 0.04, 0.08, 'sine');
        }
      }
      // Catch player — cannot catch if player is in dense vegetation (bush) unless drone
      const _catchTile = getTile(player.x, player.y);
      const _catchInBush = (_catchTile === 5) && e.type !== 'drone';
      if (catchDist < 25 && !player.hiding && !player.climbing && player.invulnerable <= 0 && !player.dashing && !_catchInBush) {
        if (activeBuffs.invis > 0) {
          // Invisible - enemies can't catch
        } else if (!e.isLethal) {
          // === NON-LETHAL ALERTER: broadcast alarm to summon human enemies ===
          // Dog/BigDog/Drone/Doglady reach the player but don't harm — they alert
          const _alertR = e.alertRadius || 250;
          let _alertedCount = 0;
          for (const other of enemies) {
            if (other === e) continue;
            if (!other.isLethal) continue; // Only summon lethal (human) enemies
            if (dist(other.x, other.y, e.x, e.y) < _alertR) {
              other.state = 'chase';
              other.chaseLoseTimer = other.chasePersist;
              other._chaseTotal = 0;
              other.dir = Math.atan2(player.y - other.y, player.x - other.x);
              other._speechText = other.chaseQuote;
              other._speechTimer = 60;
              _alertedCount++;
            }
          }
          // Visual/audio feedback for the alert
          if (e.type === 'drone') {
            addTextParticle(e.x, e.y - 25, -1.5, 70, '#00CCFF', '📡 ALERT!');
            playTone(800, 0.08, 0.15, 'square');
            playTone(1200, 0.06, 0.1, 'square');
          } else if (e.type === 'bigdog') {
            addTextParticle(e.x, e.y - 25, -1.5, 70, '#D4A030', t('bigDogAlert'));
            playTone(200, 0.2, 0.3, 'sawtooth');
            playTone(250, 0.15, 0.25, 'sawtooth');
          } else {
            addTextParticle(e.x, e.y - 25, -1.5, 70, '#FF8844', '🐕 WOOF!');
            playTone(400, 0.1, 0.2, 'sawtooth');
          }
          screenShake = 5;
          addParticleBurst(e.x, e.y, e.color, 8);
          // Non-lethal enemy bumps player back slightly and disengages
          player.invulnerable = 30; // Brief invulnerability to prevent spam
          e.state = 'alert';
          e.alertTimer = 90;
          // If alerted humans, show count
          if (_alertedCount > 0) {
            addTextParticle(player.x, player.y - 40, -1, 60, '#FF4444', _alertedCount + ' enemy alerted!');
          }
        } else if (activeBuffs.shield) {
          activeBuffs.shield = false;
          player.invulnerable = 45;
          screenShake = 8;
          addParticleBurst(player.x, player.y, '#FFD700', 20);
          addTextParticle(player.x, player.y - 25, -1.5, 50, '#FFD700', '🛡️护盾碎裂!');
          playTone(300, 0.2, 0.3, 'sawtooth');
          e.state = 'alert';
          e.alertTimer = CFG.ALERT_TIME;
        } else if (player.lives > 1) {
          player.lives--;
          player.invulnerable = 90;
          screenShake = 15;
          // Soul ghost rising from body
          spawnSoulGhost(player.x, player.y);
          // Red burst + cyan soul sparkles
          addParticleBurst(player.x, player.y, '#FF4444', 15);
          addParticleBurst(player.x, player.y, '#00ccff', 10);
          // Remaining lives indicator
          addTextParticle(player.x, player.y - 30, -1.5, 80, '#00ccff', '剩余 ' + player.lives + ' 命');
          // Eerie death sound
          playTone(600, 0.1, 0.3, 'sine');
          playTone(400, 0.12, 0.25, 'sine');
          playTone(250, 0.15, 0.2, 'sawtooth');
          // All nearby enemies disengage chase after catching
          for (const en of enemies) {
            if (dist(en.x, en.y, player.x, player.y) < 200) {
              en.state = 'alert';
              en.alertTimer = 60;
            }
          }
        } else {
          gameState = 'gameover';
          gameOverTimer = 0;
          sfxLose();
          screenShake = 15;
        }
      }
      break;
    }
  }
}

// SECTION: Food & Items
const foods = [];
let grandFish = null;
const hideSpots = [];
const catnipPickups = [];
const ripples = [];
const catnipEffects = [];

function spawnFood() {
  foods.length = 0;
  hideSpots.length = 0;
  catnipPickups.length = 0;

  // Helper to spawn N food items in a zone
  function spawnFoodItems(count, zoneStart, zoneEnd, type, value) {
    const used = [];
    for (let i = 0; i < count; i++) {
      const pos = findValidItemPos(zoneStart, zoneEnd, used, 1);
      if (pos) {
        used.push(pos);
        foods.push({ x: pos.x, y: pos.y, type: type, value: value, eaten: false });
      }
    }
  }

  // Zone 1: 30 biscuits, 5 cans
  spawnFoodItems(30, ZONE1_START, ZONE1_END, 'biscuit', 5);
  spawnFoodItems(5, ZONE1_START, ZONE1_END, 'can', 15);
  // Zone 2: 20 biscuits, 15 cans
  spawnFoodItems(20, ZONE2_START, ZONE2_END, 'biscuit', 5);
  spawnFoodItems(15, ZONE2_START, ZONE2_END, 'can', 15);
  // Zone 3: 12 cans, 8 fish
  spawnFoodItems(12, ZONE3_START, ZONE3_END, 'can', 15);
  spawnFoodItems(8, ZONE3_START, ZONE3_END, 'fish', 30);

  // Grand Master Fish (fixed)
  grandFish = { x: 25 * CFG.TILE, y: 15 * CFG.TILE, eaten: false };

  // Hide spots (cardboard boxes) - randomized per zone
  const boxUsed = [];
  function spawnBoxes(count, zoneStart, zoneEnd) {
    for (let i = 0; i < count; i++) {
      const pos = findValidItemPos(zoneStart, zoneEnd, boxUsed, 6);
      if (pos) {
        boxUsed.push(pos);
        hideSpots.push({ x: pos.x, y: pos.y, occupied: false });
      }
    }
  }
  spawnBoxes(4, ZONE1_START, ZONE1_END);
  spawnBoxes(5, ZONE2_START, ZONE2_END);
  spawnBoxes(4, ZONE3_START, ZONE3_END);
  // Extra boxes near stage area and outskirts in zone 3
  spawnBoxes(2, ZONE3_START + 5, ZONE3_END - 5);
  spawnBoxes(2, ZONE3_START, ZONE3_END);

  // Catnip pickups - 8 total, ~2-3 per zone
  const catnipUsed = [];
  function spawnCatnips(count, zoneStart, zoneEnd) {
    for (let i = 0; i < count; i++) {
      const pos = findValidItemPos(zoneStart, zoneEnd, catnipUsed, 8);
      if (pos) {
        catnipUsed.push(pos);
        catnipPickups.push({ x: pos.x, y: pos.y, collected: false });
      }
    }
  }
  spawnCatnips(3, ZONE1_START, ZONE1_END);
  spawnCatnips(3, ZONE2_START, ZONE2_END);
  spawnCatnips(2, ZONE3_START, ZONE3_END);

  // Buff pickups - 11 total, cycling types
  buffPickups.length = 0;
  const buffTypes = ['speed', 'invis', 'shield'];
  const buffUsed = [];
  let buffIdx = 0;
  function spawnBuffs(count, zoneStart, zoneEnd) {
    for (let i = 0; i < count; i++) {
      const pos = findValidItemPos(zoneStart, zoneEnd, buffUsed, 4);
      if (pos) {
        buffUsed.push(pos);
        buffPickups.push({ x: pos.x, y: pos.y, type: buffTypes[buffIdx % 3], collected: false, respawnTimer: 0 });
        buffIdx++;
      }
    }
  }
  spawnBuffs(3, ZONE1_START, ZONE1_END);
  spawnBuffs(4, ZONE2_START, ZONE2_END);
  spawnBuffs(4, ZONE3_START, ZONE3_END);

  // Life pickups - 2 total: 1 in Zone 2, 1 in Zone 3
  lifePickups.length = 0;
  const lifeUsed = [];
  const life1 = findValidItemPos(ZONE2_START, ZONE2_END, lifeUsed, 4);
  if (life1) { lifeUsed.push(life1); lifePickups.push({ x: life1.x, y: life1.y, collected: false }); }
  const life2 = findValidItemPos(ZONE3_START, ZONE3_END, lifeUsed, 4);
  if (life2) { lifeUsed.push(life2); lifePickups.push({ x: life2.x, y: life2.y, collected: false }); }
}

function consumeFood(food) {
  food.eaten = true;
  const energyVal = Math.round(food.value * (selectedBreed ? selectedBreed.energyMod * ((getZoneBreedBonus()).energyMod || 1.0) : 1.0));
  catEnergy = Math.min(CFG.ENERGY_MAX, catEnergy + energyVal);
  // Combo multiplier!
  const multiplier = 1 + Math.min(combo, 20) * 0.2;
  const pts = Math.floor(food.value * 10 * multiplier * (selectedBreed ? selectedBreed.scoreMod : 1.0));
  score += pts;
  // Type-specific effects
  if (food.type === 'icecream') {
    // Speed boost: +40% speed for 5 seconds (300 frames)
    activeBuffs.speed = Math.max(activeBuffs.speed || 0, 300);
    addTextParticle(food.x, food.y - 20, -1.5, 50, '#87CEEB', '⚡+Speed!');
    addParticleBurst(food.x, food.y, '#87CEEB', 10);
  }
  // Particle burst scaled with combo
  const burstCount = 6 + Math.min(combo, 10) * 2;
  addParticleBurst(food.x, food.y, food.type === 'biscuit' ? '#D2691E' : food.type === 'can' ? '#C0C0C0' : '#FFD700', burstCount);
  // Floating score text
  addTextParticle(food.x, food.y - 10, -1.5, 40, combo > 5 ? '#FFD700' : '#FFF', `+${pts}` + (combo > 2 ? ` x${combo}` : ''));
}

function throwCatnip(x, y) {
  sfxCatnip();
  // Catnip effect centered on the cat
  catnipEffects.push({ x: x, y: y, timer: CFG.CATNIP_DURATION, radius: 150 });
  addParticleBurst(x, y, '#90EE90', 15);
  // Affect nearby enemies
  for (const e of enemies) {
    if (dist(e.x, e.y, x, y) < 200) {
      e.catnipTimer = CFG.CATNIP_DURATION;
      e.state = 'patrol';
    }
  }
}

function addRipple(x, y, maxRadius, color) {
  const MAX_RIPPLES = isMobileDevice ? 8 : 20;
  if (ripples.length >= MAX_RIPPLES) ripples.shift();
  ripples.push({ x, y, radius: 0, maxRadius, color, alpha: 0.5 });
}

function updateRipples() {
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].radius += 2 * TICK_MULT;
    ripples[i].alpha -= 0.01 * TICK_MULT;
    if (ripples[i].radius > ripples[i].maxRadius || ripples[i].alpha <= 0) ripples.splice(i, 1);
  }
  for (let i = catnipEffects.length - 1; i >= 0; i--) {
    catnipEffects[i].timer -= TICK_MULT;
    if (catnipEffects[i].timer <= 0) catnipEffects.splice(i, 1);
  }
  // Pickup catnip items
  for (const c of catnipPickups) {
    if (!c.collected && dist(player.x, player.y, c.x, c.y) < 30) {
      c.collected = true;
      catnipCount++;
      addParticleBurst(c.x, c.y, '#90EE90', 10);
    }
  }
  // Buff pickup
  for (const bp of buffPickups) {
    if (!bp.collected && dist(player.x, player.y, bp.x, bp.y) < 35) {
      bp.collected = true;
      bp.respawnTimer = 900;
      if (bp.type === 'invis') {
        activeBuffs.invis = Math.round(200 * (selectedBreed ? selectedBreed.sneakMod * ((getZoneBreedBonus()).sneakMod || 1.0) : 1.0));
        addParticleBurst(bp.x, bp.y, '#AA88FF', 12);
        playTone(800, 0.1, 0.15, 'sine');
        playTone(1200, 0.08, 0.1, 'sine');
      } else if (bp.type === 'speed') {
        activeBuffs.speed = 200;
        addParticleBurst(bp.x, bp.y, '#00FFFF', 12);
        playTone(600, 0.1, 0.15, 'triangle');
        playTone(900, 0.08, 0.1, 'triangle');
      } else if (bp.type === 'shield') {
        activeBuffs.shield = true;
        addParticleBurst(bp.x, bp.y, '#FFD700', 15);
        playTone(400, 0.15, 0.2, 'square');
        playTone(600, 0.1, 0.15, 'square');
      }
      addTextParticle(bp.x, bp.y - 15, -1.5, 50, '#FFF', bp.type === 'invis' ? '📦隐身!' : bp.type === 'speed' ? '⚡加速!' : '🛡️护盾!');
      score += 25;
    }
  }
  // Life pickup
  for (const lp of lifePickups) {
    if (!lp.collected && dist(player.x, player.y, lp.x, lp.y) < 35) {
      lp.collected = true;
      player.lives = Math.min(5, player.lives + 1);
      addParticleBurst(lp.x, lp.y, '#FF69B4', 15);
      addTextParticle(lp.x, lp.y - 15, -1.5, 60, '#FF69B4', '❤️+1 (' + player.lives + '/4)');
      playTone(523, 0.1, 0.15, 'sine');
      playTone(659, 0.08, 0.12, 'sine');
      playTone(784, 0.06, 0.1, 'sine');
      score += 50;
    }
  }
}

// SECTION: Particles (Object Pool)
const PARTICLE_POOL_SIZE = isMobileDevice ? 80 : 200;
const particlePool = new Array(PARTICLE_POOL_SIZE);
for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
  particlePool[i] = { active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, color: '', size: 0, text: '', isText: false };
}
// Keep 'particles' as a reference alias for draw code compatibility
const particles = particlePool;

function addParticleBurst(x, y, color, count) {
  let added = 0;
  for (let i = 0; i < PARTICLE_POOL_SIZE && added < count; i++) {
    if (!particlePool[i].active) {
      const p = particlePool[i];
      const angle = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 3;
      p.active = true;
      p.x = x; p.y = y;
      p.vx = Math.cos(angle) * spd;
      p.vy = Math.sin(angle) * spd;
      p.life = 30 + Math.random() * 30;
      p.maxLife = 60;
      p.color = color;
      p.size = 2 + Math.random() * 4;
      p.text = ''; p.isText = false;
      added++;
    }
  }
}

function addTextParticle(x, y, vy, life, color, text) {
  for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
    if (!particlePool[i].active) {
      const p = particlePool[i];
      p.active = true;
      p.x = x; p.y = y;
      p.vx = 0; p.vy = vy;
      p.life = life; p.maxLife = life;
      p.color = color;
      p.size = 0; p.text = text; p.isText = true;
      return;
    }
  }
}

function addGenericParticle(x, y, vx, vy, life, color, size) {
  for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
    if (!particlePool[i].active) {
      const p = particlePool[i];
      p.active = true;
      p.x = x; p.y = y;
      p.vx = vx; p.vy = vy;
      p.life = life; p.maxLife = life;
      p.color = color;
      p.size = size; p.text = ''; p.isText = false;
      return;
    }
  }
}

// Soul ghost effect — when cat loses a life, a translucent ghost rises from the body
const soulGhosts = [];
function spawnSoulGhost(wx, wy) {
  soulGhosts.push({
    wx, wy,           // world position (x stays, y rises)
    startY: wy,
    life: 90,         // frames (~1.5s at 60fps)
    maxLife: 90,
    phase: Math.random() * Math.PI * 2,
  });
}

function updateSoulGhosts() {
  for (let i = soulGhosts.length - 1; i >= 0; i--) {
    const g = soulGhosts[i];
    g.life -= TICK_MULT;
    g.wy -= 0.8 * TICK_MULT;     // float upward in world coords
    if (g.life <= 0) soulGhosts.splice(i, 1);
  }
}

function drawSoulGhosts() {
  for (const g of soulGhosts) {
    const s = worldToScreen(g.wx, g.wy);
    const t = 1 - g.life / g.maxLife;           // 0→1 progress
    const alpha = Math.max(0, 0.7 * (1 - t));   // fade out
    const wavX = Math.sin(g.phase + t * 8) * 6; // horizontal sway
    const sc = 1 + t * 0.3;                     // scale up slightly

    ctx.save();
    ctx.translate(s.x + wavX, s.y);
    ctx.scale(sc, sc);
    ctx.globalAlpha = alpha;

    // Outer glow
    if (isMobileDevice) {
      ctx.fillStyle = 'rgba(0,204,255,0.15)';
      ctx.beginPath();
      ctx.arc(0, -4, 20, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const glow = ctx.createRadialGradient(0, -4, 0, 0, -4, 30);
      glow.addColorStop(0, 'rgba(0,204,255,0.35)');
      glow.addColorStop(1, 'rgba(0,204,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, -4, 30, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ghost body — translucent white cat silhouette
    ctx.fillStyle = 'rgba(200,230,255,0.6)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // Belly
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, 2, 7, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = 'rgba(200,230,255,0.6)';
    ctx.beginPath();
    ctx.arc(0, -14, 10, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.beginPath();
    ctx.moveTo(-9, -18); ctx.lineTo(-5, -26); ctx.lineTo(-1, -18);
    ctx.moveTo(9, -18); ctx.lineTo(5, -26); ctx.lineTo(1, -18);
    ctx.fill();
    // Eyes — soft glowing dots
    ctx.fillStyle = 'rgba(0,204,255,0.9)';
    ctx.beginPath();
    ctx.arc(-4, -15, 2.5, 0, Math.PI * 2);
    ctx.arc(4, -15, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Wispy tail trailing upward
    ctx.strokeStyle = `rgba(200,230,255,${alpha * 0.7})`;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 14);
    ctx.quadraticCurveTo(10 + Math.sin(g.phase + t * 6) * 5, 24, 5, 34);
    ctx.stroke();

    // Small rising sparkles
    for (let si = 0; si < 3; si++) {
      const sa = g.phase + si * 2.1 + t * 4;
      const sx = Math.sin(sa) * (8 + si * 4);
      const sy = -20 - si * 8 - t * 20;
      const sparkAlpha = Math.max(0, alpha * (0.6 - si * 0.15));
      ctx.fillStyle = `rgba(0,204,255,${sparkAlpha})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5 - si * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

function updateParticles() {
  for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
    const p = particlePool[i];
    if (!p.active) continue;
    p.x += p.vx * TICK_MULT;
    p.y += p.vy * TICK_MULT;
    p.vy += 0.05 * TICK_MULT;
    p.vx *= 0.98;
    p.life -= TICK_MULT;
    if (p.life <= 0) p.active = false;
  }
}

function getZoneTint(ty) {
  if (ty < ZONE2_START) return COLORS.zone3Tint;
  if (ty < ZONE1_START) return COLORS.zone2Tint;
  return COLORS.zone1Tint;
}

function drawGrassBlade(sx, sy, tx, ty) {
  // Draw a few blades of grass per tile for texture
  const seed = (tx * 127 + ty * 311) % grassNoise.length;
  for (let i = 0; i < 3; i++) {
    const n = grassNoise[(seed + i * 37) % grassNoise.length];
    const sway = Math.sin(frame * n.speed + n.phase) * 2;
    const bx = sx + n.ox;
    const by = sy + n.oy;
    ctx.strokeStyle = n.shade > 0 ? '#2A5020' : '#4A7838';
    ctx.lineWidth = n.w;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx + sway, by - n.h * 0.6, bx + sway * 1.5, by - n.h);
    ctx.stroke();
  }
}

function drawTile(tx, ty) {
  const wx = tx * CFG.TILE;
  const wy = ty * CFG.TILE;
  const s = worldToScreen(wx, wy);
  const TW = CFG.TILE * VIEW_ZOOM;
  const TH = CFG.TILE * VIEW_ZOOM * VIEW_ANGLE_Y;
  if (s.x < -TW || s.x > CFG.W + TW || s.y < -TH || s.y > CFG.H + TH) return;
  const tile = map[ty]?.[tx];
  if (tile === undefined) return;

  const T = TW;
  const TY = TH;
  const cx = s.x + T / 2;
  const cy = s.y + TY / 2;

  // Grass base with zone tinting
  const grassIdx = (tx * 7 + ty * 13) % 3;
  ctx.fillStyle = COLORS.grass[grassIdx];
  ctx.fillRect(s.x, s.y, T + 1, TY + 1);

  // Subtle checkerboard for depth
  if ((tx + ty) % 2 === 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(s.x, s.y, T + 1, TY + 1);
  }

  // Zone tint overlay
  const tint = getZoneTint(ty);
  if (tint[3] > 0) {
    ctx.fillStyle = `rgba(${128+tint[0]},${110+tint[1]},${60+tint[2]},${tint[3]})`;
    ctx.fillRect(s.x, s.y, T + 1, TY + 1);
  }

  // Grass blade details (only for pure grass tiles, skip on mobile for performance)
  if (!isMobileDevice && (tile === 0 || tile === 7)) {
    drawGrassBlade(s.x, s.y, tx, ty);
  }

  switch (tile) {
    case 1: { // Path - sandy dirt with subtle worn lines and grass fringe
      // Warm beige/tan base
      ctx.fillStyle = '#C4A968';
      ctx.fillRect(s.x, s.y, T + 1, TY + 1);
      // Subtle edge darkening (depth)
      ctx.fillStyle = 'rgba(0,0,0,0.09)';
      ctx.fillRect(s.x, s.y + TY - 3, T + 1, 3);
      ctx.fillRect(s.x + T - 2, s.y, 2, TY + 1);
      // Green fringe on top/left edges (transition to grass)
      ctx.fillStyle = 'rgba(60,110,40,0.18)';
      ctx.fillRect(s.x, s.y, T + 1, 2);
      ctx.fillRect(s.x, s.y, 2, TY + 1);
      // Two thin worn track lines (seeded per tile)
      const trOff = ((tx * 37 + ty * 19) % 5) * 0.04;
      ctx.strokeStyle = 'rgba(100,70,20,0.18)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s.x + T * (0.28 + trOff), s.y + 2);
      ctx.lineTo(s.x + T * (0.3 + trOff), s.y + TY - 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s.x + T * (0.62 + trOff), s.y + 2);
      ctx.lineTo(s.x + T * (0.64 + trOff), s.y + TY - 2);
      ctx.stroke();
      break;
    }
    case 2: { // Table - wood surface with grain, checkered cloth, 3D depth, leg dots
      // Ground shadow (ellipse beneath table)
      ctx.fillStyle = 'rgba(0,5,20,0.22)';
      ctx.beginPath();
      ctx.ellipse(cx + 3, cy + TY * 0.3, T * 0.42, TY * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      // Table top surface
      const tblPad = T * 0.1;
      const tblW = T - tblPad * 2;
      const tblH = TY - tblPad * 2;
      ctx.fillStyle = COLORS.table;
      roundRect(ctx, s.x + tblPad, s.y + tblPad, tblW, tblH, 4);
      ctx.fill();
      // Darker right + bottom edge for 3D depth
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(s.x + tblPad + tblW - 4, s.y + tblPad, 4, tblH);
      ctx.fillRect(s.x + tblPad, s.y + tblPad + tblH - 3, tblW, 3);
      // Wood grain lines (horizontal)
      ctx.strokeStyle = 'rgba(80,40,5,0.18)';
      ctx.lineWidth = 0.8;
      for (let gi = 0; gi < 4; gi++) {
        const gy = s.y + tblPad + (tblH / 5) * (gi + 1);
        ctx.beginPath();
        ctx.moveTo(s.x + tblPad + 3, gy);
        ctx.lineTo(s.x + tblPad + tblW - 5, gy);
        ctx.stroke();
      }
      // Red-white checkered cloth in top-right corner
      const clothX = s.x + tblPad + tblW * 0.55;
      const clothY = s.y + tblPad + 2;
      const cs = Math.floor(tblW * 0.14);
      for (let ci = 0; ci < 3; ci++) {
        for (let cj = 0; cj < 2; cj++) {
          ctx.fillStyle = (ci + cj) % 2 === 0 ? 'rgba(210,50,50,0.55)' : 'rgba(255,255,255,0.5)';
          ctx.fillRect(clothX + ci * cs, clothY + cj * cs, cs, cs);
        }
      }
      // Top edge highlight
      ctx.strokeStyle = 'rgba(255,220,160,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(s.x + tblPad + 4, s.y + tblPad + 1);
      ctx.lineTo(s.x + tblPad + tblW - 5, s.y + tblPad + 1);
      ctx.stroke();
      // Leg dots at four corners
      ctx.fillStyle = '#5A3A10';
      const legOff = tblPad + 3;
      for (const [lx, ly] of [[legOff, legOff], [T - legOff, legOff], [legOff, TY - legOff], [T - legOff, TY - legOff]]) {
        ctx.beginPath();
        ctx.arc(s.x + lx, s.y + ly, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 3: { // Fence - post + rail with wood grain, cap, shadow, highlight
      // Ground shadow
      ctx.fillStyle = 'rgba(0,5,20,0.14)';
      ctx.fillRect(s.x + T * 0.35, s.y + TY * 0.55, T * 0.5, TY * 0.4);
      // Horizontal rail (behind post)
      ctx.fillStyle = COLORS.fence;
      ctx.fillRect(s.x + 2, s.y + TY * 0.38, T - 4, TY * 0.22);
      // Rail top highlight
      ctx.fillStyle = COLORS.fenceLight;
      ctx.fillRect(s.x + 2, s.y + TY * 0.38, T - 4, 2);
      // Rail bottom shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(s.x + 2, s.y + TY * 0.38 + TY * 0.22 - 2, T - 4, 2);
      // Rail grain lines
      ctx.strokeStyle = 'rgba(60,30,5,0.15)';
      ctx.lineWidth = 0.6;
      for (let gi = 0; gi < 2; gi++) {
        const gx = s.x + 6 + gi * (T * 0.4);
        ctx.beginPath();
        ctx.moveTo(gx, s.y + TY * 0.40);
        ctx.lineTo(gx + T * 0.3, s.y + TY * 0.40 + TY * 0.17);
        ctx.stroke();
      }
      // Vertical post (in front of rail)
      ctx.fillStyle = COLORS.fence;
      ctx.fillRect(s.x + T * 0.42, s.y + TY * 0.08, T * 0.16, TY * 0.84);
      // Post left highlight
      ctx.fillStyle = COLORS.fenceLight;
      ctx.fillRect(s.x + T * 0.42, s.y + TY * 0.08, T * 0.04, TY * 0.84);
      // Post right shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(s.x + T * 0.54, s.y + TY * 0.08, T * 0.04, TY * 0.84);
      // Post cap (darker top)
      ctx.fillStyle = '#7D4420';
      ctx.fillRect(s.x + T * 0.40, s.y + TY * 0.06, T * 0.20, TY * 0.07);
      // Cap warm highlight
      ctx.fillStyle = 'rgba(255,200,100,0.3)';
      ctx.fillRect(s.x + T * 0.40, s.y + TY * 0.06, T * 0.20, 2);
      // Nail dot at rail-post junction
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(s.x + T * 0.5, s.y + TY * 0.49, 1.5, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 4: { // Tree - large organic canopy beyond tile bounds, trunk, ground shadow
      // Elongated ground shadow
      ctx.fillStyle = 'rgba(0,10,30,0.28)';
      ctx.beginPath();
      ctx.ellipse(cx + 4, cy + TY * 0.55, T * 0.48, TY * 0.22, 0.15, 0, Math.PI * 2);
      ctx.fill();
      // Trunk
      const trunkW = T * 0.15;
      const trunkTop = cy - TY * 0.05;
      const trunkBot = cy + TY * 0.45;
      ctx.fillStyle = COLORS.treeTrunk;
      ctx.fillRect(cx - trunkW * 0.5, trunkTop, trunkW, trunkBot - trunkTop);
      // Trunk left highlight
      ctx.fillStyle = '#6D5047';
      ctx.fillRect(cx - trunkW * 0.5, trunkTop, trunkW * 0.28, trunkBot - trunkTop);
      // Root flares
      ctx.fillStyle = COLORS.treeTrunk;
      ctx.beginPath();
      ctx.ellipse(cx - trunkW * 0.7, trunkBot - 2, trunkW * 0.7, TY * 0.08, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + trunkW * 0.7, trunkBot - 1, trunkW * 0.6, TY * 0.07, 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Canopy layers — extend beyond tile for organic feel
      // Back layers (darker, lower)
      ctx.fillStyle = '#0A3410';
      ctx.beginPath();
      ctx.arc(cx + T * 0.18, cy - TY * 0.28, T * 0.32, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0D3E14';
      ctx.beginPath();
      ctx.arc(cx - T * 0.2, cy - TY * 0.22, T * 0.34, 0, Math.PI * 2);
      ctx.fill();
      // Mid layers
      ctx.fillStyle = '#145020';
      ctx.beginPath();
      ctx.arc(cx + T * 0.1, cy - TY * 0.42, T * 0.36, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#185A24';
      ctx.beginPath();
      ctx.arc(cx - T * 0.08, cy - TY * 0.52, T * 0.38, 0, Math.PI * 2);
      ctx.fill();
      // Front bright top layer
      ctx.fillStyle = '#1E6828';
      ctx.beginPath();
      ctx.arc(cx, cy - TY * 0.6, T * 0.30, 0, Math.PI * 2);
      ctx.fill();
      // Sun highlight (top-left, warm)
      ctx.fillStyle = 'rgba(200,240,120,0.22)';
      ctx.beginPath();
      ctx.arc(cx - T * 0.12, cy - TY * 0.68, T * 0.16, 0, Math.PI * 2);
      ctx.fill();
      // Right-side depth shadow
      ctx.fillStyle = 'rgba(5,15,40,0.18)';
      ctx.beginPath();
      ctx.arc(cx + T * 0.14, cy - TY * 0.38, T * 0.22, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 5: { // Bush - dense rounded shape, shorter than tree, ground shadow
      // Ground shadow
      ctx.fillStyle = 'rgba(0,10,20,0.18)';
      ctx.beginPath();
      ctx.ellipse(cx + 2, cy + TY * 0.38, T * 0.38, TY * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();
      // Base layer (widest, darkest)
      ctx.fillStyle = '#0E3A12';
      ctx.beginPath();
      ctx.arc(cx, cy + TY * 0.08, T * 0.36, 0, Math.PI * 2);
      ctx.fill();
      // Left mid lobe
      ctx.fillStyle = '#154A1A';
      ctx.beginPath();
      ctx.arc(cx - T * 0.18, cy - TY * 0.08, T * 0.28, 0, Math.PI * 2);
      ctx.fill();
      // Right mid lobe
      ctx.fillStyle = '#175020';
      ctx.beginPath();
      ctx.arc(cx + T * 0.2, cy - TY * 0.04, T * 0.26, 0, Math.PI * 2);
      ctx.fill();
      // Centre top lobe (brightest)
      ctx.fillStyle = '#1C5E24';
      ctx.beginPath();
      ctx.arc(cx, cy - TY * 0.18, T * 0.24, 0, Math.PI * 2);
      ctx.fill();
      // Highlight blobs on top
      ctx.fillStyle = 'rgba(80,180,80,0.22)';
      ctx.beginPath();
      ctx.arc(cx - T * 0.08, cy - TY * 0.24, T * 0.10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(60,160,60,0.18)';
      ctx.beginPath();
      ctx.arc(cx + T * 0.10, cy - TY * 0.18, T * 0.08, 0, Math.PI * 2);
      ctx.fill();
      // Subtle leaf sparkle animation
      const bSparkle = Math.sin(frame * 0.04 + tx * 3.1 + ty * 7.3) * 0.15 + 0.18;
      ctx.fillStyle = `rgba(200,240,100,${bSparkle})`;
      ctx.beginPath();
      ctx.arc(cx - T * 0.07, cy - TY * 0.26, T * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 6: { // Water - animated blue surface with ripples and specular
      // Darker water base
      ctx.fillStyle = '#1E5570';
      ctx.fillRect(s.x, s.y, T + 1, TY + 1);
      // Mid-tone fill
      ctx.fillStyle = '#2A6888';
      ctx.fillRect(s.x + 1, s.y + 1, T - 2, TY - 2);
      // Slightly darker edges (depth)
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(s.x, s.y + TY - 3, T + 1, 3);
      ctx.fillRect(s.x + T - 2, s.y, 2, TY + 1);
      // Animated wave ripple lines
      const wavePhase = frame * 0.04 + tx * 1.2 + ty * 0.8;
      ctx.lineWidth = 1;
      for (let wi = 0; wi < 3; wi++) {
        const wy2 = s.y + (TY * (wi + 1)) / 4;
        const waveShift = Math.sin(wavePhase + wi * 2.1) * (T * 0.06);
        const alpha = 0.15 + Math.sin(wavePhase + wi * 1.3) * 0.05;
        ctx.strokeStyle = `rgba(120,200,255,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(s.x + 2, wy2);
        ctx.quadraticCurveTo(cx + waveShift, wy2 - TY * 0.08, s.x + T - 2, wy2);
        ctx.stroke();
      }
      // Moving specular highlight
      const specX = cx + Math.sin(wavePhase * 0.7) * (T * 0.1);
      const specY = cy + Math.cos(wavePhase * 0.5) * (TY * 0.12);
      ctx.fillStyle = 'rgba(180,230,255,0.22)';
      ctx.beginPath();
      ctx.ellipse(specX, specY, T * 0.1, TY * 0.07, wavePhase * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Secondary small specular
      const spec2X = cx + Math.cos(wavePhase * 0.6 + 1.5) * (T * 0.12);
      const spec2Y = cy + Math.sin(wavePhase * 0.4 + 2.0) * (TY * 0.1);
      ctx.fillStyle = 'rgba(200,240,255,0.14)';
      ctx.beginPath();
      ctx.ellipse(spec2X, spec2Y, T * 0.06, TY * 0.04, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 7: { // Flower - grass base already drawn, add 2-3 flower clusters with animation
      const windSway = Math.sin(frame * 0.03 + tx * 5.1 + ty * 3.3) * (T * 0.04);
      const windSway2 = Math.sin(frame * 0.025 + tx * 4.3 + ty * 6.1 + 1.2) * (T * 0.035);
      // Cluster positions (seeded per tile)
      const fh1 = (tx * 37 + ty * 61) % 7;
      const fh2 = (tx * 53 + ty * 29) % 5;
      const clusters = [
        { bx: s.x + T * (0.22 + fh1 * 0.03), by: s.y + TY * (0.28 + fh2 * 0.04), sway: windSway, colorIdx: (tx * 3 + ty * 7) % COLORS.flower.length },
        { bx: s.x + T * (0.60 + fh2 * 0.02), by: s.y + TY * (0.20 + fh1 * 0.05), sway: windSway2, colorIdx: (tx * 7 + ty * 11 + 2) % COLORS.flower.length },
        { bx: s.x + T * (0.40 + fh1 * 0.02), by: s.y + TY * (0.55 + fh2 * 0.03), sway: windSway * 0.7, colorIdx: (tx * 11 + ty * 5 + 4) % COLORS.flower.length },
      ];
      // Draw only 2 clusters on even tiles, 3 on odd (performance + variety)
      const clusterCount = ((tx + ty) % 3 === 0) ? 3 : 2;
      for (let ci = 0; ci < clusterCount; ci++) {
        const cl = clusters[ci];
        const fcx = cl.bx + cl.sway;
        const fcy = cl.by;
        // Stem
        ctx.strokeStyle = '#2D6A30';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(cl.bx, cl.by + TY * 0.1);
        ctx.quadraticCurveTo(cl.bx + cl.sway * 0.5, cl.by + TY * 0.02, fcx, fcy - TY * 0.06);
        ctx.stroke();
        // Petals (5 per flower)
        const fc = COLORS.flower[cl.colorIdx];
        const flr = T * 0.075;
        for (let pi = 0; pi < 5; pi++) {
          const pa = (pi / 5) * Math.PI * 2 + frame * 0.004;
          ctx.fillStyle = fc;
          ctx.beginPath();
          ctx.arc(fcx + Math.cos(pa) * flr, fcy - TY * 0.06 + Math.sin(pa) * flr, flr * 0.7, 0, Math.PI * 2);
          ctx.fill();
        }
        // Yellow center
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(fcx, fcy - TY * 0.06, flr * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 8: { // Carpet/Stage - warm wooden plank floor with horizontal planks
      // Plank base
      ctx.fillStyle = '#5C3518';
      ctx.fillRect(s.x, s.y, T + 1, TY + 1);
      // Alternating plank bands
      const plankCount = 4;
      const plankH = TY / plankCount;
      for (let pi = 0; pi < plankCount; pi++) {
        const py = s.y + pi * plankH;
        // Alternate shade slightly
        const shade = pi % 2 === 0 ? '#6B4226' : '#7A5030';
        ctx.fillStyle = shade;
        ctx.fillRect(s.x + 1, py + 1, T - 2, plankH - 1);
        // Plank top edge highlight
        ctx.fillStyle = 'rgba(255,200,120,0.12)';
        ctx.fillRect(s.x + 2, py + 1, T - 4, 1);
        // Plank bottom shadow
        ctx.fillStyle = 'rgba(0,0,0,0.14)';
        ctx.fillRect(s.x + 2, py + plankH - 2, T - 4, 2);
        // Subtle wood grain (short horizontal stroke, seeded)
        const grainX = s.x + 4 + ((tx * 13 + ty * 7 + pi * 17) % (T - 16));
        ctx.strokeStyle = 'rgba(60,25,5,0.18)';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(grainX, py + plankH * 0.4);
        ctx.lineTo(grainX + (T * 0.25), py + plankH * 0.4);
        ctx.stroke();
      }
      // Overall edge highlight (top + left)
      ctx.strokeStyle = 'rgba(255,210,130,0.12)';
      ctx.lineWidth = 1;
      ctx.strokeRect(s.x + 0.5, s.y + 0.5, T, TY);
      // Occasional wood knot
      if ((tx * 7 + ty * 13) % 11 < 2) {
        const kx = s.x + T * 0.3 + ((tx * 3) % 5) * (T * 0.08);
        const ky = s.y + TY * 0.3 + ((ty * 7) % 5) * (TY * 0.1);
        ctx.fillStyle = '#4A2810';
        ctx.beginPath();
        ctx.ellipse(kx, ky, T * 0.05, TY * 0.06, 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 9: { // Haystack - golden-yellow hay bale, chunky oval with straw texture
      // Ground shadow
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(cx + 2, cy + TY * 0.38, T * 0.44, TY * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      // Main hay body — golden oval
      ctx.fillStyle = '#D4A017';
      ctx.beginPath();
      ctx.ellipse(cx, cy - TY * 0.08, T * 0.42, TY * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
      // Lighter highlight on top
      ctx.fillStyle = '#F0C040';
      ctx.beginPath();
      ctx.ellipse(cx - T * 0.06, cy - TY * 0.18, T * 0.28, TY * 0.18, -0.2, 0, Math.PI * 2);
      ctx.fill();
      // Straw texture lines (horizontal, slightly wavy)
      ctx.strokeStyle = '#8B6010';
      ctx.lineWidth = 0.9;
      for (let si = 0; si < 5; si++) {
        const lx = s.x + T * 0.14 + si * T * 0.14;
        ctx.beginPath();
        ctx.moveTo(lx, cy - TY * 0.32);
        ctx.lineTo(lx + T * 0.06, cy + TY * 0.22);
        ctx.stroke();
      }
      // Bale wrap band (darker horizontal stripe)
      ctx.strokeStyle = '#A07820';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy - TY * 0.08, T * 0.42, TY * 0.12, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Top tuft of straw wisps
      ctx.strokeStyle = '#E8C030';
      ctx.lineWidth = 0.8;
      for (let wi = -2; wi <= 2; wi++) {
        ctx.beginPath();
        ctx.moveTo(cx + wi * T * 0.09, cy - TY * 0.42);
        ctx.lineTo(cx + wi * T * 0.12, cy - TY * 0.55);
        ctx.stroke();
      }
      break;
    }
  }
}

function drawMap() {
  const screenTileW = CFG.TILE * VIEW_ZOOM;
  const screenTileH = CFG.TILE * VIEW_ZOOM * VIEW_ANGLE_Y;
  const startTX = Math.max(0, Math.floor(camera.x / screenTileW) - 1);
  const startTY = Math.max(0, Math.floor(camera.y / screenTileH) - 1);
  const endTX = Math.min(CFG.MAP_W, startTX + Math.ceil(CFG.W / screenTileW) + 3);
  const endTY = Math.min(CFG.MAP_H, startTY + Math.ceil(CFG.H / screenTileH) + 3);
  for (let ty = startTY; ty < endTY; ty++) {
    for (let tx = startTX; tx < endTX; tx++) {
      drawTile(tx, ty);
    }
  }

  // === MOON in the sky (visible when player is in zone 3, near top) ===
  const moonWorldY = -2 * CFG.TILE; // just above the map
  const moonS = worldToScreen(35 * CFG.TILE, moonWorldY);
  if (moonS.y > -80 && moonS.y < CFG.H * 0.4) {
    // Moon glow
    if (isMobileDevice) {
      ctx.fillStyle = 'rgba(200,210,255,0.06)';
      ctx.beginPath();
      ctx.arc(moonS.x, moonS.y, 50, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const moonGlow = ctx.createRadialGradient(moonS.x, moonS.y, 0, moonS.x, moonS.y, 80);
      moonGlow.addColorStop(0, 'rgba(200,210,255,0.12)');
      moonGlow.addColorStop(0.5, 'rgba(150,170,220,0.04)');
      moonGlow.addColorStop(1, 'rgba(100,120,180,0)');
      ctx.fillStyle = moonGlow;
      ctx.beginPath();
      ctx.arc(moonS.x, moonS.y, 80, 0, Math.PI * 2);
      ctx.fill();
    }
    // Moon disc
    ctx.fillStyle = '#E8E8F0';
    ctx.beginPath();
    ctx.arc(moonS.x, moonS.y, 18, 0, Math.PI * 2);
    ctx.fill();
    // Crescent shadow (crescent moon)
    ctx.fillStyle = '#1A1040';
    ctx.beginPath();
    ctx.arc(moonS.x + 7, moonS.y - 2, 15, 0, Math.PI * 2);
    ctx.fill();
    // Subtle crater details on lit part
    ctx.fillStyle = 'rgba(180,185,210,0.3)';
    ctx.beginPath(); ctx.arc(moonS.x - 6, moonS.y + 3, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonS.x - 3, moonS.y - 5, 2, 0, Math.PI * 2); ctx.fill();
  }

  // Draw zone labels on ground (subtle)
  const zoneLabelData = [
    { label: t('zoneLabel1'), row: 70, color: 'rgba(255,220,150,0.12)' },
    { label: t('zoneLabel2'), row: 45, color: 'rgba(255,200,120,0.14)' },
    { label: t('zoneLabel3'), row: 16, color: 'rgba(255,180,80,0.16)' },
  ];
  for (const zl of zoneLabelData) {
    const zs = worldToScreen(25 * CFG.TILE, zl.row * CFG.TILE);
    if (zs.y > -50 && zs.y < CFG.H + 50) {
      ctx.fillStyle = zl.color;
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(zl.label, zs.x, zs.y);
      ctx.textAlign = 'left';
    }
  }

  // Draw gate indicators
  for (const gate of gates) {
    if (!gate.open) {
      // Glowing barrier
      for (let x = 22; x <= 27; x++) {
        const gs = worldToScreen(x * CFG.TILE, gate.row * CFG.TILE);
        // Pulsing glow
        const pulse = 0.3 + Math.sin(frame * 0.06) * 0.15;
        ctx.fillStyle = `rgba(255,80,80,${pulse})`;
        ctx.fillRect(gs.x, gs.y, CFG.TILE, CFG.TILE);
        // Energy barrier lines
        ctx.strokeStyle = `rgba(255,150,100,${pulse * 1.2})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(gs.x, gs.y + CFG.TILE / 2 + Math.sin(frame * 0.08 + x) * 5);
        ctx.lineTo(gs.x + CFG.TILE, gs.y + CFG.TILE / 2 + Math.sin(frame * 0.08 + x + 1) * 5);
        ctx.stroke();
      }
      // Lock icon centered
      const lockS = worldToScreen(24.5 * CFG.TILE, gate.row * CFG.TILE);
      ctx.fillStyle = '#FFD700';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🔒', lockS.x, lockS.y + 26);
      // Energy requirement label
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = 'bold 11px sans-serif';
      if (gate === gates[1] && !hasCanOpener) {
        ctx.fillText(t('needKey'), lockS.x, lockS.y + 42);
      } else {
        ctx.fillText(t('needEnergy').replace('{n}', gate.energyNeeded), lockS.x, lockS.y + 42);
      }
      ctx.textAlign = 'left';
    } else {
      for (let x = 22; x <= 27; x++) {
        const gs = worldToScreen(x * CFG.TILE, gate.row * CFG.TILE);
        const sparkle = Math.sin(frame * 0.05 + x) * 0.1 + 0.15;
        ctx.fillStyle = `rgba(144,238,144,${sparkle})`;
        ctx.fillRect(gs.x, gs.y, CFG.TILE, CFG.TILE);
      }
    }
  }

  // String lights removed

  // Ambient objects (butterflies/leaves)
  for (const ao of ambientObjects) {
    ao.phase += 0.02;
    const awx = ao.x + Math.cos(ao.phase) * ao.radius;
    const awy = ao.y + Math.sin(ao.phase * 0.7) * ao.radius * 0.5;
    const as = worldToScreen(awx, awy);
    if (as.x < -20 || as.x > CFG.W + 20 || as.y < -20 || as.y > CFG.H + 20) continue;
    if (ao.type === 'firefly') {
      // Firefly glow - pulsing warm light
      const glowPulse = Math.sin(frame * 0.08 + ao.phase * 3) * 0.5 + 0.5;
      ctx.globalAlpha = glowPulse * 0.7;
      if (isMobileDevice) {
        ctx.fillStyle = ao.color;
        ctx.beginPath();
        ctx.arc(as.x, as.y, 6, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const ffGrad = ctx.createRadialGradient(as.x, as.y, 0, as.x, as.y, 10);
        ffGrad.addColorStop(0, ao.color);
        ffGrad.addColorStop(1, 'rgba(255,224,100,0)');
        ctx.fillStyle = ffGrad;
        ctx.beginPath();
        ctx.arc(as.x, as.y, 10, 0, Math.PI * 2);
        ctx.fill();
      }
      // Core
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(as.x, as.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Moth - small fluttering near lights
      const wingFlap = Math.sin(frame * 0.25 + ao.phase) * 4;
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#B0A090';
      ctx.beginPath();
      ctx.ellipse(as.x - 2, as.y, Math.abs(wingFlap), 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(as.x + 2, as.y, Math.abs(wingFlap), 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#705840';
      ctx.beginPath();
      ctx.ellipse(as.x, as.y, 0.8, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  // === EVENING DUSK OVERLAY ===
  // Global warm tint over the entire visible area for summer 8PM feel
  ctx.fillStyle = 'rgba(60,25,10,0.12)';
  ctx.fillRect(0, 0, CFG.W, CFG.H);
  if (isMobileDevice) {
    // Mobile: use cached overlay (no per-frame gradient creation)
    if (!drawMap._duskCache) {
      const oc = document.createElement('canvas');
      oc.width = CFG.W; oc.height = CFG.H;
      const ox = oc.getContext('2d');
      const dg = ox.createLinearGradient(0, 0, 0, CFG.H);
      dg.addColorStop(0, 'rgba(30,15,50,0.2)');
      dg.addColorStop(0.5, 'rgba(50,25,15,0.08)');
      dg.addColorStop(1, 'rgba(60,30,10,0.05)');
      ox.fillStyle = dg; ox.fillRect(0, 0, CFG.W, CFG.H);
      const vg = ox.createRadialGradient(CFG.W/2, CFG.H/2, CFG.W*0.3, CFG.W/2, CFG.H/2, CFG.W*0.7);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(10,5,20,0.25)');
      ox.fillStyle = vg; ox.fillRect(0, 0, CFG.W, CFG.H);
      drawMap._duskCache = oc;
    }
    ctx.drawImage(drawMap._duskCache, 0, 0);
  } else {
    // Desktop: full quality gradients
    // Purple-blue dusk tint at the top
    const duskGrad = ctx.createLinearGradient(0, 0, 0, CFG.H);
    duskGrad.addColorStop(0, 'rgba(30,15,50,0.2)');
    duskGrad.addColorStop(0.5, 'rgba(50,25,15,0.08)');
    duskGrad.addColorStop(1, 'rgba(60,30,10,0.05)');
    ctx.fillStyle = duskGrad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    // Subtle vignette for evening mood
    const vigGrad = ctx.createRadialGradient(CFG.W / 2, CFG.H / 2, CFG.W * 0.3, CFG.W / 2, CFG.H / 2, CFG.W * 0.7);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, 'rgba(10,5,20,0.25)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, CFG.W, CFG.H);
  }
}

// Breed-specific color palettes for procedural cat drawing
function getBreedPalette(breedId) {
  switch (breedId) {
    case 'black':
      return {
        body: '#2A2A2A', belly: '#3D3D3D', tail: '#1A1A1A',
        stripe: '#1E1E1E', head: '#2A2A2A', ear: '#2A2A2A',
        innerEar: '#4A3040', eyeIris: '#FFD700', eyeGlow: '#FFFF60',
        eyeGlowRGBA: '255,255,80', nose: '#555555',
        hasStripes: false, hasFaceMask: false, hasPointColor: false,
      };
    case 'white':
      return {
        body: '#F0EDE8', belly: '#FFFFFF', tail: '#E0DDD8',
        stripe: '#E5E0DA', head: '#F0EDE8', ear: '#F0EDE8',
        innerEar: '#FFB6C1', eyeIris: '#4488FF', eyeGlow: '#80B0FF',
        eyeGlowRGBA: '128,176,255', nose: '#FFB0B0',
        hasStripes: false, hasFaceMask: false, hasPointColor: false,
      };
    case 'siamese':
      return {
        body: '#F5E6D0', belly: '#FFF0E0', tail: '#5C3D2E',
        stripe: '#D4C4B0', head: '#F5E6D0', ear: '#6B4C3B',
        innerEar: '#C0A090', eyeIris: '#2090FF', eyeGlow: '#60B0FF',
        eyeGlowRGBA: '96,176,255', nose: '#8B6B5A',
        hasStripes: false, hasFaceMask: true, faceMask: '#6B4C3B',
        hasPointColor: true, pointColor: '#6B4C3B',
      };
    default: // orange
      return {
        body: '#F5A623', belly: '#FFD08A', tail: '#E8A040',
        stripe: '#D4880E', head: '#F5A623', ear: '#F5A623',
        innerEar: '#FFB6C1', eyeIris: '#40C040', eyeGlow: '#80FF80',
        eyeGlowRGBA: '100,255,100', nose: '#FF8A80',
        hasStripes: true, hasFaceMask: false, hasPointColor: false,
      };
  }
}

function drawPlayer() {
  // ── HIDING IN BOX ──────────────────────────────────────────────────────────
  if (player.hiding) {
    const s = worldToScreen(player.x, player.y);
    ctx.save();
    ctx.translate(s.x, s.y);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath();
    ctx.ellipse(2, 18, 18, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Box body
    ctx.fillStyle = '#C8976A';
    roundRect(ctx, -17, -15, 34, 30, 4);
    ctx.fill();
    // Darker side panel
    ctx.fillStyle = '#A87850';
    roundRect(ctx, -17, 8, 34, 7, { bl: 4, br: 4, tl: 0, tr: 0 });
    ctx.fill();
    // Box outline
    ctx.strokeStyle = '#8B6240';
    ctx.lineWidth = 1.5;
    roundRect(ctx, -17, -15, 34, 30, 4);
    ctx.stroke();
    // Centre crease
    ctx.strokeStyle = 'rgba(100,60,20,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(0, 15); ctx.stroke();
    // Top rim line
    ctx.beginPath(); ctx.moveTo(-17, -9); ctx.lineTo(17, -9); ctx.stroke();
    // Tape strip
    ctx.fillStyle = 'rgba(210,185,145,0.55)';
    ctx.fillRect(-8, -15, 16, 5);

    // Two flaps at the top (slightly open — cat squeezed in)
    ctx.fillStyle = '#B8875E';
    ctx.beginPath();
    ctx.moveTo(-17, -15); ctx.lineTo(-1, -15); ctx.lineTo(-1, -21); ctx.lineTo(-17, -19); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(17, -15); ctx.lineTo(1, -15); ctx.lineTo(1, -21); ctx.lineTo(17, -19); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#8B6240'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-17, -15); ctx.lineTo(-1, -15); ctx.lineTo(-1, -21); ctx.lineTo(-17, -19); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(17, -15); ctx.lineTo(1, -15); ctx.lineTo(1, -21); ctx.lineTo(17, -19); ctx.closePath(); ctx.stroke();

    // Eyes peeking over the top rim
    const blink = Math.sin(frame * 0.1) > 0.95;
    const pal0 = getBreedPalette(selectedBreed ? selectedBreed.id : 'orange');
    if (!blink) {
      // Glow
      const eyeGlowA = 0.45 + Math.sin(frame * 0.12) * 0.15;
      ctx.fillStyle = `rgba(${pal0.eyeGlowRGBA},${eyeGlowA})`;
      ctx.beginPath(); ctx.arc(-6, -18, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 6, -18, 5, 0, Math.PI * 2); ctx.fill();
      // White sclera
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-6, -18, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 6, -18, 3.5, 0, Math.PI * 2); ctx.fill();
      // Iris
      ctx.fillStyle = pal0.eyeIris;
      ctx.beginPath(); ctx.arc(-6, -18, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 6, -18, 2.2, 0, Math.PI * 2); ctx.fill();
      // Pupil
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-6, -18, 1.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 6, -18, 1.1, 0, Math.PI * 2); ctx.fill();
      // Eye shine
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath(); ctx.arc(-5.2, -18.6, 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc( 6.8, -18.6, 0.8, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(-9, -18); ctx.lineTo(-3, -18); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 3, -18); ctx.lineTo( 9, -18); ctx.stroke();
    }
    // "我不是猫" label
    ctx.fillStyle = '#6A3E1A';
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('我不是猫', 0, 0);

    ctx.restore();
    return;
  }

  const s = worldToScreen(player.x, player.y);
  ctx.save();
  ctx.translate(s.x, s.y);

  // ── INVULNERABILITY blink + cyan aura ──────────────────────────────────────
  const blinkHidden = player.invulnerable > 0 && Math.floor(frame / 4) % 2 === 0;
  if (blinkHidden) ctx.globalAlpha = 0.25;

  if (player.invulnerable > 0) {
    const auraAlpha = 0.12 + Math.sin(frame * 0.18) * 0.08;
    const auraR = 26 + Math.sin(frame * 0.12) * 4;
    if (isMobileDevice) {
      ctx.fillStyle = `rgba(0,210,255,${auraAlpha * 0.7})`;
      ctx.beginPath(); ctx.arc(0, 0, auraR, 0, Math.PI * 2); ctx.fill();
    } else {
      const ag = ctx.createRadialGradient(0, 0, 4, 0, 0, auraR);
      ag.addColorStop(0, `rgba(0,210,255,${auraAlpha})`);
      ag.addColorStop(1, 'rgba(0,210,255,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(0, 0, auraR, 0, Math.PI * 2); ctx.fill();
    }
  }

  // ── SHARED STATE ───────────────────────────────────────────────────────────
  const isInvisBox = activeBuffs.invis > 0;
  const pal = getBreedPalette(selectedBreed ? selectedBreed.id : 'orange');
  const fatScale = 1 + (player.fatLevel || 0) * 0.065;
  const isSneaking = player.sneaking;
  const isDashing  = player.dashing;

  // body bob from walking
  const walkBob  = player.speed > 0 ? Math.sin(frame * 0.22) * 1.4 : 0;
  const bellyOff = (player.bellyJiggle || 0) + walkBob * 0.5;

  // ── GROUND SHADOW ──────────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,20,0.22)';
  ctx.beginPath();
  ctx.ellipse(2, isInvisBox ? 13 : 10 + walkBob * 0.3,
    isInvisBox ? 20 : 14 * fatScale, isInvisBox ? 7 : 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // ══════════════════════════════════════════════════════════════════════════
  //  CARDBOARD BOX MODE (invisibility buff)
  // ══════════════════════════════════════════════════════════════════════════
  if (isInvisBox) {
    const boxW = 34, boxH = 30;
    const boxBob   = Math.sin(frame * 0.07) * 1.2;
    const boxShift = player.speed > 0 ? Math.sin(frame * 0.18) * 2 : 0;

    // Tail sticking out the back
    ctx.save();
    ctx.rotate(player.dir + Math.PI);
    const tailWag = Math.sin(frame * 0.11) * 7;
    ctx.strokeStyle = pal.tail; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(boxW * 0.45, 0);
    ctx.quadraticCurveTo(boxW * 0.72, -8 + tailWag, boxW * 0.92, -4 + tailWag * 1.3);
    ctx.stroke();
    ctx.strokeStyle = pal.body; ctx.lineWidth = 4.5;
    ctx.beginPath();
    ctx.moveTo(boxW * 0.82, -5 + tailWag * 1.15);
    ctx.lineTo(boxW * 0.94, -3 + tailWag * 1.4);
    ctx.stroke();
    ctx.restore();

    // Box body
    ctx.fillStyle = '#C8976A';
    roundRect(ctx, -boxW/2 + boxShift, -boxH/2 + boxBob, boxW, boxH, 4);
    ctx.fill();
    ctx.fillStyle = '#A87850';
    ctx.fillRect(-boxW/2 + boxShift, boxH/2 - 5 + boxBob, boxW, 5);
    ctx.strokeStyle = '#8B6240'; ctx.lineWidth = 1.5;
    roundRect(ctx, -boxW/2 + boxShift, -boxH/2 + boxBob, boxW, boxH, 4);
    ctx.stroke();
    // Creases
    ctx.strokeStyle = 'rgba(100,60,20,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(boxShift, -boxH/2 + boxBob); ctx.lineTo(boxShift, boxH/2 + boxBob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-boxW/2 + boxShift, -boxH/2 + 6 + boxBob); ctx.lineTo(boxW/2 + boxShift, -boxH/2 + 6 + boxBob); ctx.stroke();
    // Tape
    ctx.fillStyle = 'rgba(210,190,150,0.55)';
    ctx.fillRect(-8 + boxShift, -boxH/2 + boxBob, 16, 5);

    // Ears poking out
    const earTwitch = Math.sin(frame * 0.13) * 2;
    const ebx = Math.cos(player.dir) * 5 + boxShift;
    const eby = Math.sin(player.dir) * 5 - boxH/2 + 1 + boxBob;
    ctx.fillStyle = pal.ear;
    ctx.beginPath(); ctx.moveTo(ebx - 9, eby + 2); ctx.lineTo(ebx - 5, eby - 9 + earTwitch); ctx.lineTo(ebx - 1, eby + 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ebx + 1, eby + 2); ctx.lineTo(ebx + 5, eby - 9 - earTwitch); ctx.lineTo(ebx + 9, eby + 2); ctx.fill();
    ctx.fillStyle = pal.innerEar;
    ctx.beginPath(); ctx.moveTo(ebx - 7.5, eby + 1); ctx.lineTo(ebx - 5, eby - 5 + earTwitch); ctx.lineTo(ebx - 2.5, eby + 1); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ebx + 2.5, eby + 1); ctx.lineTo(ebx + 5, eby - 5 - earTwitch); ctx.lineTo(ebx + 7.5, eby + 1); ctx.fill();

    // Label
    ctx.save();
    ctx.fillStyle = '#5A3A1A'; ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('我不是猫', boxShift, -2 + boxBob);
    ctx.font = '6px sans-serif'; ctx.fillStyle = '#7A5A3A';
    ctx.fillText('脆弱物品：🐟', boxShift, 6 + boxBob);
    ctx.restore();

    // Eyes peeking from gap
    const peekX = Math.cos(player.dir) * (boxW * 0.38) + boxShift;
    const peekY = Math.sin(player.dir) * (boxH * 0.34) + boxBob;
    const pEyeA = 0.55 + Math.sin(frame * 0.11) * 0.2;
    ctx.fillStyle = `rgba(${pal.eyeGlowRGBA},${pEyeA})`;
    ctx.beginPath(); ctx.arc(peekX - 3.5, peekY, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(peekX + 3.5, peekY, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(peekX - 3.5, peekY, 0.9, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(peekX + 3.5, peekY, 0.9, 0, Math.PI * 2); ctx.fill();

    // Dust puffs when moving
    if (player.speed > 0) {
      ctx.fillStyle = 'rgba(180,155,115,0.22)';
      for (let di = 0; di < 3; di++) {
        const dx = Math.cos(player.dir + Math.PI) * (14 + di * 6) + Math.sin(frame * 0.32 + di) * 3;
        const dy = Math.sin(player.dir + Math.PI) * (14 + di * 6) + 10;
        ctx.beginPath(); ctx.arc(dx, dy, 3 - di * 0.7, 0, Math.PI * 2); ctx.fill();
      }
    }

  } else {
    // ══════════════════════════════════════════════════════════════════════════
    //  NORMAL CAT RENDERING
    // ══════════════════════════════════════════════════════════════════════════

    // ── Climbing position shift ────────────────────────────────────────────
    if (player.climbing) {
      ctx.translate(0, -20);
      // Tree branch shadow below cat
      ctx.fillStyle = 'rgba(60,120,30,0.22)';
      ctx.beginPath(); ctx.ellipse(0, 28, 12, 5, 0, 0, Math.PI * 2); ctx.fill();
    }

    // ── Vegetation concealment overlay ────────────────────────────────────
    const playerTile = getTile(player.x, player.y);
    if ((playerTile === 5 || playerTile === 7) && !player.climbing) {
      const ovColor = playerTile === 5 ? 'rgba(50,120,50,0.22)' : 'rgba(80,140,60,0.16)';
      ctx.fillStyle = ovColor;
      ctx.beginPath(); ctx.arc(0, 0, 21, 0, Math.PI * 2); ctx.fill();
      for (let li = 0; li < 6; li++) {
        const la = (li / 6) * Math.PI * 2 + frame * 0.009;
        const lx = Math.cos(la) * 17, ly = Math.sin(la) * 15;
        const lc = playerTile === 5
          ? `rgba(55,140,55,${0.28 + Math.sin(frame * 0.03 + li) * 0.1})`
          : `rgba(140,80,115,${0.22 + Math.sin(frame * 0.03 + li) * 0.1})`;
        ctx.fillStyle = lc;
        ctx.beginPath(); ctx.ellipse(lx, ly, 4, 7, la, 0, Math.PI * 2); ctx.fill();
      }
    } else if (playerTile === 4 && !player.climbing) {
      ctx.fillStyle = 'rgba(30,80,30,0.18)';
      ctx.beginPath(); ctx.arc(0, -4, 19, 0, Math.PI * 2); ctx.fill();
    }

    // ── Dash motion blur (speed lines) ────────────────────────────────────
    if (isDashing) {
      ctx.save();
      ctx.rotate(player.dir + Math.PI); // lines trail behind
      for (let i = 0; i < 5; i++) {
        const t = i / 4;
        const lx = (Math.random() - 0.5) * 18;
        const len = 8 + t * 14;
        ctx.strokeStyle = `rgba(135,200,240,${0.55 - t * 0.45})`;
        ctx.lineWidth = 2 - t * 1.2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(lx, 5 + t * 14);
        ctx.lineTo(lx + (Math.random() - 0.5) * 4, 5 + t * 14 + len);
        ctx.stroke();
      }
      ctx.restore();
      // Blue afterimage halo
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#87CEEB';
      ctx.beginPath(); ctx.arc(0, 0, 19, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = blinkHidden ? 0.25 : 1;
    }

    // ── Sneaking aura (green night-vision tint) ────────────────────────────
    if (isSneaking) {
      const snA = 0.12 + Math.sin(frame * 0.14) * 0.06;
      ctx.fillStyle = `rgba(0,220,80,${snA})`;
      ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
    }

    // ── Apply fat scale ────────────────────────────────────────────────────
    if (fatScale > 1) ctx.scale(fatScale, 1 + (player.fatLevel || 0) * 0.04);

    // ── TAIL ──────────────────────────────────────────────────────────────
    ctx.save();
    ctx.rotate(player.dir + Math.PI);
    const tailSway   = (player.tailAngle || 0) * 12 + Math.sin(frame * 0.09) * (player.speed > 0 ? 9 : 5);
    const tailSpeedW = isDashing ? 6 : isSneaking ? 3 : 4.5;
    // Tail base
    ctx.strokeStyle = pal.tail; ctx.lineWidth = tailSpeedW; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.quadraticCurveTo(20, tailSway * 0.6, 26, tailSway);
    ctx.stroke();
    // Tail mid segment — slightly lighter
    ctx.strokeStyle = pal.body; ctx.lineWidth = tailSpeedW - 1.5;
    ctx.beginPath();
    ctx.moveTo(22, tailSway * 0.8);
    ctx.quadraticCurveTo(27, tailSway * 1.1, 32, tailSway * 0.7 + Math.sin(frame * 0.14) * 4);
    ctx.stroke();
    // Fluffy tail tip
    ctx.fillStyle = pal.belly;
    ctx.beginPath();
    ctx.arc(32, tailSway * 0.7 + Math.sin(frame * 0.14) * 4, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // ── BODY ──────────────────────────────────────────────────────────────
    // Sneaking cats crouch — squash body slightly
    const bodyRx = isSneaking ? 16 : 14;
    const bodyRy = isSneaking ? 11 : 16;

    ctx.fillStyle = pal.body;
    ctx.beginPath();
    ctx.ellipse(0, bellyOff, bodyRx, bodyRy, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly / chest patch (lighter)
    ctx.fillStyle = pal.belly;
    ctx.beginPath();
    ctx.ellipse(0, 3 + bellyOff, bodyRx * 0.58, bodyRy * 0.62, 0, 0, Math.PI * 2);
    ctx.fill();

    // Breed markings on body
    if (pal.hasStripes) {
      // Orange tabby: diagonal tiger stripes
      ctx.strokeStyle = pal.stripe; ctx.lineWidth = 2; ctx.lineCap = 'round';
      const stripeData = [[-8, -14, -4, -6], [-3, -15, 1, -7], [3, -14, 5, -5],
                          [-10, -4, -7, 4],  [9, -3, 7, 5]];
      for (const [x1, y1, x2, y2] of stripeData) {
        ctx.beginPath(); ctx.moveTo(x1, y1 + bellyOff); ctx.lineTo(x2, y2 + bellyOff); ctx.stroke();
      }
    } else if (selectedBreed && selectedBreed.id === 'calico') {
      // Calico: irregular colour patches (seeded by a constant so they don't flicker)
      const patches = [
        { x: -7, y: -8 + bellyOff, rx: 5, ry: 4, col: '#E06030' },
        { x:  8, y: -5 + bellyOff, rx: 4, ry: 5, col: '#222' },
        { x:  2, y:  7 + bellyOff, rx: 6, ry: 3, col: '#E06030' },
        { x: -9, y:  4 + bellyOff, rx: 3, ry: 4, col: '#333' },
      ];
      for (const p of patches) {
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.ellipse(p.x, p.y, p.rx, p.ry, p.x * 0.3, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Tiny front paws — show at bottom of body
    const pawOff = bellyOff + bodyRy - 2;
    ctx.fillStyle = pal.body;
    ctx.beginPath(); ctx.ellipse(-7, pawOff, 5, 3.5, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 7, pawOff, 5, 3.5,  0.3, 0, Math.PI * 2); ctx.fill();
    // Paw toe lines
    ctx.strokeStyle = pal.tail; ctx.lineWidth = 0.8; ctx.lineCap = 'round';
    for (const [px, sign] of [[-7, -1], [7, 1]]) {
      for (let t = 0; t < 3; t++) {
        const tx = px + sign * (t - 1) * 1.8;
        ctx.beginPath(); ctx.moveTo(tx, pawOff + 1.5); ctx.lineTo(tx, pawOff + 3.5); ctx.stroke();
      }
    }
    // Point-coloured paws (siamese)
    if (pal.hasPointColor) {
      ctx.fillStyle = pal.pointColor;
      ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.ellipse(-7, pawOff, 5, 3.5, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 7, pawOff, 5, 3.5,  0.3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = blinkHidden ? 0.25 : 1;
    }

    // ── HEAD ──────────────────────────────────────────────────────────────
    // Head positioned in facing direction, slightly raised while sneaking
    const headDist = isSneaking ? 6 : 9;
    const headX = Math.cos(player.dir) * headDist;
    const headY = Math.sin(player.dir) * headDist + (isSneaking ? 2 : 0);
    const headR  = isSneaking ? 8.5 : 10;

    // Head fur
    ctx.fillStyle = pal.head;
    ctx.beginPath(); ctx.arc(headX, headY, headR, 0, Math.PI * 2); ctx.fill();

    // Siamese face mask
    if (pal.hasFaceMask) {
      ctx.fillStyle = pal.faceMask;
      ctx.beginPath(); ctx.ellipse(headX, headY + 1, headR * 0.72, headR * 0.62, 0, 0, Math.PI * 2); ctx.fill();
    }

    // Head tabby stripe (for orange)
    if (pal.hasStripes) {
      ctx.strokeStyle = pal.stripe; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      const hd = player.dir;
      for (const off of [-3, 0, 3]) {
        const perpX = Math.cos(hd + Math.PI/2) * off;
        const perpY = Math.sin(hd + Math.PI/2) * off;
        ctx.beginPath();
        ctx.moveTo(headX + perpX + Math.cos(hd) * -3, headY + perpY + Math.sin(hd) * -3);
        ctx.lineTo(headX + perpX + Math.cos(hd) * -7, headY + perpY + Math.sin(hd) * -7);
        ctx.stroke();
      }
    }

    // ── EARS ──────────────────────────────────────────────────────────────
    const earA1 = player.dir - 0.65;
    const earA2 = player.dir + 0.65;
    const earTwitchV = Math.sin(frame * 0.13) * 1.2;
    for (const [ea, side] of [[earA1, -1], [earA2, 1]]) {
      const ex = headX + Math.cos(ea) * (headR + 1);
      const ey = headY + Math.sin(ea) * (headR + 1);
      // Outer ear
      ctx.fillStyle = pal.ear;
      ctx.beginPath();
      ctx.moveTo(ex - 4, ey + 3);
      ctx.lineTo(ex + side * 1, ey - 9 + side * earTwitchV);
      ctx.lineTo(ex + 4, ey + 3);
      ctx.fill();
      // Inner ear (pink)
      ctx.fillStyle = pal.innerEar;
      ctx.beginPath();
      ctx.moveTo(ex - 2.5, ey + 2);
      ctx.lineTo(ex + side * 0.5, ey - 5.5 + side * earTwitchV);
      ctx.lineTo(ex + 2.5, ey + 2);
      ctx.fill();
    }

    // ── EYES ──────────────────────────────────────────────────────────────
    // Eye positions slightly forward on head
    const eyeForward = headR * 0.28;
    const eyeSpread  = headR * 0.38;
    const eyePerp = { x: Math.cos(player.dir + Math.PI/2), y: Math.sin(player.dir + Math.PI/2) };
    const eyeFwd  = { x: Math.cos(player.dir), y: Math.sin(player.dir) };
    const eyeL = {
      x: headX + eyeFwd.x * eyeForward - eyePerp.x * eyeSpread,
      y: headY + eyeFwd.y * eyeForward - eyePerp.y * eyeSpread,
    };
    const eyeR = {
      x: headX + eyeFwd.x * eyeForward + eyePerp.x * eyeSpread,
      y: headY + eyeFwd.y * eyeForward + eyePerp.y * eyeSpread,
    };

    const blink = Math.sin(frame * 0.08) > 0.97;
    // Sneaking: pupils dilate (wider eyes, green glow)
    const eyeIrisR  = isSneaking ? 3.0 : 2.2;
    const eyeWhiteR = isSneaking ? 4.2 : 3.2;
    const eyeIrisColor = isSneaking ? '#22EE66' : pal.eyeIris;
    const eyeGlowCol   = isSneaking ? '30,240,100' : pal.eyeGlowRGBA;

    if (!blink) {
      // Glow halo around eyes
      const glowR = isSneaking ? 9 : 7;
      const glowA = isSneaking ? 0.35 + Math.sin(frame * 0.15) * 0.15 : 0.18;
      if (isMobileDevice) {
