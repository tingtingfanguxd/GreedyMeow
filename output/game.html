        ctx.fillStyle = `rgba(${eyeGlowCol},${glowA})`;
        ctx.beginPath(); ctx.arc(eyeL.x, eyeL.y, glowR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(eyeR.x, eyeR.y, glowR, 0, Math.PI * 2); ctx.fill();
      } else {
        for (const e of [eyeL, eyeR]) {
          const eg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
          eg.addColorStop(0, `rgba(${eyeGlowCol},${glowA * 1.5})`);
          eg.addColorStop(1, `rgba(${eyeGlowCol},0)`);
          ctx.fillStyle = eg;
          ctx.beginPath(); ctx.arc(e.x, e.y, glowR, 0, Math.PI * 2); ctx.fill();
        }
      }
      // Sclera (white)
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath(); ctx.arc(eyeL.x, eyeL.y, eyeWhiteR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeR.x, eyeR.y, eyeWhiteR, 0, Math.PI * 2); ctx.fill();
      // Iris
      ctx.fillStyle = eyeIrisColor;
      ctx.beginPath(); ctx.arc(eyeL.x, eyeL.y, eyeIrisR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeR.x, eyeR.y, eyeIrisR, 0, Math.PI * 2); ctx.fill();
      // Pupil (vertical slit — narrower in normal, rounder when sneaking/dark)
      ctx.fillStyle = '#111';
      const pupW = isSneaking ? eyeIrisR * 0.7 : eyeIrisR * 0.45;
      const pupH = isSneaking ? eyeIrisR * 0.95 : eyeIrisR * 0.85;
      ctx.beginPath(); ctx.ellipse(eyeL.x, eyeL.y, pupW, pupH, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(eyeR.x, eyeR.y, pupW, pupH, 0, 0, Math.PI * 2); ctx.fill();
      // Eye shine
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(eyeL.x + 0.9, eyeL.y - 1.0, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeR.x + 0.9, eyeR.y - 1.0, 0.9, 0, Math.PI * 2); ctx.fill();
    } else {
      // Blink — curved closed-eye lines
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      for (const e of [eyeL, eyeR]) {
        ctx.beginPath();
        ctx.moveTo(e.x - eyeWhiteR, e.y);
        ctx.quadraticCurveTo(e.x, e.y + eyeWhiteR * 0.6, e.x + eyeWhiteR, e.y);
        ctx.stroke();
      }
    }

    // ── NOSE ──────────────────────────────────────────────────────────────
    // Small inverted-triangle nose centred between eyes, forward on face
    const noseX = headX + eyeFwd.x * (eyeForward + 2);
    const noseY = headY + eyeFwd.y * (eyeForward + 2);
    ctx.fillStyle = pal.nose;
    ctx.beginPath();
    ctx.moveTo(noseX, noseY - 1.8);
    ctx.lineTo(noseX - 2.2, noseY + 1.2);
    ctx.lineTo(noseX + 2.2, noseY + 1.2);
    ctx.closePath(); ctx.fill();

    // ── MOUTH ──────────────────────────────────────────────────────────────
    ctx.strokeStyle = 'rgba(60,30,20,0.7)'; ctx.lineWidth = 1; ctx.lineCap = 'round';
    if (player.eating || player.eatFlash > 0.3) {
      // Happy open mouth (arc smile)
      ctx.beginPath();
      ctx.arc(noseX, noseY + 2, 3.5, 0.15, Math.PI - 0.15);
      ctx.stroke();
      // Tongue tip
      ctx.fillStyle = '#FF8A8A';
      ctx.beginPath(); ctx.ellipse(noseX, noseY + 5, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
    } else {
      // Cute W-mouth (double curve from nose)
      ctx.beginPath();
      ctx.moveTo(noseX, noseY + 1.5);
      ctx.lineTo(noseX - 3, noseY + 3.5);
      ctx.moveTo(noseX, noseY + 1.5);
      ctx.lineTo(noseX + 3, noseY + 3.5);
      ctx.stroke();
    }

    // ── WHISKERS ──────────────────────────────────────────────────────────
    const wBaseX = noseX;
    const wBaseY = noseY + 0.5;
    ctx.lineCap = 'round';
    for (const side of [-1, 1]) {
      for (let wi = 0; wi < 3; wi++) {
        const wAngle = (wi - 1) * 0.28 * side;
        const wLen   = 13 + wi * 1.5;
        // Slight wave on whiskers when moving
        const wWave  = player.speed > 0 ? Math.sin(frame * 0.12 + wi) * 0.08 : 0;
        ctx.strokeStyle = selectedBreed && selectedBreed.id === 'black'
          ? 'rgba(180,180,180,0.7)' : 'rgba(80,60,50,0.6)';
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(wBaseX + side * 3, wBaseY);
        ctx.quadraticCurveTo(
          wBaseX + side * (wLen * 0.5),
          wBaseY + Math.tan(wAngle + wWave) * wLen * 0.5,
          wBaseX + side * (wLen + 3),
          wBaseY + Math.tan(wAngle + wWave) * wLen
        );
        ctx.stroke();
      }
    }

  } // end normal cat rendering

  // ── SHIELD BUFF ────────────────────────────────────────────────────────────
  if (activeBuffs.shield) {
    const shT = frame * 0.04;
    ctx.strokeStyle = `rgba(255,215,0,${0.45 + Math.sin(shT) * 0.12})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, 0, 23, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = `rgba(255,215,0,${0.15 + Math.sin(shT) * 0.08})`;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI * 2); ctx.stroke();
  }

  // ── SPEED BUFF LINES ───────────────────────────────────────────────────────
  if (activeBuffs.speed > 0) {
    ctx.strokeStyle = isInvisBox ? 'rgba(0,255,220,0.12)' : 'rgba(0,240,220,0.28)';
    ctx.lineWidth = 1.8; ctx.lineCap = 'round';
    for (let i = 0; i < 4; i++) {
      const offset = (frame * 4 + i * 7) % 28 - 14;
      ctx.globalAlpha = isInvisBox ? 0.08 : 0.18;
      ctx.beginPath();
      ctx.moveTo(-14, offset);
      ctx.lineTo(-9, offset - 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, offset);
      ctx.lineTo(9, offset - 6);
      ctx.stroke();
    }
    ctx.globalAlpha = blinkHidden ? 0.25 : 1;
  }

  // ── EATING PROGRESS RING ───────────────────────────────────────────────────
  if (player.eating) {
    const progress = 1 - (player.eatTimer / 60);
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3; ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.arc(0, -22, 13, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
    ctx.stroke();
  }

  // ── EAT FLASH ─────────────────────────────────────────────────────────────
  if (player.eatFlash > 0.1) {
    ctx.globalAlpha = player.eatFlash * 0.38;
    ctx.fillStyle = '#FFE040';
    ctx.beginPath(); ctx.arc(0, 0, 23, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = blinkHidden ? 0.25 : 1;
  }

  // ── CARRYING FISH INDICATOR ────────────────────────────────────────────────
  if (player.carryingFish) {
    const fishBob = Math.sin(frame * 0.13) * 3;
    const fishWag = Math.sin(frame * 0.09) * 0.22;
    ctx.save();
    ctx.translate(-4, -24 + fishBob);
    ctx.rotate(fishWag);
    // Glow
    ctx.fillStyle = 'rgba(255,215,0,0.18)';
    ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
    // Fish body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 5.5, 0, 0, Math.PI * 2); ctx.fill();
    // Fish gradient highlight
    ctx.fillStyle = '#FFF0A0';
    ctx.beginPath(); ctx.ellipse(-2, -1.5, 5, 2.5, -0.3, 0, Math.PI * 2); ctx.fill();
    // Tail fin
    ctx.fillStyle = '#FFA800';
    ctx.beginPath(); ctx.moveTo(9, 0); ctx.lineTo(15, -5); ctx.lineTo(15, 5); ctx.closePath(); ctx.fill();
    // Eye
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(-5, -1, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-4.4, -1.5, 0.6, 0, Math.PI * 2); ctx.fill();
    // Scale lines
    ctx.strokeStyle = 'rgba(180,130,0,0.35)'; ctx.lineWidth = 0.8; ctx.lineCap = 'round';
    for (const sx of [-2, 2, 6]) {
      ctx.beginPath(); ctx.arc(sx, 0, 3, 0.3, Math.PI - 0.3); ctx.stroke();
    }
    ctx.restore();
  }

  if (player.climbing) ctx.translate(0, 20);
  ctx.restore();
}


function drawEnemy(e) {
  const s = worldToScreen(e.x, e.y);
  if (s.x < -60 || s.x > CFG.W + 60 || s.y < -60 || s.y > CFG.H + 60) return;

  ctx.save();
  ctx.translate(s.x, s.y);

  // --- STATE TINT HELPER ---
  // Returns an overlay color string based on state
  function stateTint() {
    if (e.state === 'chase') return 'rgba(255,60,60,0.22)';
    if (e.state === 'alert') return 'rgba(255,210,30,0.18)';
    return null;
  }

  // --- AMBIENT GLOW around enemy ---
  if (e.catnipTimer <= 0) {
    const lanternR = (e.type === 'dog' || e.type === 'smalldog') ? 35 : e.type === 'bigdog' ? 52 : e.type === 'drone' ? 32 : 46;
    const lanternColor = e.state === 'chase' ? '255,80,40' : e.type === 'drone' ? '0,190,255' : '255,195,110';
    if (isMobileDevice) {
      ctx.fillStyle = `rgba(${lanternColor},0.07)`;
      ctx.beginPath(); ctx.arc(0, 0, lanternR, 0, Math.PI * 2); ctx.fill();
    } else {
      const lg = ctx.createRadialGradient(0, 0, 0, 0, 0, lanternR);
      lg.addColorStop(0, `rgba(${lanternColor},0.18)`);
      lg.addColorStop(0.6, `rgba(${lanternColor},0.06)`);
      lg.addColorStop(1, `rgba(${lanternColor},0)`);
      ctx.fillStyle = lg;
      ctx.beginPath(); ctx.arc(0, 0, lanternR, 0, Math.PI * 2); ctx.fill();
    }
  }

  // --- VISION CONE ---
  if (e.catnipTimer <= 0) {
    ctx.save();
    ctx.rotate(e.dir);
    const coneAlpha = e.state === 'chase' ? 0.32 : e.state === 'alert' ? 0.24 : 0.15;
    const coneRGB = e.state === 'chase' ? '255,50,30' : e.state === 'alert' ? '255,200,40' : (e.type === 'drone' ? '60,200,255' : '255,220,140');
    if (isMobileDevice) {
      ctx.fillStyle = `rgba(${coneRGB},${coneAlpha * 0.6})`;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, e.visionRange, -e.visionAngle / 2, e.visionAngle / 2);
      ctx.closePath();
      ctx.fill();
    } else {
      const cg = ctx.createRadialGradient(0, 0, 2, 0, 0, e.visionRange);
      cg.addColorStop(0, `rgba(${coneRGB},${coneAlpha * 1.3})`);
      cg.addColorStop(0.65, `rgba(${coneRGB},${coneAlpha * 0.55})`);
      cg.addColorStop(1, `rgba(${coneRGB},0)`);
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, e.visionRange, -e.visionAngle / 2, e.visionAngle / 2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.strokeStyle = `rgba(${coneRGB},${coneAlpha * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, e.visionRange, -e.visionAngle / 2, e.visionAngle / 2);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // --- GROUND SHADOW ---
  const isHuman = ['chef','grandma','waiter','guard','doglady'].includes(e.type);
  if (e.type === 'drone') {
    ctx.fillStyle = 'rgba(0,0,20,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, 22, 11, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(0,0,20,0.20)';
    ctx.beginPath();
    ctx.ellipse(0, 8, e.type === 'bigdog' ? 19 : (isHuman ? 15 : 12), e.type === 'bigdog' ? 8 : (isHuman ? 6 : 5), 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // =====================================================================
  // ENEMY TYPE DRAWING
  // =====================================================================

  if (e.type === 'dog' || e.type === 'smalldog') {
    // -------- SMALL DOG (brown, pointy ears, wags) --------
    const moving = e.state !== 'idle';
    const spd = e.state === 'chase' ? 10 : 5;
    const ph = e.animFrame * spd;
    const bob = moving ? Math.sin(ph * 2) * 1.5 : 0;
    const dir = e.dir;
    const dfx = Math.cos(dir), dfy = Math.sin(dir);
    const drx = -Math.sin(dir), dry = Math.cos(dir);
    // Tail wag
    const tailWag = e.state === 'chase' ? Math.sin(ph * 1.5) * 4 : Math.sin(frame * 0.15) * 9;
    ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-dfx * 13, -dfy * 13 + bob);
    ctx.quadraticCurveTo(-dfx * 18 + drx * tailWag, -dfy * 18 + dry * tailWag + bob, -dfx * 16 + drx * tailWag * 1.6, -dfy * 16 + dry * tailWag * 1.6 + bob);
    ctx.stroke();
    // Back legs
    if (moving) {
      ctx.fillStyle = '#4E342E';
      for (const s of [-1, 1]) {
        const stride = Math.sin(ph + s * 1.5) * 5;
        ctx.beginPath();
        ctx.arc(-dfx * 8 + drx * s * 6 + dfx * stride, -dfy * 8 + dry * s * 6 + dfy * stride + bob + 4, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Body
    ctx.fillStyle = e.state === 'chase' ? '#7B3B2B' : '#6D4C41';
    ctx.beginPath(); ctx.ellipse(0, bob, 9, 13, dir * 0.08, 0, Math.PI * 2); ctx.fill();
    // Saddle
    ctx.fillStyle = '#3E2723';
    ctx.beginPath(); ctx.ellipse(-dfx * 2, -dfy * 2 + bob, 7, 8, dir * 0.08, Math.PI, Math.PI * 2); ctx.fill();
    // Front legs
    if (moving) {
      ctx.fillStyle = '#6D4C41';
      for (const s of [-1, 1]) {
        const stride = Math.sin(ph + Math.PI + s * 1.5) * 5;
        ctx.beginPath();
        ctx.arc(dfx * 8 + drx * s * 5 + dfx * stride, dfy * 8 + dry * s * 5 + dfy * stride + bob + 4, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Head
    const dhBob = moving ? Math.sin(ph * 2 + 0.5) * 1 : 0;
    const dhx = dfx * 11, dhy = dfy * 11 + dhBob + bob;
    ctx.fillStyle = '#7D5C4D';
    ctx.beginPath(); ctx.ellipse(dhx, dhy, 8, 6.5, dir, 0, Math.PI * 2); ctx.fill();
    // Snout
    ctx.fillStyle = '#A1887F';
    ctx.beginPath(); ctx.ellipse(dhx + dfx * 6, dhy + dfy * 5, 5, 3.5, dir, 0, Math.PI * 2); ctx.fill();
    // Pointy ears
    ctx.fillStyle = '#3E2723';
    for (const s of [-1, 1]) {
      const ea = dir + s * 0.75;
      const eex = dhx + Math.cos(ea) * 7, eey = dhy + Math.sin(ea) * 6 - 4;
      ctx.beginPath(); ctx.moveTo(eex - 3, eey + 3); ctx.lineTo(eex, eey - 7); ctx.lineTo(eex + 3, eey + 3); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#FF8A80';
      ctx.beginPath(); ctx.moveTo(eex - 1.5, eey + 1); ctx.lineTo(eex, eey - 4); ctx.lineTo(eex + 1.5, eey + 1); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#3E2723';
    }
    // Eyes
    const deyeC = e.state === 'chase' ? '#FF3300' : '#FFB300';
    const dpe = drx * 3, dpey = dry * 3;
    ctx.fillStyle = deyeC;
    ctx.beginPath(); ctx.arc(dhx + dpe, dhy - 2 + dpey, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(dhx - dpe, dhy - 2 - dpey, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(dhx + dpe, dhy - 2 + dpey, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(dhx - dpe, dhy - 2 - dpey, 1.2, 0, Math.PI * 2); ctx.fill();
    // Nose
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(dhx + dfx * 11, dhy + dfy * 10, 2.2, 0, Math.PI * 2); ctx.fill();
    // Tongue when chasing
    if (e.state === 'chase') {
      ctx.fillStyle = '#FF6B6B';
      ctx.beginPath(); ctx.ellipse(dhx + dfx * 13, dhy + dfy * 12 + 2, 1.8, 3.5, dir, 0, Math.PI * 2); ctx.fill();
    }
    // Police collar strip
    ctx.strokeStyle = '#1565C0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, bob, 8, dir - 0.6, dir + 0.6); ctx.stroke();

  } else if (e.type === 'bigdog') {
    // -------- BIG DOG (golden retriever, floppy ears, larger) --------
    const bdMoving = e.state !== 'idle';
    const bdSpd = e.state === 'chase' ? 7 : 3;
    const bdPh = e.animFrame * bdSpd;
    const bdBob = bdMoving ? Math.sin(bdPh * 2) * 2 : 0;
    const bdDir = e.dir;
    const bdfx = Math.cos(bdDir), bdfy = Math.sin(bdDir);
    const bdrx = -Math.sin(bdDir), bdry = Math.cos(bdDir);
    // Big fluffy tail
    const bdTailWag = bdMoving ? Math.sin(bdPh * 0.8) * 11 : Math.sin(frame * 0.08) * 6;
    ctx.strokeStyle = '#C8922A'; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-bdfx * 19, -bdfy * 19 + bdBob);
    ctx.quadraticCurveTo(-bdfx * 27 + bdrx * bdTailWag, -bdfy * 27 + bdry * bdTailWag + bdBob, -bdfx * 24 + bdrx * bdTailWag * 1.5, -bdfy * 24 + bdry * bdTailWag * 1.5 + bdBob);
    ctx.stroke();
    // Back legs
    if (bdMoving) {
      ctx.fillStyle = '#B8862D';
      for (const s of [-1, 1]) {
        const stride = Math.sin(bdPh + s * 1.5) * 7;
        ctx.beginPath();
        ctx.ellipse(-bdfx * 10 + bdrx * s * 9 + bdfx * stride, -bdfy * 10 + bdry * s * 9 + bdfy * stride + bdBob + 5, 4.5, 6, bdDir, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Body (golden, large)
    ctx.fillStyle = '#D4A030';
    ctx.beginPath(); ctx.ellipse(0, bdBob, 18, 22, bdDir * 0.04, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#E8C84A';
    ctx.beginPath(); ctx.ellipse(bdfx * 3, bdfy * 3 + bdBob, 11, 14, bdDir * 0.04, 0, Math.PI * 2); ctx.fill();
    // Front legs
    if (bdMoving) {
      ctx.fillStyle = '#D4A030';
      for (const s of [-1, 1]) {
        const stride = Math.sin(bdPh + Math.PI + s * 1.5) * 8;
        ctx.beginPath();
        ctx.ellipse(bdfx * 12 + bdrx * s * 8 + bdfx * stride, bdfy * 12 + bdry * s * 8 + bdfy * stride + bdBob + 5, 4, 6, bdDir, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Head
    const bdHBob = bdMoving ? Math.sin(bdPh * 2 + 0.5) * 1.5 : 0;
    const bdhx = bdfx * 18, bdhy = bdfy * 18 + bdHBob + bdBob;
    ctx.fillStyle = '#D4A030';
    ctx.beginPath(); ctx.ellipse(bdhx, bdhy - 2, 12, 9.5, bdDir, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#E8C84A';
    ctx.beginPath(); ctx.ellipse(bdhx + bdfx * 5, bdhy + bdfy * 4, 8, 6, bdDir, 0, Math.PI * 2); ctx.fill();
    // Floppy ears
    const bdEarFlap = bdMoving ? Math.sin(bdPh * 1.2) * 3 : 0;
    ctx.fillStyle = '#C08820';
    for (const s of [-1, 1]) {
      const ea = bdDir + s * 0.7;
      const bex = bdhx + Math.cos(ea) * 10, bey = bdhy + Math.sin(ea) * 9 - 2 + bdEarFlap * s;
      ctx.beginPath(); ctx.ellipse(bex, bey + 4, 5, 9, ea + s * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFCC88';
      ctx.beginPath(); ctx.ellipse(bex, bey + 5, 3, 5, ea + s * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#C08820';
    }
    // Snout
    ctx.fillStyle = '#E8C84A';
    ctx.beginPath(); ctx.ellipse(bdhx + bdfx * 10, bdhy + bdfy * 9, 7, 4.5, bdDir, 0, Math.PI * 2); ctx.fill();
    // Eyes
    const bdeC = e.state === 'chase' ? '#CC1100' : '#7B4A00';
    const bdpe = bdrx * 5, bdpey = bdry * 5;
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(bdhx + bdpe, bdhy - 3 + bdpey, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bdhx - bdpe, bdhy - 3 - bdpey, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = bdeC;
    ctx.beginPath(); ctx.arc(bdhx + bdpe, bdhy - 3 + bdpey, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bdhx - bdpe, bdhy - 3 - bdpey, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(bdhx + bdpe, bdhy - 3 + bdpey, 1.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(bdhx - bdpe, bdhy - 3 - bdpey, 1.1, 0, Math.PI * 2); ctx.fill();
    // Nose
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(bdhx + bdfx * 16, bdhy + bdfy * 15, 3.5, 0, Math.PI * 2); ctx.fill();
    // Tongue/panting
    if (e.state === 'chase' || e.state === 'patrol') {
      ctx.fillStyle = '#FF6B8B';
      ctx.beginPath(); ctx.ellipse(bdhx + bdfx * 18, bdhy + bdfy * 17 + 2, 3, 6, bdDir + Math.sin(bdPh) * 0.2, 0, Math.PI * 2); ctx.fill();
    }
    // Red collar + gold tag
    ctx.strokeStyle = '#8B0000'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, bdBob, 14, bdDir - 0.5, bdDir + 0.5); ctx.stroke();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(bdfx * 14, bdfy * 14 + bdBob, 3, 0, Math.PI * 2); ctx.fill();
    // Alert radius pulse
    if ((e.state === 'patrol' || e.state === 'alert') && e.alertRadius) {
      ctx.globalAlpha = 0.04 + Math.sin(frame * 0.05) * 0.02;
      ctx.strokeStyle = '#FF8800'; ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.beginPath(); ctx.arc(0, 0, e.alertRadius / VIEW_ZOOM, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha = 1;
    }

  } else if (e.type === 'waiter') {
    // -------- WAITER: slim, black vest, white shirt, tray --------
    const wMoving = e.state !== 'idle';
    const wSpd = e.state === 'chase' ? 12 : e.state === 'alert' ? 6 : 4;
    const wPh = e.animFrame * wSpd;
    const wBob = wMoving ? Math.sin(wPh * 2) * 1.5 : 0;
    const wDir = e.dir;
    const wfx = Math.cos(wDir), wfy = Math.sin(wDir);
    const wrx = Math.cos(wDir + Math.PI / 2), wry = Math.sin(wDir + Math.PI / 2);

    ctx.save(); ctx.scale(1.25, 1.25);
    // Legs
    if (wMoving) {
      ctx.fillStyle = '#111';
      for (const s of [-1, 1]) {
        const stride = Math.sin(wPh + s) * (e.state === 'chase' ? 9 : 6);
        ctx.beginPath(); ctx.ellipse(wrx * s * 4 + wfx * stride, wry * s * 4 + wfy * stride + 10, 2.5, 4, wDir * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.ellipse(wrx * s * 4 + wfx * (stride + 3), wry * s * 4 + wfy * (stride + 3) + 11, 2.5, 1.5, wDir, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
      }
    }
    // Left arm
    const wArmSw = wMoving ? Math.sin(wPh) * 0.4 : Math.sin(frame * 0.04) * 0.06;
    ctx.strokeStyle = '#FFDAB9'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(wrx * -7, wry * -7 + wBob);
    ctx.lineTo(wrx * -11 + wfx * wArmSw * 10, wry * -11 + wfy * wArmSw * 10 + 6 + wBob);
    ctx.stroke();
    // Right arm (holds tray aloft)
    ctx.beginPath();
    ctx.moveTo(wrx * 7, wry * 7 + wBob);
    ctx.lineTo(wrx * 12 + wfx * 8, wry * 12 + wfy * 8 + 2 + wBob);
    ctx.stroke();
    // Tray
    const wTrayX = wrx * 12 + wfx * 8, wTrayY = wry * 12 + wfy * 8 + 2 + wBob;
    ctx.fillStyle = '#BDBDBD';
    ctx.beginPath(); ctx.ellipse(wTrayX, wTrayY - 2, 9, 3.5, wDir * 0.1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#E8E8E8';
    ctx.beginPath(); ctx.ellipse(wTrayX, wTrayY - 4.5, 5.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(180,220,255,0.7)';
    ctx.beginPath(); ctx.arc(wTrayX, wTrayY - 5.5, 2, 0, Math.PI * 2); ctx.fill();
    // Body: white shirt under black vest
    ctx.fillStyle = '#F5F5F5';
    ctx.beginPath(); ctx.ellipse(0, 2 + wBob, 7.5, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1A1A1A';
    ctx.beginPath(); ctx.ellipse(0, 2 + wBob, 7.5, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#F5F5F5';
    ctx.fillRect(-2.5, -7 + wBob, 5, 17);
    ctx.fillStyle = '#888';
    for (let bi = 0; bi < 3; bi++) { ctx.beginPath(); ctx.arc(0, -4 + bi * 5 + wBob, 0.9, 0, Math.PI * 2); ctx.fill(); }
    // Head
    const wHBob = wMoving ? Math.sin(wPh * 2 + 0.5) * 0.8 : 0;
    const whx = wfx * 6, why = wfy * 6 + wBob;
    ctx.fillStyle = '#FFDAB9';
    ctx.beginPath(); ctx.arc(whx, why - 8 + wHBob, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(whx - wfx * 2, why - 13 + wHBob, 7, 4, wDir * 0.1, Math.PI, Math.PI * 2); ctx.fill();
    const wEyeSh = wfx * 1.2;
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(whx - 3 + wEyeSh, why - 9 + wHBob, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(whx + 3 + wEyeSh, why - 9 + wHBob, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(whx - 5, why - 11 + wHBob); ctx.lineTo(whx - 1, why - 10.5 + wHBob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(whx + 5, why - 11 + wHBob); ctx.lineTo(whx + 1, why - 10.5 + wHBob); ctx.stroke();
    // Bow tie
    ctx.fillStyle = '#CC0000';
    ctx.beginPath(); ctx.moveTo(-3, -8 + wBob); ctx.lineTo(0, -6 + wBob); ctx.lineTo(-3, -4 + wBob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3, -8 + wBob); ctx.lineTo(0, -6 + wBob); ctx.lineTo(3, -4 + wBob); ctx.closePath(); ctx.fill();
    // Mouth
    if (e.state === 'chase') {
      ctx.fillStyle = '#600';
      ctx.beginPath(); ctx.ellipse(whx, why - 4 + wHBob, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = '#777'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(whx - 2, why - 5 + wHBob); ctx.lineTo(whx + 2, why - 5 + wHBob); ctx.stroke();
    }
    ctx.restore();

  } else if (e.type === 'drone') {
    // -------- DRONE: quadcopter, blinking LEDs, searchlight --------
    const drHover = Math.sin(frame * 0.08) * 3;
    const drRotSpd = frame * 0.5;
    if (e.catnipTimer <= 0) {
      const drSlG = ctx.createRadialGradient(0, 20, 0, 0, 20, 45);
      drSlG.addColorStop(0, 'rgba(0,200,255,0.18)');
      drSlG.addColorStop(0.5, 'rgba(0,200,255,0.07)');
      drSlG.addColorStop(1, 'rgba(0,200,255,0)');
      ctx.fillStyle = drSlG;
      ctx.beginPath(); ctx.arc(0, 20, 45, 0, Math.PI * 2); ctx.fill();
    }
    // Arms (X-frame)
    ctx.strokeStyle = '#37474F'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    for (let i = 0; i < 4; i++) {
      const ra = (i / 4) * Math.PI * 2 + Math.PI / 4;
      const drArm = Math.cos(ra) * 13, drArmY = Math.sin(ra) * 7 - 8 + drHover;
      ctx.beginPath(); ctx.moveTo(0, -8 + drHover); ctx.lineTo(drArm, drArmY); ctx.stroke();
      ctx.fillStyle = '#455A64';
      ctx.beginPath(); ctx.arc(drArm, drArmY, 4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(200,220,255,0.55)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(drArm, drArmY, 6.5, drRotSpd + i * 1.2, drRotSpd + i * 1.2 + Math.PI * 1.5); ctx.stroke();
      ctx.strokeStyle = '#37474F'; ctx.lineWidth = 3;
    }
    // Central body
    ctx.fillStyle = '#1a2a3a';
    ctx.beginPath(); ctx.ellipse(0, -8 + drHover, 11, 6, 0, 0, Math.PI * 2); ctx.fill();
    // Camera lens
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(0, -5 + drHover, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0077AA';
    ctx.beginPath(); ctx.arc(0, -5 + drHover, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(-0.7, -5.8 + drHover, 0.8, 0, Math.PI * 2); ctx.fill();
    // LED strip
    ctx.fillStyle = '#00CCFF';
    ctx.fillRect(-9, -10 + drHover, 18, 2);
    // Blinking warning LED
    if (Math.sin(frame * 0.18) > 0) {
      ctx.fillStyle = '#FF2200';
      ctx.beginPath(); ctx.arc(0, -13 + drHover, 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,30,0,0.25)';
      ctx.beginPath(); ctx.arc(0, -13 + drHover, 5, 0, Math.PI * 2); ctx.fill();
    }
    // State tint on drone body
    if (e.state === 'chase') {
      ctx.fillStyle = 'rgba(255,60,60,0.25)';
      ctx.beginPath(); ctx.ellipse(0, -8 + drHover, 11, 6, 0, 0, Math.PI * 2); ctx.fill();
    } else if (e.state === 'alert') {
      ctx.fillStyle = 'rgba(255,210,30,0.2)';
      ctx.beginPath(); ctx.ellipse(0, -8 + drHover, 11, 6, 0, 0, Math.PI * 2); ctx.fill();
    }

  } else if (e.type === 'guard') {
    // -------- GUARD: blue uniform, cap, flashlight, sleeps --------
    const gMoving = (e.state === 'chase' || e.state === 'alert' || (e.state === 'patrol' && !e.isSleeping));
    const gSpd = e.state === 'chase' ? 8 : 3;
    const gPh = e.animFrame * gSpd;
    const gBob = gMoving ? Math.sin(gPh * 2) * 1.5 : 0;
    const gDir = e.dir;
    const gfx = Math.cos(gDir), gfy = Math.sin(gDir);
    const grx = Math.cos(gDir + Math.PI / 2), gry = Math.sin(gDir + Math.PI / 2);

    ctx.save(); ctx.scale(1.25, 1.25);

    if (e.isSleeping) {
      // Sleeping guard in chair
      ctx.fillStyle = '#6B4226';
      ctx.fillRect(-8, 2, 16, 10);
      ctx.fillRect(-10, 0, 4, 14); ctx.fillRect(6, 0, 4, 14);
      ctx.fillStyle = '#2244AA';
      ctx.beginPath(); ctx.ellipse(0, 0, 9, 12, 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FFDAB9';
      ctx.beginPath(); ctx.arc(3, -8, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a2a6a';
      ctx.beginPath(); ctx.ellipse(3, -14, 9, 4, 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-2, -14, 12, 4);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.ellipse(7, -11, 5, 2, 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(3, -7.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5, -8); ctx.lineTo(8, -7.5); ctx.stroke();
      const zt = frame * 0.05;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = `${10 + Math.sin(zt) * 2}px sans-serif`;
      ctx.fillText('z', 12, -18 + Math.sin(zt) * 3);
      ctx.font = `${8 + Math.sin(zt + 1) * 1.5}px sans-serif`;
      ctx.fillText('z', 16, -24 + Math.sin(zt + 1) * 3);
      ctx.font = `${6 + Math.sin(zt + 2) * 1}px sans-serif`;
      ctx.fillText('z', 19, -29 + Math.sin(zt + 2) * 3);
    } else {
      // Awake guard
      if (gMoving) {
        ctx.fillStyle = '#1a2a6a';
        for (const s of [-1, 1]) {
          const stride = Math.sin(gPh + s) * (e.state === 'chase' ? 7 : 5);
          ctx.beginPath(); ctx.ellipse(grx * s * 5 + gfx * stride, gry * s * 5 + gfy * stride + 10, 3, 4, gDir * 0.15, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#111';
          ctx.beginPath(); ctx.ellipse(grx * s * 5 + gfx * (stride + 3), gry * s * 5 + gfy * (stride + 3) + 11, 2.5, 1.5, gDir, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#1a2a6a';
        }
      }
      const gArmSw = gMoving ? Math.sin(gPh) * 0.4 : 0;
      ctx.strokeStyle = '#FFDAB9'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(grx * -8, gry * -8 + gBob);
      ctx.lineTo(grx * -12 + gfx * gArmSw * 10, gry * -12 + gfy * gArmSw * 10 + 6 + gBob);
      ctx.stroke();
      // Flashlight arm
      ctx.beginPath();
      ctx.moveTo(grx * 8, gry * 8 + gBob);
      ctx.lineTo(grx * 10 + gfx * 12, gry * 10 + gfy * 12 + 2 + gBob);
      ctx.stroke();
      const gFlX = grx * 10 + gfx * 12, gFlY = gry * 10 + gfy * 12 + 2 + gBob;
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.ellipse(gFlX, gFlY, 3, 6, gDir, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = e.state === 'chase' ? '#FF4400' : '#FFD700';
      ctx.beginPath(); ctx.arc(gFlX + gfx * 5, gFlY + gfy * 5, 2.5, 0, Math.PI * 2); ctx.fill();
      // Blue uniform
      ctx.fillStyle = '#2244AA';
      ctx.beginPath(); ctx.ellipse(0, 2 + gBob, 9, 14, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.fillRect(-9, 4 + gBob, 18, 3);
      ctx.fillStyle = '#C0C0C0'; ctx.fillRect(-2, 4 + gBob, 4, 3);
      // Badge
      ctx.fillStyle = '#FFD700';
      ctx.beginPath(); ctx.arc(-4, -2 + gBob, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#B8860B';
      ctx.beginPath(); ctx.arc(-4, -2 + gBob, 1.5, 0, Math.PI * 2); ctx.fill();
      // Head
      const gHBob2 = gMoving ? Math.sin(gPh * 2 + 0.5) * 0.8 : 0;
      const ghx = gfx * 6, ghy = gfy * 6 + gBob;
      ctx.fillStyle = '#FFDAB9';
      ctx.beginPath(); ctx.arc(ghx, ghy - 8 + gHBob2, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a2a6a';
      ctx.beginPath(); ctx.ellipse(ghx, ghy - 14 + gHBob2, 9, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(ghx - 7, ghy - 14 + gHBob2, 14, 4);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.ellipse(ghx + gfx * 5, ghy - 11 + gHBob2 + gfy * 2, 6, 2, gDir * 0.3, 0, Math.PI * 2); ctx.fill();
      const gESh = gfx * 1.2;
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(ghx - 3 + gESh, ghy - 9 + gHBob2, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ghx + 3 + gESh, ghy - 9 + gHBob2, 1.5, 0, Math.PI * 2); ctx.fill();
      if (e.state === 'chase') {
        ctx.fillStyle = '#600';
        ctx.beginPath(); ctx.ellipse(ghx, ghy - 4 + gHBob2, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.strokeStyle = '#777'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(ghx, ghy - 5 + gHBob2, 2, Math.PI + 0.3, -0.3); ctx.stroke();
      }
    }
    ctx.restore();

  } else if (e.type === 'doglady') {
    // -------- DOG LADY: hunched woman, pink coat, leash + small dog --------
    const dlMoving = e.state !== 'idle';
    const dlSpd = e.state === 'chase' ? 6 : 3;
    const dlPh = e.animFrame * dlSpd;
    const dlBob = dlMoving ? Math.sin(dlPh * 2) * 1.2 : 0;
    const dlDir = e.dir;
    const dlfx = Math.cos(dlDir), dlfy = Math.sin(dlDir);
    const dlrx = Math.cos(dlDir + Math.PI / 2), dlry = Math.sin(dlDir + Math.PI / 2);

    ctx.save(); ctx.scale(1.25, 1.25);
    if (dlMoving) {
      ctx.fillStyle = '#6B3A5A';
      for (const s of [-1, 1]) {
        const stride = Math.sin(dlPh + s) * 4;
        ctx.beginPath(); ctx.ellipse(dlrx * s * 5 + dlfx * stride, dlry * s * 5 + dlfy * stride + 10, 3, 4, dlDir * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#444';
        ctx.beginPath(); ctx.ellipse(dlrx * s * 5 + dlfx * (stride + 3), dlry * s * 5 + dlfy * (stride + 3) + 11, 2.5, 1.5, dlDir, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#6B3A5A';
      }
    }
    const dlArmSw = dlMoving ? Math.sin(dlPh) * 0.3 : Math.sin(frame * 0.03) * 0.05;
    ctx.strokeStyle = '#FFDAB9'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(dlrx * -9, dlry * -9 + dlBob);
    ctx.lineTo(dlrx * -13 + dlfx * dlArmSw * 8, dlry * -13 + dlfy * dlArmSw * 8 + 6 + dlBob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(dlrx * 9, dlry * 9 + dlBob);
    ctx.lineTo(dlrx * 13, dlry * 13 + 8 + dlBob);
    ctx.stroke();
    ctx.fillStyle = '#8B4513';
    const dlBgX = dlrx * 13, dlBgY = dlry * 13 + 8 + dlBob;
    ctx.beginPath(); ctx.ellipse(dlBgX, dlBgY, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#6B3210'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(dlBgX, dlBgY - 3, 4, Math.PI, 0); ctx.stroke();
    // Pink coat
    ctx.fillStyle = '#CC6699';
    ctx.beginPath(); ctx.ellipse(0, 2 + dlBob, 10, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#AA4477';
    for (let bi = 0; bi < 3; bi++) { ctx.beginPath(); ctx.arc(0, -3 + bi * 5 + dlBob, 1.2, 0, Math.PI * 2); ctx.fill(); }
    // Head
    const dlHBob = dlMoving ? Math.sin(dlPh * 2 + 0.5) * 0.6 : 0;
    const dlhx = dlfx * 6, dlhy = dlfy * 6 + dlBob;
    ctx.fillStyle = '#FFDAB9';
    ctx.beginPath(); ctx.arc(dlhx, dlhy - 8 + dlHBob, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#BBBBBB';
    for (let hi = 0; hi < 7; hi++) {
      const ha = (hi / 7) * Math.PI + Math.PI;
      const dlhb = dlMoving ? Math.sin(dlPh * 2 + hi * 0.5) * 0.4 : 0;
      ctx.beginPath(); ctx.arc(dlhx + Math.cos(ha) * 7, dlhy - 10 + Math.sin(ha) * 4 + dlHBob + dlhb, 3.5, 0, Math.PI * 2); ctx.fill();
    }
    const dlESh = dlfx * 1;
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.arc(dlhx - 3 + dlESh, dlhy - 8 + dlHBob, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(dlhx + 3 + dlESh, dlhy - 8 + dlHBob, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(220,150,150,0.3)';
    ctx.beginPath(); ctx.arc(dlhx - 5, dlhy - 5 + dlHBob, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(dlhx + 5, dlhy - 5 + dlHBob, 2, 0, Math.PI * 2); ctx.fill();
    if (e.state === 'chase') {
      ctx.fillStyle = '#800';
      ctx.beginPath(); ctx.ellipse(dlhx, dlhy - 3 + dlHBob, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = '#A07070'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(dlhx, dlhy - 5 + dlHBob, 2, 0.3, Math.PI - 0.3); ctx.stroke();
    }
    ctx.restore();

    // Leash + small orbiting dog
    if (e.dogX !== undefined && e.dogY !== undefined) {
      const dlDs = worldToScreen(e.dogX, e.dogY);
      const dlDrx = dlDs.x - s.x, dlDry = dlDs.y - s.y;
      ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(dlDrx * 0.5, dlDry * 0.5 + 8, dlDrx, dlDry); ctx.stroke();
      const dlDa = e.dogAngle || 0;
      const dlDfx = Math.cos(dlDa), dlDfy = Math.sin(dlDa);
      ctx.fillStyle = '#B8860B';
      ctx.beginPath(); ctx.ellipse(dlDrx, dlDry, 7, 5, dlDa, 0, Math.PI * 2); ctx.fill();
      const dlDhx = dlDrx + dlDfx * 6, dlDhy = dlDry + dlDfy * 6;
      ctx.fillStyle = '#C8922A';
      ctx.beginPath(); ctx.arc(dlDhx, dlDhy, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#A67B25';
      ctx.beginPath(); ctx.arc(dlDhx - 3, dlDhy - 3, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(dlDhx + 3, dlDhy - 3, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(dlDhx - 1.5, dlDhy - 0.5, 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(dlDhx + 1.5, dlDhy - 0.5, 1, 0, Math.PI * 2); ctx.fill();
      const dlSDTail = Math.sin(frame * 0.2) * 5;
      ctx.strokeStyle = '#B8860B'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(dlDrx - dlDfx * 6, dlDry - dlDfy * 6);
      ctx.lineTo(dlDrx - dlDfx * 10, dlDry - dlDfy * 10 + dlSDTail);
      ctx.stroke();
    }

  } else {
    // -------- CHEF or GRANDMA --------
    const isChef = e.type === 'chef';
    const hMoving = e.state !== 'idle';
    const hSpd = e.state === 'chase' ? 8 : e.state === 'alert' ? 5 : 3;
    const hPh = e.animFrame * hSpd;
    const hBob = hMoving ? Math.sin(hPh * 2) * 1.5 : 0;
    const hDir = e.dir;
    const hfx = Math.cos(hDir), hfy = Math.sin(hDir);
    const hrx = Math.cos(hDir + Math.PI / 2), hry = Math.sin(hDir + Math.PI / 2);

    ctx.save(); ctx.scale(1.25, 1.25);

    // Legs (shared)
    if (hMoving) {
      ctx.fillStyle = isChef ? '#333' : '#6B4A7A';
      for (const s of [-1, 1]) {
        const stride = Math.sin(hPh + s) * (e.state === 'chase' ? 7 : 5);
        ctx.beginPath(); ctx.ellipse(hrx * s * 5 + hfx * stride, hry * s * 5 + hfy * stride + 10, 3, 4, hDir * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = isChef ? '#222' : '#5A3D6B';
        ctx.beginPath(); ctx.ellipse(hrx * s * 5 + hfx * (stride + 3), hry * s * 5 + hfy * (stride + 3) + 11, 2.5, 1.5, hDir, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = isChef ? '#333' : '#6B4A7A';
      }
    }

    if (isChef) {
      // ---- CHEF ----
      const chArmSw = hMoving ? Math.sin(hPh) * 0.5 : Math.sin(frame * 0.04) * 0.08;
      ctx.strokeStyle = '#FFDAB9'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(hrx * -8, hry * -8 + hBob);
      ctx.lineTo(hrx * -12 + hfx * chArmSw * 12, hry * -12 + hfy * chArmSw * 12 + 6 + hBob);
      ctx.stroke();
      const chRArmEnd = e.state === 'chase' ? 0.7 : 0.3;
      ctx.beginPath();
      ctx.moveTo(hrx * 8, hry * 8 + hBob);
      ctx.lineTo(hrx * 12 + hfx * chRArmEnd * 14, hry * 12 + hfy * chRArmEnd * 14 + 4 + hBob);
      ctx.stroke();
      // White uniform
      ctx.fillStyle = '#F0F0F0';
      ctx.beginPath(); ctx.ellipse(0, 2 + hBob, 9, 15, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#CCC';
      for (let bi = 0; bi < 3; bi++) { ctx.beginPath(); ctx.arc(0, -4 + bi * 5 + hBob, 1.2, 0, Math.PI * 2); ctx.fill(); }
      ctx.fillStyle = '#E0E0E0';
      ctx.fillRect(-7, 0 + hBob, 14, 12);
      ctx.strokeStyle = '#CCC'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-7, 2 + hBob); ctx.lineTo(-10, 6 + hBob); ctx.moveTo(7, 2 + hBob); ctx.lineTo(10, 6 + hBob); ctx.stroke();
      // Ladle / knife tool
      const chToolAngle = hDir + (e.state === 'chase' ? 0.3 : 0.8);
      const chToolSw = e.state === 'chase' ? Math.sin(hPh * 1.5) * 0.3 : 0;
      ctx.save(); ctx.rotate(chToolAngle + chToolSw);
      ctx.strokeStyle = '#888'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(20, 0); ctx.stroke();
      if (e.state === 'chase') {
        ctx.fillStyle = '#C8C8C8';
        ctx.beginPath(); ctx.moveTo(20, -3); ctx.lineTo(28, 0); ctx.lineTo(20, 2); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(21, -1); ctx.lineTo(26, 0); ctx.stroke();
      } else {
        ctx.fillStyle = '#AAA';
        ctx.beginPath(); ctx.arc(22, 0, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(22, 0, 3, 0, Math.PI); ctx.stroke();
      }
      ctx.restore();
      // Head + tall chef toque
      const chHBob = hMoving ? Math.sin(hPh * 2 + 0.5) * 0.8 : 0;
      const chhx = hfx * 6, chhy = hfy * 6 + hBob;
      ctx.fillStyle = '#FFDAB9';
      ctx.beginPath(); ctx.arc(chhx, chhy - 8 + chHBob, 8, 0, Math.PI * 2); ctx.fill();
      const chHatB = hMoving ? Math.abs(Math.sin(hPh * 2)) * 1.5 : 0;
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.ellipse(chhx, chhy - 22 + chHBob - chHatB, 9, 8 + chHatB * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(chhx - 7, chhy - 16 + chHBob, 14, 8);
      ctx.fillStyle = '#DDD'; ctx.fillRect(chhx - 7, chhy - 10 + chHBob, 14, 2);
      // Eyes
      const chESh = hfx * 1.2;
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(chhx - 3 + chESh, chhy - 9 + chHBob, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(chhx + 3 + chESh, chhy - 9 + chHBob, 1.8, 0, Math.PI * 2); ctx.fill();
      const chBrA = e.state === 'chase' ? 2 : 0.5;
      ctx.strokeStyle = e.state === 'chase' ? '#500' : '#666';
      ctx.lineWidth = e.state === 'chase' ? 1.8 : 1;
      ctx.beginPath(); ctx.moveTo(chhx - 6, chhy - 12 + chHBob - chBrA); ctx.lineTo(chhx - 1, chhy - 11 + chHBob); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(chhx + 6, chhy - 12 + chHBob - chBrA); ctx.lineTo(chhx + 1, chhy - 11 + chHBob); ctx.stroke();
      // Moustache
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.ellipse(chhx - 2.5, chhy - 6 + chHBob, 2.5, 1.2, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(chhx + 2.5, chhy - 6 + chHBob, 2.5, 1.2, 0.2, 0, Math.PI * 2); ctx.fill();
      // Mouth
      if (e.state === 'chase') {
        ctx.fillStyle = '#300';
        ctx.beginPath(); ctx.ellipse(chhx, chhy - 3.5 + chHBob, 3, 2.5 + Math.abs(Math.sin(hPh)) * 1.5, 0, 0, Math.PI * 2); ctx.fill();
      } else if (e.state === 'alert') {
        ctx.strokeStyle = '#666'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.arc(chhx, chhy - 3 + chHBob, 2, Math.PI + 0.3, -0.3); ctx.stroke();
      } else {
        ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(chhx - 2, chhy - 5 + chHBob); ctx.lineTo(chhx + 3, chhy - 5.5 + chHBob); ctx.stroke();
      }
      if (e.state === 'chase') {
        const chSw = (e.animFrame * 4) % 30;
        ctx.fillStyle = 'rgba(150,200,255,0.6)';
        ctx.beginPath(); ctx.ellipse(chhx + 7, chhy - 6 + chHBob + chSw * 0.3, 1, 2, 0, 0, Math.PI * 2); ctx.fill();
      }

    } else {
      // ---- GRANDMA ----
      const gmArmSw = hMoving ? Math.sin(hPh) * 0.35 : Math.sin(frame * 0.03) * 0.06;
      ctx.strokeStyle = '#FFDAB9'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(hrx * -10, hry * -10 + hBob);
      ctx.quadraticCurveTo(hrx * -14 + hfx * gmArmSw * 10, hry * -14 + hfy * gmArmSw * 10 + 3 + hBob,
                            hrx * -16 + hfx * gmArmSw * 14, hry * -16 + hfy * gmArmSw * 14 + 8 + hBob);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hrx * 10, hry * 10 + hBob);
      ctx.quadraticCurveTo(hrx * 14 - hfx * gmArmSw * 10, hry * 14 - hfy * gmArmSw * 10 + 3 + hBob,
                            hrx * 16 - hfx * gmArmSw * 14, hry * 16 - hfy * gmArmSw * 14 + 8 + hBob);
      ctx.stroke();
      ctx.fillStyle = '#FFDAB9';
      ctx.beginPath(); ctx.arc(hrx * -16 + hfx * gmArmSw * 14, hry * -16 + hfy * gmArmSw * 14 + 8 + hBob, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(hrx * 16 - hfx * gmArmSw * 14, hry * 16 - hfy * gmArmSw * 14 + 8 + hBob, 2.5, 0, Math.PI * 2); ctx.fill();
      // Purple floral dress
      const gmDressSway = hMoving ? Math.sin(hPh * 0.8) * 0.8 : 0;
      ctx.fillStyle = '#7B5EA7';
      ctx.beginPath(); ctx.ellipse(gmDressSway, 3 + hBob, 12, 14, gmDressSway * 0.02, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(240,230,200,0.55)';
      ctx.beginPath(); ctx.ellipse(gmDressSway, 5 + hBob, 7, 10, gmDressSway * 0.02, 0, Math.PI * 2); ctx.fill();
      for (let fi = 0; fi < 5; fi++) {
        const gmFlX = Math.sin(fi * 1.5 + frame * 0.01) * 7 + gmDressSway;
        const gmFlY = fi * 4.5 - 5 + hBob;
        ctx.fillStyle = fi % 2 === 0 ? 'rgba(220,170,240,0.5)' : 'rgba(255,200,220,0.4)';
        ctx.beginPath(); ctx.arc(gmFlX, gmFlY, 2.2, 0, Math.PI * 2); ctx.fill();
      }
      // Broom when alert/chase
      if (e.state === 'chase' || e.state === 'alert') {
        const gmBrAngle = hDir + (e.state === 'chase' ? 0.3 : 0.6);
        const gmBrSw = e.state === 'chase' ? Math.sin(hPh * 1.8) * 0.25 : 0;
        ctx.save(); ctx.rotate(gmBrAngle + gmBrSw);
        ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(24, 0); ctx.stroke();
        ctx.fillStyle = '#CC9944';
        ctx.beginPath(); ctx.moveTo(24, -5); ctx.lineTo(30, -2); ctx.lineTo(30, 2); ctx.lineTo(24, 5); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#AA7722'; ctx.lineWidth = 0.8;
        for (let bi = -3; bi <= 3; bi++) { ctx.beginPath(); ctx.moveTo(24, bi * 1.3); ctx.lineTo(29, bi * 0.8); ctx.stroke(); }
        ctx.restore();
      }
      // Head
      const gmHBob = hMoving ? Math.sin(hPh * 2 + 0.5) * 0.6 : 0;
      const gmhx = hfx * 6, gmhy = hfy * 6 + hBob;
      ctx.fillStyle = '#FFDAB9';
      ctx.beginPath(); ctx.arc(gmhx, gmhy - 8 + gmHBob, 9, 0, Math.PI * 2); ctx.fill();
      // Gray curly hair
      ctx.fillStyle = '#B8B8B8';
      for (let hi = 0; hi < 7; hi++) {
        const ha = (hi / 7) * Math.PI + Math.PI;
        const gmHhb = hMoving ? Math.sin(hPh * 2 + hi * 0.5) * 0.5 : 0;
        ctx.beginPath(); ctx.arc(gmhx + Math.cos(ha) * 8, gmhy - 10 + Math.sin(ha) * 5 + gmHBob + gmHhb, 4, 0, Math.PI * 2); ctx.fill();
      }
      // Round glasses
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(gmhx - 4, gmhy - 8 + gmHBob, 3.5, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(gmhx + 4, gmhy - 8 + gmHBob, 3.5, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(gmhx - 1, gmhy - 8 + gmHBob); ctx.lineTo(gmhx + 1, gmhy - 8 + gmHBob); ctx.stroke();
      const gmESh = hfx * 1;
      ctx.fillStyle = '#444';
      ctx.beginPath(); ctx.arc(gmhx - 4 + gmESh, gmhy - 8 + gmHBob, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(gmhx + 4 + gmESh, gmhy - 8 + gmHBob, 1.2, 0, Math.PI * 2); ctx.fill();
      // Rosy cheeks
      ctx.fillStyle = 'rgba(220,150,150,0.25)';
      ctx.beginPath(); ctx.arc(gmhx - 6, gmhy - 5 + gmHBob, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(gmhx + 6, gmhy - 5 + gmHBob, 2.5, 0, Math.PI * 2); ctx.fill();
      // Mouth
      if (e.state === 'chase') {
        ctx.fillStyle = '#800';
        ctx.beginPath(); ctx.ellipse(gmhx, gmhy - 3 + gmHBob, 3, 2.5 + Math.abs(Math.sin(hPh)) * 1, 0, 0, Math.PI * 2); ctx.fill();
      } else if (e.state === 'alert') {
        ctx.strokeStyle = '#A07070'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.ellipse(gmhx, gmhy - 4 + gmHBob, 2, 1.5, 0, 0, Math.PI * 2); ctx.stroke();
      } else {
        ctx.strokeStyle = '#A07070'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(gmhx, gmhy - 5 + gmHBob, 2, 0.3, Math.PI - 0.3); ctx.stroke();
      }
      // Anger cross when chasing
      if (e.state === 'chase') {
        const gmAngerPulse = 0.7 + Math.sin(frame * 0.2) * 0.3;
        ctx.strokeStyle = `rgba(200,50,50,${gmAngerPulse})`; ctx.lineWidth = 1.5;
        const gmAx = gmhx + 8, gmAy = gmhy - 16 + gmHBob;
        ctx.beginPath(); ctx.moveTo(gmAx, gmAy); ctx.lineTo(gmAx + 4, gmAy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(gmAx + 4, gmAy); ctx.lineTo(gmAx + 4, gmAy + 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(gmAx + 2, gmAy + 2); ctx.lineTo(gmAx + 6, gmAy + 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(gmAx + 2, gmAy); ctx.lineTo(gmAx + 2, gmAy + 4); ctx.stroke();
      }
    }

    ctx.restore(); // end human scale
  }

  // =====================================================================
  // STATE TINT OVERLAY (non-drone, adds urgency color)
  // =====================================================================
  if (e.type !== 'drone') {
    let stR = 14;
    if (e.type === 'bigdog') stR = 22;
    else if (isHuman) stR = 19;
    if (e.state === 'chase') {
      ctx.fillStyle = 'rgba(255,55,55,0.18)';
      ctx.beginPath(); ctx.ellipse(0, 0, stR * 1.3, stR, 0, 0, Math.PI * 2); ctx.fill();
    } else if (e.state === 'alert') {
      ctx.fillStyle = 'rgba(255,210,30,0.14)';
      ctx.beginPath(); ctx.ellipse(0, 0, stR * 1.3, stR, 0, 0, Math.PI * 2); ctx.fill();
    }
  }

  // =====================================================================
  // SPEECH BUBBLE
  // =====================================================================
  if (e._speechTimer > 0 && e._speechText) {
    const bubbleAlpha = Math.min(1, e._speechTimer / 20);
    ctx.globalAlpha = bubbleAlpha;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = '10px sans-serif';
    const sbTw = ctx.measureText(e._speechText).width + 14;
    roundRect(ctx, -sbTw / 2, -48, sbTw, 18, 6);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4, -30); ctx.lineTo(4, -30); ctx.lineTo(0, -24);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = e.state === 'chase' ? '#CC0000' : e.state === 'alert' ? '#CC8800' : '#555';
    ctx.textAlign = 'center';
    ctx.fillText(e._speechText, 0, -34);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // State icon (! / ?)
  if (e.state === 'alert') {
    ctx.fillStyle = 'rgba(255,215,0,0.4)';
    ctx.beginPath(); ctx.arc(-1, -56, 11, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('?', -5, -51);
  } else if (e.state === 'chase') {
    ctx.fillStyle = 'rgba(255,0,0,0.4)';
    ctx.beginPath(); ctx.arc(-1, -56, 11, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF0000';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('!', -4, -51);
  }

  // Can opener indicator
  if (e.hasCanOpener && !e._canOpenerStolen) {
    const keyBob = Math.sin(frame * 0.08) * 3;
    ctx.fillStyle = 'rgba(255,215,0,0.2)';
    ctx.beginPath(); ctx.arc(12, -8 + keyBob, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(12, -10 + keyBob, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFA000';
    ctx.fillRect(10, -10 + keyBob, 4, 8);
    ctx.fillRect(11, -4 + keyBob, 4, 2);
    ctx.fillRect(11, 0 + keyBob, 4, 2);
    if (frame % 30 < 15) {
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(14, -13 + keyBob, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Stunned indicator
  if (e.stunTimer > 0) {
    ctx.fillStyle = 'rgba(100,140,255,0.7)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('★', 0, -34);
    ctx.textAlign = 'left';
  }

  // Catnip effect
  if (e.catnipTimer > 0) {
    ctx.fillStyle = '#90EE90';
    ctx.font = '12px sans-serif';
    ctx.fillText('💫', -8, -22);
    ctx.strokeStyle = '#90EE9066'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 18, frame * 0.1, frame * 0.1 + Math.PI); ctx.stroke();
  }

  // Type label (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(e.label, 0, 24);
  ctx.textAlign = 'left';

  ctx.restore();
}

function drawFood() {
  for (const food of foods) {
    if (food.eaten) continue;
    const s = worldToScreen(food.x, food.y);
    if (s.x < -20 || s.x > CFG.W + 20 || s.y < -20 || s.y > CFG.H + 20) continue;

    ctx.save();
    ctx.translate(s.x, s.y);
    const bob = Math.sin(frame * 0.05 + food.x * 0.3) * 2;

    // Soft drop shadow under every item
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, 10 + bob, 7, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    if (food.type === 'biscuit') {
      // Round golden cracker with speckles
      ctx.fillStyle = '#E8C46A';
      ctx.beginPath();
      ctx.arc(0, bob, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#C8952A';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, bob, 6, 0, Math.PI * 2);
      ctx.stroke();
      // Cracker texture dots (seeded from coords)
      ctx.fillStyle = '#C8952A';
      ctx.beginPath(); ctx.arc(-2, bob - 2, 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(2, bob + 1, 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(-1, bob + 2.5, 0.7, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,200,0.35)';
      ctx.beginPath();
      ctx.arc(-2, bob - 2, 2.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (food.type === 'can') {
      // Silver cylinder can with red label
      ctx.fillStyle = '#B8B8C0';
      roundRect(ctx, -7, -7 + bob, 14, 14, 3);
      ctx.fill();
      ctx.strokeStyle = '#888890';
      ctx.lineWidth = 0.8;
      roundRect(ctx, -7, -7 + bob, 14, 14, 3);
      ctx.stroke();
      // Lid ellipse top
      ctx.fillStyle = '#D0D0D8';
      ctx.beginPath();
      ctx.ellipse(0, -7 + bob, 7, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Red label band
      ctx.fillStyle = '#D63030';
      ctx.fillRect(-6, -3 + bob, 12, 6);
      // Label text
      ctx.fillStyle = '#FFE8A0';
      ctx.font = 'bold 4px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('CAT', 0, 2 + bob);
      ctx.textAlign = 'left';
      // Pull tab
      ctx.fillStyle = '#A0A0A8';
      ctx.fillRect(1, -9 + bob, 4, 2);
    } else if (food.type === 'fish') {
      // Blue-silver fish
      ctx.fillStyle = '#6AAFD4';
      ctx.beginPath();
      ctx.ellipse(0, bob, 9, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Silver belly
      ctx.fillStyle = '#D8EEF8';
      ctx.beginPath();
      ctx.ellipse(0, bob + 1.5, 5.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail fin
      ctx.fillStyle = '#4A90BE';
      ctx.beginPath();
      ctx.moveTo(7, bob); ctx.lineTo(13, bob - 5); ctx.lineTo(13, bob + 5);
      ctx.closePath(); ctx.fill();
      // Dorsal fin
      ctx.fillStyle = '#5AA0CC';
      ctx.beginPath();
      ctx.moveTo(-1, bob - 4.5); ctx.lineTo(2, bob - 8); ctx.lineTo(5, bob - 4.5);
      ctx.closePath(); ctx.fill();
      // Eye
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(-5, bob - 1.5, 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1A1A2E';
      ctx.beginPath(); ctx.arc(-4.5, bob - 1.5, 1, 0, Math.PI * 2); ctx.fill();
      // Outline
      ctx.strokeStyle = 'rgba(30,80,120,0.4)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(0, bob, 9, 5, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (food.type === 'cake') {
      // Fancy layered cake slice
      ctx.save();
      ctx.translate(0, bob);
      // Plate shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath(); ctx.ellipse(0, 8, 11, 3, 0, 0, Math.PI * 2); ctx.fill();
      // Bottom sponge
      ctx.fillStyle = '#F5E0C0';
      roundRect(ctx, -9, 0, 18, 7, 2); ctx.fill();
      // Cream layer
      ctx.fillStyle = '#FFF5FA';
      ctx.fillRect(-8, -1, 16, 2);
      // Middle pink sponge
      ctx.fillStyle = '#F8B4C8';
      roundRect(ctx, -7, -8, 14, 7, 2); ctx.fill();
      // Top frosting
      ctx.fillStyle = '#FFFAFA';
      roundRect(ctx, -6, -13, 12, 5, 2); ctx.fill();
      // Frosting drips
      ctx.fillStyle = '#FFF0F5';
      ctx.beginPath(); ctx.ellipse(-5, -1, 2, 3.5, 0, 0, Math.PI); ctx.fill();
      ctx.beginPath(); ctx.ellipse(4, -1, 1.8, 3, 0, 0, Math.PI); ctx.fill();
      // Cherry
      ctx.fillStyle = '#CC1818';
      ctx.beginPath(); ctx.arc(0, -16, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#991010'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.arc(0, -16, 2.5, 0, Math.PI * 2); ctx.stroke();
      // Cherry stem
      ctx.strokeStyle = '#2D6A00'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(0, -18.5); ctx.quadraticCurveTo(3, -22, 1.5, -20.5); ctx.stroke();
      ctx.restore();
      // Eat progress ring
      if (food.eatProgress > 0) {
        ctx.save();
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(255,215,0,0.2)';
        ctx.beginPath(); ctx.arc(0, bob, 15, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(0, bob, 15, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * food.eatProgress);
        ctx.stroke();
        ctx.restore();
      }
    } else if (food.type === 'cheese') {
      // Yellow cheese wedge with holes
      const rot = food.rolling ? (frame * 0.15) : 0;
      ctx.save();
      ctx.translate(0, bob);
      ctx.rotate(rot);
      ctx.fillStyle = '#F5C800';
      ctx.beginPath();
      ctx.moveTo(-8, 6); ctx.lineTo(8, 6); ctx.lineTo(0, -8);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#C8980A'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-8, 6); ctx.lineTo(8, 6); ctx.lineTo(0, -8);
      ctx.closePath(); ctx.stroke();
      // Holes
      ctx.fillStyle = '#C89000';
      ctx.beginPath(); ctx.arc(-2, 2, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, 1, 1.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -3, 1, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,180,0.4)';
      ctx.beginPath(); ctx.ellipse(-3, -2, 3, 2, -0.5, 0, Math.PI * 2); ctx.fill();
      if (food.rolling) {
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#F5C800'; ctx.lineWidth = 2;
        ctx.setLineDash([2, 4]);
        ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha = 1;
      }
      ctx.restore();
    } else if (food.type === 'icecream') {
      // Waffle cone with three pastel scoops
      ctx.save();
      ctx.translate(0, bob);
      // Cone body
      ctx.fillStyle = '#C8884A';
      ctx.beginPath();
      ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.lineTo(0, 14);
      ctx.closePath(); ctx.fill();
      // Waffle grid lines
      ctx.strokeStyle = '#A86828'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(-4, 3); ctx.lineTo(2, 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4, 3); ctx.lineTo(-1, 11); ctx.stroke();
      // Chocolate scoop
      ctx.fillStyle = '#7B3A18';
      ctx.beginPath(); ctx.arc(0, -1, 6, 0, Math.PI * 2); ctx.fill();
      // Vanilla scoop
      ctx.fillStyle = '#F2E8C8';
      ctx.beginPath(); ctx.arc(0, -7, 5.5, 0, Math.PI * 2); ctx.fill();
      // Strawberry scoop
      ctx.fillStyle = '#FFB0C0';
      ctx.beginPath(); ctx.arc(0, -12.5, 5, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(-2, -14.5, 2, 0, Math.PI * 2); ctx.fill();
      // Speed aura
      const pulseA = 0.15 + Math.sin(frame * 0.12) * 0.08;
      ctx.strokeStyle = `rgba(0,240,240,${pulseA})`; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, -6, 16, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    // Proximity glow (golden ring when player is near)
    if (dist(player.x, player.y, food.x, food.y) < 60) {
      ctx.strokeStyle = 'rgba(255,215,0,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, bob, 13, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Ambient soft glow
    ctx.fillStyle = 'rgba(255,220,120,0.05)';
    ctx.beginPath();
    ctx.arc(0, bob, 15, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Grand fish — highly visible interactive object
  if (grandFish && !grandFish.eaten) {
    const s = worldToScreen(grandFish.x, grandFish.y);
    ctx.save();
    ctx.translate(s.x, s.y);
    const bob = Math.sin(frame * 0.04) * 4;
    // Pulsing outer ring
    const ringPulse = 0.4 + Math.sin(frame * 0.08) * 0.2;
    ctx.strokeStyle = `rgba(255,215,0,${ringPulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, bob, 34, 0, Math.PI * 2);
    ctx.stroke();
    // Large glow
    if (isMobileDevice) {
      ctx.fillStyle = `rgba(255,215,0,${0.15 + Math.sin(frame * 0.06) * 0.05})`;
      ctx.beginPath();
      ctx.arc(0, bob, 35, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const gfGlow = ctx.createRadialGradient(0, bob, 0, 0, bob, 50);
      gfGlow.addColorStop(0, `rgba(255,215,0,${0.35 + Math.sin(frame * 0.06) * 0.1})`);
      gfGlow.addColorStop(0.4, `rgba(255,180,0,${0.15 + Math.sin(frame * 0.06) * 0.05})`);
      gfGlow.addColorStop(1, 'rgba(255,160,0,0)');
      ctx.fillStyle = gfGlow;
      ctx.beginPath();
      ctx.arc(0, bob, 50, 0, Math.PI * 2);
      ctx.fill();
    }
    // Big golden fish body
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(0, bob, 24, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Outline
    ctx.strokeStyle = '#FF8F00';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(0, bob, 24, 12, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Tail
    ctx.fillStyle = '#FFA000';
    ctx.beginPath();
    ctx.moveTo(19, bob);
    ctx.lineTo(32, bob - 12);
    ctx.lineTo(32, bob + 12);
    ctx.fill();
    // Scales shimmer
    for (let si = 0; si < 3; si++) {
      const sx = -8 + si * 8;
      const shimmer = 0.15 + Math.sin(frame * 0.05 + si) * 0.1;
      ctx.fillStyle = `rgba(255,255,200,${shimmer})`;
      ctx.beginPath();
      ctx.arc(sx, bob, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    // Eye
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(-10, bob - 3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-10, bob - 3, 2, 0, Math.PI * 2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#FF8F00';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-10, bob - 16);
    ctx.lineTo(-6, bob - 26);
    ctx.lineTo(-2, bob - 18);
    ctx.lineTo(2, bob - 26);
    ctx.lineTo(6, bob - 16);
    ctx.fill();
    ctx.stroke();
    // Arrow indicator
    const arrowBob = Math.sin(frame * 0.1) * 3;
    ctx.fillStyle = `rgba(255,255,100,${0.7 + Math.sin(frame * 0.12) * 0.3})`;
    ctx.beginPath();
    ctx.moveTo(0, bob - 36 + arrowBob);
    ctx.lineTo(-6, bob - 44 + arrowBob);
    ctx.lineTo(6, bob - 44 + arrowBob);
    ctx.fill();
    // Label
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t('grandFishLabel'), 0, bob + 28);
    ctx.textAlign = 'left';
    ctx.restore();
  }
}

function drawHideSpots() {
  for (const h of hideSpots) {
    if (h === player.hidingBox) continue;
    const s = worldToScreen(h.x, h.y);
    if (s.x < -40 || s.x > CFG.W + 40 || s.y < -40 || s.y > CFG.H + 40) continue;

    const playerDist = dist(player.x, player.y, h.x, h.y);
    const isNear = playerDist < 60 && !player.hiding;

    // Safety beacon when chased
    if (player.anyChasing && playerDist < 200) {
      const safePulse = 0.15 + Math.sin(frame * 0.12) * 0.08;
      if (isMobileDevice) {
        ctx.fillStyle = `rgba(80,255,80,${safePulse * 0.5})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 20, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const safeGlow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 30);
        safeGlow.addColorStop(0, `rgba(80,255,80,${safePulse})`);
        safeGlow.addColorStop(1, 'rgba(80,255,80,0)');
        ctx.fillStyle = safeGlow;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 30, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.save();
    ctx.translate(s.x, s.y);

    // Drop shadow (angled)
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(16, -4);
    ctx.lineTo(34, 10);
    ctx.lineTo(28, 20);
    ctx.lineTo(10, 20);
    ctx.closePath();
    ctx.fill();

    const boxColor = isNear ? '#A0805E' : '#8A6748';
    const boxDark  = isNear ? '#7A6040' : '#6A5030';
    const boxLight = isNear ? '#C0A878' : '#A08860';

    // Box body
    ctx.fillStyle = boxColor;
    roundRect(ctx, -18, -16, 36, 34, 3);
    ctx.fill();
    ctx.strokeStyle = boxDark;
    ctx.lineWidth = 1.5;
    roundRect(ctx, -18, -16, 36, 34, 3);
    ctx.stroke();

    // Darker front face shading (bottom band)
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(-17, 6, 34, 11);

    // Left flap (slightly open, tilted outward)
    ctx.fillStyle = boxLight;
    ctx.beginPath();
    ctx.moveTo(-18, -16);
    ctx.lineTo(-1, -16);
    ctx.lineTo(-2, -22);
    ctx.lineTo(-20, -20);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = boxDark; ctx.lineWidth = 1;
    ctx.stroke();

    // Right flap (slightly open, tilted outward)
    ctx.fillStyle = boxLight;
    ctx.beginPath();
    ctx.moveTo(1, -16);
    ctx.lineTo(18, -16);
    ctx.lineTo(20, -20);
    ctx.lineTo(2, -22);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = boxDark; ctx.lineWidth = 1;
    ctx.stroke();

    // Tape strip across flaps
    ctx.fillStyle = isNear ? 'rgba(210,185,130,0.75)' : 'rgba(180,158,108,0.65)';
    ctx.fillRect(-5, -23, 10, 4);

    // Cross tape lines on body
    ctx.strokeStyle = isNear ? 'rgba(180,140,80,0.6)' : 'rgba(140,100,50,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -16); ctx.lineTo(0, 18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-18, 1); ctx.lineTo(18, 1);
    ctx.stroke();

    // "HIDE HERE" indicator label when near
    if (isNear) {
      const pulse = 0.7 + Math.sin(frame * 0.15) * 0.3;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#FFE090';
      ctx.font = 'bold 7px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(t('autoHide'), 0, -28);
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    ctx.restore();
  }
}

function drawCatnipPickups() {
  for (const c of catnipPickups) {
    if (c.collected) continue;
    const s = worldToScreen(c.x, c.y);
    const bob = Math.sin(frame * 0.06 + c.x * 0.3) * 3;

    // Magical green aura
    if (isMobileDevice) {
      ctx.fillStyle = 'rgba(80,220,80,0.08)';
      ctx.beginPath();
      ctx.arc(s.x, s.y + bob, 14, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const cpGlow = ctx.createRadialGradient(s.x, s.y + bob, 0, s.x, s.y + bob, 20);
      cpGlow.addColorStop(0, 'rgba(80,220,80,0.18)');
      cpGlow.addColorStop(1, 'rgba(80,220,80,0)');
      ctx.fillStyle = cpGlow;
      ctx.beginPath();
      ctx.arc(s.x, s.y + bob, 20, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(s.x, s.y + bob);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 10, 6, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Stem
    ctx.strokeStyle = '#2A7A1A';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.lineTo(0, -4);
    ctx.stroke();

    // Left leaf
    ctx.fillStyle = '#52C43A';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-10, -6, -12, 2, -6, 6);
    ctx.bezierCurveTo(-3, 4, 0, 0, 0, 0);
    ctx.fill();
    // Left leaf vein
    ctx.strokeStyle = '#2A7A1A'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-7, 3); ctx.stroke();

    // Right leaf
    ctx.fillStyle = '#62D448';
    ctx.beginPath();
    ctx.moveTo(0, -2);
    ctx.bezierCurveTo(10, -8, 12, 0, 6, 4);
    ctx.bezierCurveTo(3, 2, 0, -2, 0, -2);
    ctx.fill();
    // Right leaf vein
    ctx.strokeStyle = '#2A7A1A'; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(7, 1); ctx.stroke();

    // Top small leaf
    ctx.fillStyle = '#44B830';
    ctx.beginPath();
    ctx.ellipse(0, -5, 2.5, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sparkle (pulsing)
    const sparkle = 0.5 + Math.sin(frame * 0.13) * 0.5;
    ctx.fillStyle = `rgba(200,255,160,${sparkle * 0.9})`;
    ctx.beginPath(); ctx.arc(5, -6, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(200,255,160,${sparkle * 0.6})`;
    ctx.beginPath(); ctx.arc(-5, -2, 1, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }
}

function drawBuffPickups() {
  for (const bp of buffPickups) {
    if (bp.collected) continue;
    const s = worldToScreen(bp.x, bp.y);
    const bob = Math.sin(frame * 0.07 + bp.x * 0.1) * 3;

    const glowColor = bp.type === 'invis' ? 'rgba(196,149,106,' : bp.type === 'speed' ? 'rgba(0,230,230,' : 'rgba(255,215,0,';
    if (isMobileDevice) {
      ctx.fillStyle = glowColor + '0.1)';
      ctx.beginPath();
      ctx.arc(s.x, s.y + bob, 15, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const glow = ctx.createRadialGradient(s.x, s.y + bob, 0, s.x, s.y + bob, 24);
      glow.addColorStop(0, glowColor + '0.22)');
      glow.addColorStop(1, glowColor + '0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y + bob, 24, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(s.x, s.y + bob);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 12, 9, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    if (bp.type === 'invis') {
      // Cardboard box with cat ears peeking out
      const bx = 0, by = 0;
      // Box body
      ctx.fillStyle = '#BF8A50';
      roundRect(ctx, bx - 10, by - 6, 20, 16, 2);
      ctx.fill();
      // Box shading
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(bx - 10, by + 6, 20, 4);
      // Box edge line
      ctx.strokeStyle = '#8B6014';
      ctx.lineWidth = 1;
      roundRect(ctx, bx - 10, by - 6, 20, 16, 2);
      ctx.stroke();
      // Flap top
      ctx.fillStyle = '#D4A060';
      ctx.fillRect(bx - 10, by - 9, 9, 4);
      ctx.fillRect(bx + 1, by - 9, 9, 4);
      ctx.strokeStyle = '#8B6014'; ctx.lineWidth = 0.7;
      ctx.strokeRect(bx - 10, by - 9, 9, 4);
      ctx.strokeRect(bx + 1, by - 9, 9, 4);
      // Tape strip
      ctx.fillStyle = 'rgba(220,195,140,0.7)';
      ctx.fillRect(bx - 3, by - 6, 6, 3);
      // Cat ears poking out (animated wobble)
      const earWobble = Math.sin(frame * 0.12) * 1;
      ctx.fillStyle = '#F5A830';
      ctx.beginPath(); ctx.moveTo(bx - 7, by - 9); ctx.lineTo(bx - 5, by - 15 + earWobble); ctx.lineTo(bx - 2, by - 9); ctx.fill();
      ctx.beginPath(); ctx.moveTo(bx + 2, by - 9); ctx.lineTo(bx + 5, by - 15 - earWobble); ctx.lineTo(bx + 7, by - 9); ctx.fill();
      ctx.fillStyle = '#FFB8C6';
      ctx.beginPath(); ctx.moveTo(bx - 6, by - 9); ctx.lineTo(bx - 5, by - 12 + earWobble); ctx.lineTo(bx - 3, by - 9); ctx.fill();
      ctx.beginPath(); ctx.moveTo(bx + 3, by - 9); ctx.lineTo(bx + 5, by - 12 - earWobble); ctx.lineTo(bx + 6, by - 9); ctx.fill();
      // Label text
      ctx.fillStyle = '#5A3010';
      ctx.font = 'bold 5px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('猫?', bx, by + 4);
    } else if (bp.type === 'speed') {
      // Cyan lightning bolt orb
      ctx.fillStyle = '#00E8E8';
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#00FFFF'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
      // Lightning bolt
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(2, -7); ctx.lineTo(-3, 0); ctx.lineTo(1, 0);
      ctx.lineTo(-2, 7); ctx.lineTo(4, -1); ctx.lineTo(0, -1);
      ctx.closePath(); ctx.fill();
    } else {
      // Shield — gold circle with shield icon
      ctx.fillStyle = '#E8C010';
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
      // Shield shape
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(0, -6); ctx.lineTo(-5, -4); ctx.lineTo(-5, 0);
      ctx.quadraticCurveTo(-5, 5, 0, 7);
      ctx.quadraticCurveTo(5, 5, 5, 0);
      ctx.lineTo(5, -4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#E8C010';
      ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
    }

    ctx.textAlign = 'left';
    ctx.restore();
  }
}

function drawLifePickups() {
  for (const lp of lifePickups) {
    if (lp.collected) continue;
    const s = worldToScreen(lp.x, lp.y);
    const bob = Math.sin(frame * 0.05 + lp.x * 0.1) * 4;

    // Pink radial glow
    if (isMobileDevice) {
      ctx.fillStyle = 'rgba(255,100,160,0.12)';
      ctx.beginPath();
      ctx.arc(s.x, s.y + bob, 16, 0, Math.PI * 2);
      ctx.fill();
    } else {
      const glow = ctx.createRadialGradient(s.x, s.y + bob, 0, s.x, s.y + bob, 22);
      glow.addColorStop(0, 'rgba(255,100,160,0.25)');
      glow.addColorStop(1, 'rgba(255,100,160,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y + bob, 22, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(s.x, s.y + bob);

    // Scale with pulse animation
    const pulse = 1 + Math.sin(frame * 0.1) * 0.06;
    ctx.scale(pulse, pulse);

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 11, 7, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Heart shape using bezier curves
    ctx.fillStyle = '#FF4488';
    ctx.beginPath();
    ctx.moveTo(0, 6);
    ctx.bezierCurveTo(-12, -2, -12, -12, 0, -8);
    ctx.bezierCurveTo(12, -12, 12, -2, 0, 6);
    ctx.fill();

    // Inner highlight
    ctx.fillStyle = 'rgba(255,200,220,0.5)';
    ctx.beginPath();
    ctx.ellipse(-3, -5, 3, 2, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing outline
    const outAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
    ctx.strokeStyle = `rgba(255,180,220,${outAlpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, 6);
    ctx.bezierCurveTo(-12, -2, -12, -12, 0, -8);
    ctx.bezierCurveTo(12, -12, 12, -2, 0, 6);
    ctx.stroke();

    ctx.restore();
  }
}

function drawRipples() {
  for (const r of ripples) {
    const s = worldToScreen(r.x, r.y);
    ctx.strokeStyle = r.color || `rgba(255,165,0,${r.alpha})`;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = r.alpha;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Catnip areas
  for (const c of catnipEffects) {
    const s = worldToScreen(c.x, c.y);
    ctx.fillStyle = `rgba(144,238,144,${0.08 + Math.sin(frame * 0.1) * 0.03})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, c.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    if (!p.active) continue;
    const s = worldToScreen(p.x, p.y);
    ctx.globalAlpha = p.life / p.maxLife;
    if (p.isText) {
      ctx.fillStyle = p.color;
      ctx.font = `bold ${10 + (1 - p.life/p.maxLife) * 4}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(p.text, s.x, s.y);
      ctx.textAlign = 'left';
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  // Speed lines
  for (const sl of speedLines) {
    const s = worldToScreen(sl.x, sl.y);
    ctx.globalAlpha = sl.life / sl.maxLife;
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + sl.dx * 8, s.y + sl.dy * 8);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// SECTION: UI Drawing
function drawUI() {
  // ========== ANGULAR TOP BAR ==========
  ctx.save();
  const barH = 44;
  const barPad = 10;

  // Compact top bar — left-aligned to reduce center obstruction
  const hudW = 340;
  const hudX = 10;
  drawSkewPanel(hudX, barPad, hudW, barH, { skew: 8, fill: 'rgba(8,16,38,0.82)', stroke: DS.borderCyan, lineWidth: 1 });
  // Cyan accent line on top
  ctx.fillStyle = DS.cyan;
  ctx.fillRect(hudX + 8, barPad, hudW - 8, 2);

  const cy = barPad + barH / 2;

  // --- LEFT: Energy pill ---
  const ePct = catEnergy / CFG.ENERGY_MAX;
  const eBarW = 70, eBarH = 12;
  const eBarX = hudX + 14, eBarY = cy - eBarH / 2;
  // Icon
  ctx.fillStyle = '#FFF';
  ctx.font = '13px sans-serif';
  ctx.fillText('⚡', eBarX, cy + 5);
  // Bar bg
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, eBarX + 18, eBarY, eBarW, eBarH, 6);
  ctx.fill();
  // Bar fill
  const eColor = ePct < 0.3 ? DS.red : ePct < 0.7 ? DS.gold : DS.green;
  ctx.fillStyle = eColor;
  if (ePct > 0) { roundRect(ctx, eBarX + 18, eBarY, eBarW * ePct, eBarH, 6); ctx.fill(); }
  // Pct text
  ctx.fillStyle = '#FFF';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(Math.floor(ePct * 100) + '%', eBarX + 18 + eBarW / 2, cy + 4);
  ctx.textAlign = 'left';

  // --- Items (catnip + can opener) right after energy ---
  let itemX = eBarX + 18 + eBarW + 10;
  // Catnip
  ctx.fillStyle = catnipCount > 0 ? '#90EE90' : '#555';
  ctx.font = '12px sans-serif';
  ctx.fillText('🌿', itemX, cy + 4);
  ctx.fillStyle = catnipCount > 0 ? '#90EE90' : '#555';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText('×' + catnipCount, itemX + 16, cy + 4);
  itemX += 38;
  // Can opener (if owned)
  if (hasCanOpener) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '12px sans-serif';
    ctx.fillText('🔑', itemX, cy + 4);
    itemX += 18;
  }

  // --- Lives (right after items) ---
  ctx.fillStyle = DS.red;
  ctx.font = '11px sans-serif';
  for (let li = 0; li < player.lives; li++) {
    ctx.fillText('❤️', itemX + li * 14, cy + 4);
  }

  // --- RIGHT side: Score ---
  ctx.fillStyle = DS.gold;
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('\u2605 ' + score, hudX + hudW - 12, cy + 5);
  ctx.textAlign = 'left';

  // --- Zone name + objective (below top bar, centered) ---
  const currentZoneHUD = player.y < ZONE2_START * CFG.TILE ? 3 : player.y < ZONE1_START * CFG.TILE ? 2 : 1;
  let zoneName = t('zone1');
  if (currentZoneHUD === 3) zoneName = t('zone3');
  else if (currentZoneHUD === 2) zoneName = t('zone2');

  // Zone objective text
  let objText = '';
  let objColor = '#888';
  if (currentZoneHUD === 1 && !zoneObjectives.zone1.done) {
    objText = '🤫 ' + zoneObjectives.zone1.progress + '/' + zoneObjectives.zone1.target;
    objColor = DS.green;
  } else if (currentZoneHUD === 2 && activeZoneEvent === 'bonusFeast') {
    const secs = Math.ceil(zoneObjectives.zone2.timer / 60);
    const eaten = zoneObjectives.zone2.foods.filter(f => f.eaten).length;
    objText = '\uD83C\uDF71 ' + eaten + '/5 \u23F1' + secs + 's';
    objColor = secs <= 3 ? DS.red : DS.gold;
  } else if (currentZoneHUD === 3 && !zoneObjectives.zone3.done) {
    objText = '\uD83C\uDF3F\u2192\uD83D\uDC1F';
    objColor = DS.green;
  }

  if (objText) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px sans-serif';
    ctx.fillText(zoneName, hudX + 14, barPad + barH + 14);
    ctx.fillStyle = objColor;
    ctx.font = 'bold 11px sans-serif';
    ctx.fillText(objText, hudX + 14, barPad + barH + 27);
  }

  ctx.restore();

  // --- Active buff indicators (bottom-center, 50px up from bottom) ---
  const hasAnyBuff = activeBuffs.invis > 0 || activeBuffs.speed > 0 || activeBuffs.shield;
  if (hasAnyBuff) {
    ctx.save();
    const buffY = CFG.H - 50;
    const buffItems = [];
    if (activeBuffs.invis > 0) buffItems.push({ icon: '\uD83D\uDCE6', text: Math.ceil(activeBuffs.invis / 60) + 's', color: '#C4956A' });
    if (activeBuffs.speed > 0) buffItems.push({ icon: '\u26A1', text: Math.ceil(activeBuffs.speed / 60) + 's', color: DS.cyan });
    if (activeBuffs.shield) buffItems.push({ icon: '\uD83D\uDEE1\uFE0F', text: '', color: DS.gold });
    const buffTotalW = buffItems.length * 50;
    let bx = CFG.W / 2 - buffTotalW / 2;
    // Buff panel background
    drawSkewPanel(bx - 8, buffY - 16, buffTotalW + 16, 32, { skew: 4, fill: 'rgba(8,16,38,0.75)', stroke: DS.borderCyan, lineWidth: 1 });
    for (const bi of buffItems) {
      ctx.fillStyle = bi.color;
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(bi.icon + bi.text, bx + 25, buffY + 2);
      bx += 50;
    }
    ctx.textAlign = 'left';
    ctx.restore();
  }

  // ========== COMBO (angular, below top bar) ==========
  if (combo > 1 && comboTimer > 0) {
    const comboAlpha = Math.min(1, comboTimer / 30);
    const stealthMode = player.sneaking || getTile(player.x, player.y) === 5;
    const maxWindow = stealthMode ? CFG.COMBO_WINDOW_STEALTH : CFG.COMBO_WINDOW;
    ctx.save();
    ctx.globalAlpha = comboAlpha;
    ctx.textAlign = 'center';
    const cSize = 18 + Math.min(combo, 12) * 1.5;
    ctx.fillStyle = combo > 10 ? DS.red : combo > 5 ? DS.gold : '#FFF';
    ctx.font = `bold ${cSize}px sans-serif`;
    ctx.fillText(combo + 'x', CFG.W / 2, 82);
    const cbW = 80;
